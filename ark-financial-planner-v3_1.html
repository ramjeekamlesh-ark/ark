<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <!-- jsPDF for client-side PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg:#05080F; --surface:#0B0F1C; --card:#0F1525; --card2:#131A2E;
      --border:#1C2640; --border2:#243050;
      --accent:#00E5B0; --accent-dim:#00A87E;
      --gold:#FFD166; --gold-dim:#C9A13B;
      --warn:#FF8F5A; --danger:#FF4466;
      --text:#ECF0FA; --muted:#4A5A7E; --subtle:#141D33;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,229,176,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,176,0.02) 1px,transparent 1px);background-size:64px 64px;pointer-events:none;}
    body::after{content:'';position:fixed;top:-25%;left:50%;transform:translateX(-50%);width:900px;height:600px;background:radial-gradient(ellipse,rgba(0,229,176,0.035) 0%,transparent 68%);pointer-events:none;z-index:0;}
    #root{position:relative;z-index:1;}
    input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;width:100%;cursor:pointer;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);border:2.5px solid var(--bg);box-shadow:0 0 0 3px rgba(0,229,176,0.18);}
    input[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);box-shadow:none;}
    input[type=range]:focus{outline:none;}
    input[type=text],input[type=email],input[type=tel]{font-family:'DM Sans',sans-serif;font-size:14px;background:var(--subtle);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 14px;width:100%;outline:none;transition:border-color 0.2s;}
    input[type=text]:focus,input[type=email]:focus,input[type=tel]:focus{border-color:var(--accent);}
    ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .fi{animation:fi 0.5s cubic-bezier(0.22,1,0.36,1) both;}
    .fu{animation:fu 0.45s cubic-bezier(0.22,1,0.36,1) both;}
    .fu1{animation:fu 0.45s 0.07s cubic-bezier(0.22,1,0.36,1) both;}
    .fu2{animation:fu 0.45s 0.14s cubic-bezier(0.22,1,0.36,1) both;}
    .fu3{animation:fu 0.45s 0.21s cubic-bezier(0.22,1,0.36,1) both;}
    @keyframes fi{from{opacity:0}to{opacity:1}}
    @keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:100px;border:1px solid rgba(0,229,176,0.22);background:rgba(0,229,176,0.06);font-size:11px;letter-spacing:0.1em;color:var(--accent);text-transform:uppercase;margin-bottom:22px;}
    .badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pp 2.2s infinite;}
    @keyframes pp{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,229,176,0.4);}50%{opacity:.7;box-shadow:0 0 0 6px rgba(0,229,176,0);}}
    .tab-btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:7px 18px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;letter-spacing:0.02em;}
    .tab-btn:hover{border-color:var(--border2);color:var(--text);}
    .tab-btn.act{border-color:var(--accent);background:rgba(0,229,176,0.1);color:var(--accent);}
    .card{background:var(--card);border:1px solid var(--border);border-radius:20px;}
    .card-g{background:var(--card);border:1px solid rgba(0,229,176,0.18);border-radius:20px;box-shadow:0 0 50px rgba(0,229,176,0.04),inset 0 1px 0 rgba(255,255,255,0.025);}
    .chip{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:4px 12px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
    .chip:hover{border-color:var(--border2);color:var(--text);}
    .chip.ca{border-color:var(--accent);background:rgba(0,229,176,0.1);color:var(--accent);}
    .chip.cg{border-color:var(--gold);background:rgba(255,209,102,0.09);color:var(--gold);}
    .chip.cm{border-color:var(--muted);background:rgba(74,90,126,0.14);color:var(--text);}
    .cta{width:100%;padding:16px 0;border-radius:14px;background:linear-gradient(135deg,var(--accent-dim),var(--accent));border:none;color:#02100C;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 32px rgba(0,229,176,0.22),inset 0 1px 0 rgba(255,255,255,0.14);transition:all 0.2s;}
    .cta:hover{transform:translateY(-2px);box-shadow:0 8px 44px rgba(0,229,176,0.32);}
    .cta:active{transform:translateY(0);}
    .sec{padding:10px 22px;border-radius:12px;border:1px solid var(--accent);background:rgba(0,229,176,0.07);color:var(--accent);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;}
    .sec:hover{background:rgba(0,229,176,0.14);}
    /* Modal overlay */
    .modal-overlay{position:fixed;inset:0;background:rgba(2,4,10,0.82);backdrop-filter:blur(8px);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px;}
    .modal-box{background:var(--card);border:1px solid var(--border2);border-radius:24px;max-width:480px;width:100%;padding:36px;position:relative;box-shadow:0 32px 80px rgba(0,0,0,0.6);}
    @media(max-width:760px){.tc{grid-template-columns:1fr !important;}.fc{grid-template-columns:1fr 1fr !important;}.sc{grid-template-columns:1fr !important;}}
  </style>
</head>
<body><div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const C = {
  bg:"#05080F",surface:"#0B0F1C",card:"#0F1525",card2:"#131A2E",
  border:"#1C2640",border2:"#243050",
  accent:"#00E5B0",accentDim:"#00A87E",
  gold:"#FFD166",goldDim:"#C9A13B",
  warn:"#FF8F5A",danger:"#FF4466",
  text:"#ECF0FA",muted:"#4A5A7E",subtle:"#141D33",
};

const fmt=(v,s=false)=>{if(typeof v!=="number"||isNaN(v))return"—";if(v>=1e6)return`${(v/1e6).toFixed(s?1:2)}M`;if(v>=1e3)return`${(v/1e3).toFixed(s?0:1)}K`;return Math.round(v).toLocaleString();};
const pct=(v,d=0)=>`${Number(v).toFixed(d)}%`;
const fmtM=(v)=>v>=1e6?`$${(v/1e6).toFixed(2)}M`:v>=1e3?`$${(v/1e3).toFixed(0)}K`:`$${Math.round(v).toLocaleString()}`;

/* ═══════════════════════════════ FINANCIAL ENGINE ══════════════════════════════ */
function runProjection(inp) {
  const { age, gender, income, monthlySpend, savings, savingsRate, retireAge,
    debtBalance=0, retireMonthlyExpenses=0 } = inp;

  const lifeExp    = gender==="male" ? 75 : 85;
  const yearsInRet = Math.max(1, lifeExp - retireAge);
  const INFLATION  = 0.025;
  // Income growth = max(user-specified growth, inflation) — at minimum keeps pace with inflation
  const INCOME_GROWTH = Math.max(0.03, INFLATION); // 3% or inflation, whichever is higher
  const SWR = 0.04;
  const ytr = Math.max(1, retireAge - age);
  const returnRate = ytr > 10 ? 0.075 : ytr > 5 ? 0.05 : 0.035;

  let portfolio = Math.max(0, savings - debtBalance);
  const accum = [];
  for (let t = 0; t < ytr; t++) {
    // Income grows at least at inflation each year (real-terms floor)
    const curIncome = income * Math.pow(1 + INCOME_GROWTH, t);
    portfolio = portfolio * (1 + returnRate) + curIncome * (savingsRate / 100);
    accum.push({ yr: age + t, val: Math.max(0, portfolio), phase: "grow" });
  }

  const retPortfolio  = Math.max(0, portfolio);
  const retIncome     = retPortfolio * SWR;
  const inflatedSpend = monthlySpend * 12 * Math.pow(1 + INFLATION, ytr);

  const desiredAnnual = retireMonthlyExpenses > 0
    ? retireMonthlyExpenses * 12 * Math.pow(1 + INFLATION, ytr) : null;
  const withdrawal = desiredAnnual !== null
    ? desiredAnnual : Math.max(inflatedSpend * 0.7, retIncome);

  const targetPortfolio = retireMonthlyExpenses > 0
    ? (retireMonthlyExpenses * 12 * Math.pow(1 + INFLATION, ytr)) / SWR : null;

  let requiredMonthlySaving=null, requiredSavingsRate=null;
  if (targetPortfolio !== null) {
    const PV=Math.max(0,savings-debtBalance), r=returnRate/12, n=ytr*12;
    const gr=Math.pow(1+r,n), needed=targetPortfolio-PV*gr;
    requiredMonthlySaving = needed>0 ? (needed*r)/(gr-1) : 0;
    requiredSavingsRate = Math.min(80, Math.max(0,(requiredMonthlySaving*12/income)*100));
  }

  const currentMonthlySaving = (income*(savingsRate/100))/12;
  const monthlySavingGap = requiredMonthlySaving!==null ? requiredMonthlySaving-currentMonthlySaving : null;

  // Drawdown — runs well past life expectancy to show runway
  const maxDraw = Math.max(40, yearsInRet + 15);
  let runOut = retireAge + maxDraw;
  let drawnPort = retPortfolio;
  const drawdown = [];
  for (let y=0; y<=maxDraw; y++) {
    const w = withdrawal * Math.pow(1+INFLATION, y);
    drawnPort = drawnPort*(1+0.04) - w;
    if (drawnPort <= 0) { runOut = retireAge+y; break; }
    if (y < maxDraw) drawdown.push({ yr:retireAge+y, val:Math.max(0,drawnPort), phase:"draw" });
  }

  // Health scoring
  const savScore   = Math.min(30,(savingsRate/20)*30);
  const spendScore = Math.min(25,Math.max(0,25-((monthlySpend*12)/income)*25));
  const progScore  = Math.min(20,(savings/(income*3))*20);
  const lastsToLifeExp = runOut >= lifeExp;
  const readyBase  = targetPortfolio
    ? Math.min(25,(retPortfolio/targetPortfolio)*25)
    : Math.min(25,(retPortfolio/(withdrawal*yearsInRet))*25);
  const readyScore = lastsToLifeExp ? readyBase : readyBase*0.5;
  const health     = Math.round(savScore+spendScore+progScore+readyScore);

  const corpusMultiple = withdrawal>0 ? retPortfolio/withdrawal : 0;
  const surplusYears   = runOut-lifeExp;

  const successProb = Math.min(97, Math.max(5,
    (lastsToLifeExp ? 60 : 25) +
    (surplusYears>=10 ? 18 : surplusYears>=5 ? 10 : surplusYears>=0 ? 4 : 0) +
    (savingsRate>=20 ? 10 : savingsRate>=15 ? 6 : savingsRate>=10 ? 3 : 0) +
    (corpusMultiple>=25 ? 9 : corpusMultiple>=18 ? 5 : 0)
  ));

  const onTrackRatio = targetPortfolio ? Math.min(1.5,retPortfolio/targetPortfolio) : null;

  return {
    retPortfolio, retIncome, successProb, runOut, health, lifeExp, yearsInRet,
    returnRate, withdrawal, ytr, lastsToLifeExp, corpusMultiple, surplusYears,
    chartData:[...accum,...drawdown],
    targetPortfolio, requiredMonthlySaving, requiredSavingsRate,
    currentMonthlySaving, monthlySavingGap, onTrackRatio,
    inflatedSpend, INCOME_GROWTH,
  };
}

// "Stress test" — runs 300 scenarios with varying income/market returns
function runStressTest(inp) {
  const BASE = runProjection(inp);
  const results = [];
  for (let i=0; i<300; i++) {
    const noise = ()=> 1+(Math.random()-0.5)*0.08;
    const r = runProjection({...inp, income:inp.income*noise(), savings:inp.savings*noise()});
    results.push({ port:r.retPortfolio, lasts:r.lastsToLifeExp });
  }
  results.sort((a,b)=>a.port-b.port);
  return {
    best:  results[270].port,
    likely:results[150].port,
    tough: results[30].port,
    pctWillBeOk: (results.filter(r=>r.lasts).length/results.length)*100,
  };
}

function healthLabel(s) {
  if (s<35) return {label:"Critical",color:C.danger};
  if (s<55) return {label:"At Risk",color:C.warn};
  if (s<75) return {label:"Stable",color:C.gold};
  return {label:"Strong",color:C.accent};
}

/* ═══════════════════════════════ UI COMPONENTS ═══════════════════════════════ */
function Slider({label,value,min,max,step=1,fmtFn,onChange,ac,sub}) {
  const p = Math.min(100,Math.max(0,((value-min)/(max-min))*100));
  const col = ac||C.accent;
  return (
    <div style={{marginBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:3}}>
        <span style={{fontFamily:"'DM Sans'",fontSize:11,color:C.muted,letterSpacing:"0.06em",textTransform:"uppercase",fontWeight:500}}>{label}</span>
        <span style={{fontFamily:"'Playfair Display'",fontSize:17,fontWeight:700,color:col,letterSpacing:"-0.01em"}}>{fmtFn(value)}</span>
      </div>
      {sub&&<div style={{fontSize:10,color:C.accent,marginBottom:5,fontStyle:"italic"}}>{sub}</div>}
      <div style={{position:"relative",height:3,background:C.subtle,borderRadius:2}}>
        <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${p}%`,background:`linear-gradient(90deg,${col}55,${col})`,borderRadius:2,transition:"width 0.08s"}}/>
        <input type="range" min={min} max={max} step={step} value={value}
          onChange={e=>onChange(Number(e.target.value))}
          style={{position:"absolute",top:-10,left:0,width:"100%",opacity:0,cursor:"pointer",height:24,margin:0}}/>
      </div>
    </div>
  );
}

function SC({label,value,sub,color,size=22,glow=false}) {
  return (
    <div style={{background:glow?"rgba(0,229,176,0.05)":C.subtle,border:`1px solid ${glow?"rgba(0,229,176,0.18)":C.border}`,borderRadius:14,padding:"14px 16px"}}>
      <div style={{fontFamily:"'DM Sans'",fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4,fontWeight:500}}>{label}</div>
      <div style={{fontFamily:"'Playfair Display'",fontSize:size,fontWeight:700,color:color||C.text,lineHeight:1.1}}>{value}</div>
      {sub&&<div style={{fontSize:10,color:C.muted,marginTop:3}}>{sub}</div>}
    </div>
  );
}

/* ═══════════════════════════════ CHART ═══════════════════════════════ */
function Chart({data,retireAge,lifeExp,stress,height=150,targetPortfolio}) {
  if(!data||!data.length) return null;
  const W=600,H=height,pad={l:10,r:10,t:14,b:22};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const allVals=[...data.map(d=>d.val),stress?stress.best:0,targetPortfolio||0].filter(Boolean);
  const maxV=Math.max(...allVals,1)*1.1;
  const minYr=data[0].yr,maxYr=data[data.length-1].yr;
  const range=Math.max(1,maxYr-minYr);
  const sx=yr=>pad.l+((yr-minYr)/range)*cw;
  const sy=v=>pad.t+ch-(v/maxV)*ch;
  const grow=data.filter(d=>d.phase==="grow");
  const draw=data.filter(d=>d.phase==="draw");
  const tp=pts=>pts.map((d,i)=>`${i?"L":"M"}${sx(d.yr).toFixed(1)},${sy(d.val).toFixed(1)}`).join(" ");
  const retX=sx(retireAge);
  const lifeX=lifeExp>=minYr&&lifeExp<=maxYr?sx(lifeExp):null;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible",display:"block"}}>
      <defs>
        <linearGradient id="gg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.accent} stopOpacity=".28"/><stop offset="100%" stopColor={C.accent} stopOpacity="0"/></linearGradient>
        <linearGradient id="gd" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.gold} stopOpacity=".22"/><stop offset="100%" stopColor={C.gold} stopOpacity="0"/></linearGradient>
      </defs>
      {/* Stress test band */}
      {stress&&grow.length>0&&<rect x={pad.l} y={sy(stress.best)} width={cw} height={Math.max(0,sy(stress.tough)-sy(stress.best))} fill={C.accent} fillOpacity=".04" rx="3"/>}
      {grow.length>1&&<path d={`${tp(grow)} L${sx(grow[grow.length-1].yr)},${pad.t+ch} L${sx(grow[0].yr)},${pad.t+ch} Z`} fill="url(#gg)"/>}
      {draw.length>1&&<path d={`${tp(draw)} L${sx(draw[draw.length-1].yr)},${pad.t+ch} L${sx(draw[0].yr)},${pad.t+ch} Z`} fill="url(#gd)"/>}
      {grow.length>1&&<path d={tp(grow)} fill="none" stroke={C.accent} strokeWidth="2.5" strokeLinejoin="round"/>}
      {draw.length>1&&<path d={tp(draw)} fill="none" stroke={C.gold} strokeWidth="2" strokeLinejoin="round" strokeDasharray="7,3"/>}
      {targetPortfolio&&targetPortfolio<maxV&&<g>
        <line x1={pad.l} y1={sy(targetPortfolio)} x2={pad.l+cw} y2={sy(targetPortfolio)} stroke={C.gold} strokeWidth="1" strokeDasharray="5,4" opacity=".5"/>
        <text x={pad.l+5} y={sy(targetPortfolio)-4} fill={C.gold} fontSize="8" fontFamily="DM Sans" opacity=".8" fontStyle="italic">goal</text>
      </g>}
      <line x1={retX} y1={pad.t} x2={retX} y2={pad.t+ch} stroke={C.muted} strokeWidth="1" strokeDasharray="3,3" opacity=".6"/>
      <text x={retX+3} y={pad.t+10} fill={C.muted} fontSize="9" fontFamily="DM Sans" opacity=".9">retire {retireAge}</text>
      {lifeX!==null&&<g>
        <line x1={lifeX} y1={pad.t} x2={lifeX} y2={pad.t+ch} stroke={C.danger} strokeWidth="1.5" strokeDasharray="4,3" opacity=".7"/>
        <text x={lifeX+3} y={pad.t+10} fill={C.danger} fontSize="9" fontFamily="DM Sans" opacity=".9">age {lifeExp}</text>
        <circle cx={lifeX} cy={pad.t+ch} r="3" fill={C.danger} opacity=".55"/>
      </g>}
      {[minYr,Math.round((minYr+maxYr)/2),maxYr].map(yr=>(
        <text key={yr} x={sx(yr)} y={H-4} fill={C.muted} fontSize="9" fontFamily="DM Sans" textAnchor="middle" opacity=".7">{yr}</text>
      ))}
    </svg>
  );
}

/* ═══════════════════════════════ LIFESPAN BAR ═══════════════════════════════ */
function LifeBar({retireAge,lifeExp,runOut}) {
  const start=retireAge,end=Math.max(lifeExp+12,runOut+6);
  const range=end-start;
  const lifePos=((lifeExp-start)/range)*100;
  const runPos=Math.min(100,((Math.min(runOut,end)-start)/range)*100);
  const ok=runOut>=lifeExp;
  return (
    <div style={{marginTop:12}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
        <span style={{fontSize:10,color:C.muted}}>From age {retireAge}</span>
        <span style={{fontSize:10,color:ok?C.accent:C.danger,fontWeight:600}}>
          {ok?`Money lasts ${runOut-lifeExp} years past expected lifespan ✓`:`Runs out ${lifeExp-runOut} years before expected lifespan ⚠`}
        </span>
      </div>
      <div style={{position:"relative",height:12,background:C.subtle,borderRadius:6,overflow:"hidden"}}>
        <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${runPos}%`,background:ok?`linear-gradient(90deg,${C.accentDim}88,${C.accent})`:`linear-gradient(90deg,${C.warn}88,${C.danger})`,borderRadius:6,transition:"width 0.5s ease"}}/>
        <div style={{position:"absolute",top:0,left:`${lifePos}%`,width:2,height:"100%",background:"rgba(255,255,255,0.45)",transform:"translateX(-1px)"}}/>
      </div>
      <div style={{position:"relative",height:14,marginTop:1}}>
        <div style={{position:"absolute",left:`${lifePos}%`,transform:"translateX(-50%)",fontSize:9,color:C.muted,whiteSpace:"nowrap"}}>
          expected lifespan age {lifeExp}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════ GOAL PANEL ═══════════════════════════════ */
function GoalPanel({result,base}) {
  if(!result.targetPortfolio) return null;
  const {targetPortfolio,requiredMonthlySaving,requiredSavingsRate,currentMonthlySaving,monthlySavingGap,onTrackRatio}=result;
  const onTrack=onTrackRatio>=0.9;
  const pctG=Math.min(100,Math.round((onTrackRatio||0)*100));
  const gc=monthlySavingGap<=0?C.accent:monthlySavingGap<currentMonthlySaving*0.3?C.gold:C.danger;
  return (
    <div style={{background:C.card,border:`1px solid ${onTrack?"rgba(0,229,176,0.28)":C.border}`,borderRadius:20,padding:22,marginBottom:18}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
        <div>
          <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:3}}>Retirement Lifestyle Goal</div>
          <div style={{fontFamily:"'Playfair Display'",fontSize:16,fontWeight:700,color:C.text}}>{fmt(base.retireMonthlyExpenses)}/mo spending in retirement</div>
        </div>

          <div style={{fontFamily:"'Playfair Display'",fontSize:22,fontWeight:700,color:onTrack?C.accent:C.warn}}>{pctG}%</div>
          <div style={{fontSize:9,color:C.muted}}>on track</div>
        </div>
      </div>
      <div style={{marginBottom:16}}>
        <div style={{height:5,background:C.subtle,borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pctG}%`,background:onTrack?`linear-gradient(90deg,${C.accentDim},${C.accent})`:`linear-gradient(90deg,${C.warn}80,${C.warn})`,borderRadius:3,transition:"width 0.5s ease"}}/>

        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}} className="sc">
        {[["You need to save",fmt(requiredMonthlySaving)+"/mo",C.text],["You currently save",fmt(currentMonthlySaving)+"/mo",C.text],[monthlySavingGap<=0?"You have a buffer":"Monthly shortfall",monthlySavingGap<=0?"On track ✓":`+${fmt(monthlySavingGap)}/mo`,gc]].map(([l,v,col])=>(
          <div key={l} style={{background:C.subtle,borderRadius:12,padding:"11px 13px"}}>
            <div style={{fontFamily:"'Playfair Display'",fontSize:15,fontWeight:700,color:col}}>{v}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>
      {requiredSavingsRate!==null&&(
        <div style={{marginTop:14,padding:"11px 14px",background:C.subtle,borderRadius:12,fontSize:12,color:C.muted,lineHeight:1.65}}>
          To hit <b style={{color:C.accent}}>{fmt(targetPortfolio)}</b> by age {base.retireAge}, you need to save{" "}
          <b style={{color:C.accent}}>{pct(requiredSavingsRate,1)}</b> of your income
          {requiredSavingsRate<=base.savingsRate
            ?<span style={{color:C.accent}}> — you're already there ✓</span>
            :<span style={{color:gc}}> (you're currently at {pct(base.savingsRate)})</span>}.
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════ CONTACT MODAL ═══════════════════════════════ */
function ContactModal({base,result,stress,onClose,onSubmit}) {
  const [name,setName]=useState("");
  const [email,setEmail]=useState("");
  const [phone,setPhone]=useState("");
  const [submitted,setSubmitted]=useState(false);
  const [loading,setLoading]=useState(false);

  const hl=healthLabel(result.health);
  const ok=result.lastsToLifeExp;

  const handleSubmit=async()=>{
    if(!name.trim()||(email.trim()===""&&phone.trim()==="")) return;
    setLoading(true);
    await new Promise(r=>setTimeout(r,600));
    setSubmitted(true);
    setLoading(false);
    onSubmit({name,email,phone});
  };

  const verdictText = ok
    ? `Based on your inputs, your retirement savings are projected to last until age ${result.runOut}, comfortably beyond your life expectancy of ${result.lifeExp}.`
    : `Your current plan shows a potential shortfall — funds may run out around age ${result.runOut}, which is ${result.lifeExp-result.runOut} years before your life expectancy of ${result.lifeExp}.`;

  if(submitted) return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()} style={{textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:16}}>✅</div>
        <div style={{fontFamily:"'Playfair Display'",fontSize:22,fontWeight:700,marginBottom:10}}>We'll be in touch shortly.</div>
        <div style={{fontSize:13,color:C.muted,lineHeight:1.65,marginBottom:24}}>Your plan summary is ready to download. One of our advisers will reach out to walk you through your numbers personally.</div>
        <button className="cta" onClick={()=>onSubmit({name,email,phone,download:true})}>
          Download My Plan Summary (PDF)
        </button>
        <div style={{marginTop:12,fontSize:11,color:C.muted}}>Your details are kept confidential and never shared.</div>
      </div>
    </div>
  );

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        {/* Close */}
        <button onClick={onClose} style={{position:"absolute",top:16,right:20,background:"none",border:"none",color:C.muted,fontSize:20,cursor:"pointer",lineHeight:1}}>×</button>

        <div style={{fontFamily:"'Playfair Display'",fontSize:22,fontWeight:700,marginBottom:6}}>Get your personalised plan</div>
        <div style={{fontSize:13,color:C.muted,lineHeight:1.6,marginBottom:20}}>
          Leave your details and we'll send you a detailed plan — and a PDF summary of your numbers to keep.
        </div>

        {/* Snapshot */}
        <div style={{background:ok?"rgba(0,229,176,0.06)":"rgba(255,68,102,0.06)",border:`1px solid ${ok?"rgba(0,229,176,0.2)":"rgba(255,68,102,0.2)"}`,borderRadius:14,padding:"14px 16px",marginBottom:22,fontSize:12,color:C.muted,lineHeight:1.65}}>
          <b style={{color:ok?C.accent:C.danger}}>{ok?"✓ Looking solid":"⚠ Action needed"}</b>{" — "}{verdictText}
          {" "}Health score: <b style={{color:hl.color}}>{result.health}/100 · {hl.label}</b>.
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:22}}>
          <div>
            <div style={{fontSize:11,color:C.muted,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.06em"}}>Your Name *</div>
            <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Full name" />
          </div>
          <div>
            <div style={{fontSize:11,color:C.muted,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.06em"}}>Email Address</div>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" />
          </div>

            <div style={{fontSize:11,color:C.muted,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.06em"}}>Phone Number</div>
            <input type="tel" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+1 (555) 000-0000" />

/* ═══════════════════════════════ PDF GENERATOR ═══════════════════════════════ */
function generatePDF(base, result, stress, contactInfo) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
  const W=210, M=20, tw=W-M*2;

  // Colours as RGB
  const dark=[5,8,15], teal=[0,229,176], gold=[255,209,102],
    text=[236,240,250], muted=[74,90,126], danger=[255,68,102],
    white=[255,255,255], cardBg=[15,21,37], subtleBg=[20,29,51];

  const setFill=c=>doc.setFillColor(...c);
  const setTxt=c=>doc.setTextColor(...c);
  const setDraw=c=>doc.setDrawColor(...c);

  // Background
  setFill(dark); doc.rect(0,0,W,297,"F");

  let y=0;

  // Header band
  setFill([11,15,28]); doc.rect(0,0,W,42,"F");
  setDraw(teal); doc.setLineWidth(0.4); doc.line(0,42,W,42);

  // Logo mark
  setFill(teal); doc.roundedRect(M,10,20,20,3,3,"F");
  setTxt(dark); doc.setFont("helvetica","bold"); doc.setFontSize(14);
  doc.text("◈",M+5.5,23.5);

  setTxt(white); doc.setFont("helvetica","bold"); doc.setFontSize(14);
  doc.text("ARK Financial Planners",M+26,18);
  setTxt(muted); doc.setFont("helvetica","normal"); doc.setFontSize(8);
  doc.text("RETIREMENT PLANNING",M+26,25);

  // Date + name
  setTxt(muted); doc.setFontSize(8);
  doc.text(`Prepared for: ${contactInfo?.name||"You"}`,M+26,33);
  doc.text(`Date: ${new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}`,W-M,33,{align:"right"});

  y=56;

  // Title
  setTxt(white); doc.setFont("helvetica","bold"); doc.setFontSize(20);
  doc.text("Your Retirement Plan Summary",M,y); y+=8;
  setTxt(muted); doc.setFont("helvetica","normal"); doc.setFontSize(9);
  doc.text("A personalised projection based on your financial inputs",M,y); y+=14;

  // ── VERDICT BANNER ──────────────────────────────────────────────
  const ok=result.lastsToLifeExp;
  setFill(ok?[0,50,35]:[60,10,15]);
  doc.roundedRect(M,y,tw,18,3,3,"F");
  setDraw(ok?teal:danger); doc.setLineWidth(0.5);
  doc.roundedRect(M,y,tw,18,3,3,"S");
  setTxt(ok?teal:danger); doc.setFont("helvetica","bold"); doc.setFontSize(11);
  doc.text(ok?"✓  Your savings are projected to outlast your life expectancy":"⚠  Your savings may run short before your life expectancy",M+6,y+11.5);
  y+=26;

  // ── KEY NUMBERS GRID ─────────────────────────────────────────────
  const boxes=[
    ["Projected Corpus at Retirement",fmtM(result.retPortfolio),`at age ${base.retireAge}`,teal],
    ["Expected Annual Income",fmtM(base.retireMonthlyExpenses>0?result.withdrawal:result.retIncome),base.retireMonthlyExpenses>0?"goal-based, inflation-adjusted":"via 4% safe withdrawal rule",gold],
    ["Financial Health Score",`${result.health}/100`,healthLabel(result.health).label,healthLabel(result.health).color],
    ["Money Runs Out at Age",result.runOut>result.lifeExp+10?"Beyond 95+":String(result.runOut),result.runOut>=result.lifeExp?`${result.runOut-result.lifeExp} years past life expectancy`:`${result.lifeExp-result.runOut} years before life expectancy`,result.runOut>=result.lifeExp?teal:danger],
  ];
  const bw=(tw-6)/2, bh=24;
  boxes.forEach((box,i)=>{
    const bx=M+(i%2)*(bw+6), by=y+Math.floor(i/2)*(bh+6);
    setFill(cardBg); doc.roundedRect(bx,by,bw,bh,3,3,"F");
    setTxt(muted); doc.setFont("helvetica","normal"); doc.setFontSize(7);
    doc.text(box[0].toUpperCase(),bx+6,by+7);
    setTxt(box[3]||white); doc.setFont("helvetica","bold"); doc.setFontSize(13);
    doc.text(box[1],bx+6,by+16);
    setTxt(muted); doc.setFont("helvetica","normal"); doc.setFontSize(7);
    doc.text(box[2],bx+6,by+21.5);
  });
  y+=2*bh+6*2+10;

  // ── ABOUT YOUR PLAN ──────────────────────────────────────────────
  setTxt(white); doc.setFont("helvetica","bold"); doc.setFontSize(11);
  doc.text("About Your Plan",M,y); y+=7;
  setDraw([28,38,64]); doc.setLineWidth(0.3);
  doc.line(M,y,M+tw,y); y+=8;

  const rows=[
    ["Current Age",`${base.age} years`,"Target Retirement Age",`Age ${base.retireAge}`],
    ["Biological Sex",base.gender==="male"?"Male":"Female","Life Expectancy Benchmark",`Age ${result.lifeExp}`],
    ["Annual Income",fmtM(base.income),"Savings Rate",pct(base.savingsRate)],
    ["Monthly Spending",fmtM(base.monthlySpend),"Current Savings",fmtM(base.savings)],
    ["Assumed Income Growth",`${pct(result.INCOME_GROWTH*100,1)} per year (at least inflation)`,"Investment Return Rate",pct(result.returnRate*100,1)+" per year"],
    ["Retirement Duration",`${result.yearsInRet} years (retire→life expectancy)`,"Corpus Multiple",`${result.corpusMultiple.toFixed(1)}× annual spending`],
  ];
  rows.forEach(([k1,v1,k2,v2])=>{
    const rh=10;
    setFill(subtleBg); doc.roundedRect(M,y,tw,rh,1.5,1.5,"F");
    setTxt(muted); doc.setFont("helvetica","normal"); doc.setFontSize(7.5);
    doc.text(k1,M+4,y+6.5);
    setTxt(white); doc.setFont("helvetica","bold");
    doc.text(v1,M+tw/2-4,y+6.5,{align:"right"});
    setTxt(muted); doc.setFont("helvetica","normal");
    doc.text(k2,M+tw/2+4,y+6.5);
    setTxt(white); doc.setFont("helvetica","bold");
    doc.text(v2,M+tw,y+6.5,{align:"right"});
    y+=rh+2;
  });
  y+=8;

  // ── SCENARIO RANGE ────────────────────────────────────────────────
  if(stress) {
    setTxt(white); doc.setFont("helvetica","bold"); doc.setFontSize(11);
    doc.text("Range of Outcomes (300 Scenarios)",M,y); y+=7;
    setDraw([28,38,64]); doc.setLineWidth(0.3); doc.line(M,y,M+tw,y); y+=8;

    const sw=(tw-12)/3;
    [[`${fmtM(stress.tough)}`,"Difficult scenario","If markets underperform",C.warn],
     [fmtM(stress.likely),"Most likely outcome","Based on your inputs",white],
     [fmtM(stress.best),"Favourable scenario","If markets outperform",C.accent]].forEach((box,i)=>{
      const bx=M+i*(sw+6), by=y;
      setFill(cardBg); doc.roundedRect(bx,by,sw,22,3,3,"F");
      setTxt(box[3]||white); doc.setFont("helvetica","bold"); doc.setFontSize(12);
      doc.text(box[0],bx+sw/2,by+10,{align:"center"});
      setTxt(white); doc.setFont("helvetica","bold"); doc.setFontSize(7.5);
      doc.text(box[1],bx+sw/2,by+16,{align:"center"});
      setTxt(muted); doc.setFont("helvetica","normal"); doc.setFontSize(6.5);
      doc.text(box[2],bx+sw/2,by+20,{align:"center"});
    });
    y+=30;

    setFill(cardBg); doc.roundedRect(M,y,tw,12,2,2,"F");
    const pWill=stress.pctWillBeOk.toFixed(0);
    setTxt(Number(pWill)>=75?teal:Number(pWill)>=55?gold:danger);
    doc.setFont("helvetica","bold"); doc.setFontSize(9);
    doc.text(`${pWill}% of all 300 scenarios show your money lasting to age ${result.lifeExp}`,M+tw/2,y+7.5,{align:"center"});
    y+=20;
  }

  // ── GOAL ──────────────────────────────────────────────────────────
  if(base.retireMonthlyExpenses>0&&result.targetPortfolio) {
    if(y>230){doc.addPage();setFill(dark);doc.rect(0,0,W,297,"F");y=20;}
    setTxt(white); doc.setFont("helvetica","bold"); doc.setFontSize(11);
    doc.text("Your Retirement Income Goal",M,y); y+=7;
    setDraw([28,38,64]); doc.setLineWidth(0.3); doc.line(M,y,M+tw,y); y+=8;
    const gRows=[
      ["Monthly retirement target",`${fmtM(base.retireMonthlyExpenses)}/mo`,"Required portfolio",fmtM(result.targetPortfolio)],
      ["Required savings rate",pct(result.requiredSavingsRate,1),"Monthly saving needed",fmtM(result.requiredMonthlySaving)+"/mo"],
      ["Monthly shortfall/surplus",result.monthlySavingGap<=0?`+${fmtM(-result.monthlySavingGap)}/mo surplus`:`${fmtM(result.monthlySavingGap)}/mo gap`,"Progress toward goal",`${Math.min(100,Math.round((result.onTrackRatio||0)*100))}%`],
    ];
    gRows.forEach(([k1,v1,k2,v2])=>{
      const rh=10;
      setFill(subtleBg); doc.roundedRect(M,y,tw,rh,1.5,1.5,"F");
      setTxt(muted); doc.setFont("helvetica","normal"); doc.setFontSize(7.5); doc.text(k1,M+4,y+6.5);
      setTxt(white); doc.setFont("helvetica","bold"); doc.text(v1,M+tw/2-4,y+6.5,{align:"right"});
      setTxt(muted); doc.setFont("helvetica","normal"); doc.text(k2,M+tw/2+4,y+6.5);
      setTxt(white); doc.setFont("helvetica","bold"); doc.text(v2,M+tw,y+6.5,{align:"right"});
      y+=rh+2;
    });
    y+=8;
  }

  // ── RECOMMENDATIONS ───────────────────────────────────────────────
  if(y>230){doc.addPage();setFill(dark);doc.rect(0,0,W,297,"F");y=20;}
  setTxt(white); doc.setFont("helvetica","bold"); doc.setFontSize(11);
  doc.text("Key Observations",M,y); y+=7;
  setDraw([28,38,64]); doc.setLineWidth(0.3); doc.line(M,y,M+tw,y); y+=8;

  const obs=[];
  if(!ok) obs.push({icon:"⚠",t:`Your savings are projected to run out around age ${result.runOut} — ${result.lifeExp-result.runOut} years before your life expectancy of ${result.lifeExp}. Closing this gap should be a priority.`});
  if(ok&&result.surplusYears>0) obs.push({icon:"✓",t:`Your current plan supports a retirement that outlasts your expected lifespan by ${result.surplusYears} years. This is a strong position.`});
  if(base.savingsRate<12) obs.push({icon:"→",t:`Your current savings rate of ${pct(base.savingsRate)} is below the recommended 12–15% minimum. Increasing it now compounds significantly over time.`});
  if(result.corpusMultiple<18) obs.push({icon:"→",t:`Your corpus covers ${result.corpusMultiple.toFixed(1)}x annual spending. For a ${result.yearsInRet}-year retirement, aim for at least 20–25x.`});
  obs.push({icon:"→",t:`Your income growth is assumed at ${pct(result.INCOME_GROWTH*100,1)} per year — at minimum keeping pace with inflation, so your savings contributions grow in real terms.`});
  obs.push({icon:"→",t:"These projections are estimates. Working with an adviser can tailor strategies around tax efficiency, investment allocation, and withdrawal sequencing."});

  obs.slice(0,5).forEach(o=>{
    setFill(cardBg); doc.roundedRect(M,y,tw,16,2,2,"F");
    setTxt(ok?teal:C.warn==="→"?gold:white); doc.setFont("helvetica","bold"); doc.setFontSize(9);
    doc.text(o.icon,M+4,y+10);
    setTxt(text); doc.setFont("helvetica","normal"); doc.setFontSize(8);
    const lines=doc.splitTextToSize(o.t,tw-14);
    doc.text(lines,M+11,y+7);
    y+=lines.length>1?18:16; y+=2;
  });

  y+=6;

  // ── FOOTER ─────────────────────────────────────────────────────────
  if(y>260){doc.addPage();setFill(dark);doc.rect(0,0,W,297,"F");y=20;}
  setFill([11,15,28]); doc.rect(0,280,W,17,"F");
  setDraw([28,38,64]); doc.setLineWidth(0.3); doc.line(0,280,W,280);
  setTxt(muted); doc.setFont("helvetica","normal"); doc.setFontSize(7);
  doc.text("ARK Financial Planners · Retirement Planning Tool",M,289);
  doc.text("For educational purposes only. Not financial advice. Consult a qualified adviser.",W-M,289,{align:"right"});

  const fname=contactInfo?.name?`ARK-Plan-${contactInfo.name.split(" ")[0]}.pdf`:"ARK-Retirement-Plan.pdf";
  doc.save(fname);
}

/* ═══════════════════════════════ APP ═══════════════════════════════ */
function App() {
  const [showHero,setShowHero]=useState(true);
  const [tab,setTab]=useState("plan");
  const [showOpt,setShowOpt]=useState(false);
  const [showModal,setShowModal]=useState(false);
  const [contactInfo,setContactInfo]=useState(null);
  const appRef=useRef(null);

  const DEF={age:35,gender:"female",income:90000,monthlySpend:3200,savings:45000,savingsRate:12,retireAge:65,debtBalance:0,retireMonthlyExpenses:0};
  const [base,setBase]=useState(DEF);
  const [sandbox,setSandbox]=useState(null);
  const [sbInp,setSbInp]=useState({...DEF});
  const [result,setResult]=useState(null);
  const [stress,setStress]=useState(null);
  const [sbResult,setSbResult]=useState(null);

  const setB=(k,v)=>setBase(p=>({...p,[k]:v}));
  const setSB=(k,v)=>setSbInp(p=>({...p,[k]:v}));

  useEffect(()=>{setResult(runProjection(base));setStress(runStressTest(base));},[base]);
  useEffect(()=>{if(sandbox)setSbResult(runProjection(sbInp));},[sbInp,sandbox]);

  const openSandbox=(pr)=>{
    const f={...base};
    const m={
      save15:{...f,savingsRate:15},save20:{...f,savingsRate:20},
      earlyRetire:{...f,retireAge:Math.max(f.age+2,f.retireAge-5)},
      lateRetire:{...f,retireAge:Math.min(80,f.retireAge+5)},
      boostIncome:{...f,income:Math.round(f.income*1.2)},
      cutSpend:{...f,monthlySpend:Math.round(f.monthlySpend*0.8)},
      custom:{...f},
    };
    setSbInp(m[pr]||f);setSandbox(pr);
  };

  const handleContact=(info)=>{
    setContactInfo(info);
    if(info.download){
      setShowModal(false);
      setTimeout(()=>generatePDF(base,result,stress,info),300);
    }
  };

  const hl=result?healthLabel(result.health):{label:"",color:C.accent};
  const sbHl=sbResult?healthLabel(sbResult.health):{label:"",color:C.accent};
  const dp=sbResult&&result?sbResult.retPortfolio-result.retPortfolio:0;
  const dP=sbResult&&result?sbResult.successProb-result.successProb:0;
  const dH=sbResult&&result?sbResult.health-result.health:0;
  const dI=sbResult&&result?sbResult.retIncome-result.retIncome:0;

  const GOALS=[3000,5000,10000,25000,50000,100000,150000,250000];
  const PRES={save15:"Save 15%",save20:"Save 20%",earlyRetire:"Retire 5yr Earlier",lateRetire:"Retire 5yr Later",boostIncome:"Income +20%",cutSpend:"Spend −20%",custom:"Custom"};

  // Plain-language insights
  const insights=result?[
    !result.lastsToLifeExp&&{icon:"🔴",t:`Your money is currently projected to run out ${result.lifeExp-result.runOut} year${result.lifeExp-result.runOut!==1?"s":""} before you reach age ${result.lifeExp}. This is the most important number to work on.`},
    base.savingsRate<10&&{icon:"📈",t:`You're saving ${pct(base.savingsRate)} of your income. Nudging this to 15% could add ${fmt(runProjection({...base,savingsRate:15}).retPortfolio-result.retPortfolio)} to your pot at retirement — purely from the extra saving.`},
    result.lastsToLifeExp&&result.surplusYears>5&&{icon:"✅",t:`Your money is on track to outlast you by ${result.surplusYears} years. The focus now should be on tax efficiency and making sure your drawdown strategy is optimised.`},
    result.corpusMultiple<18&&{icon:"🔍",t:`Your retirement pot will cover roughly ${result.corpusMultiple.toFixed(1)}x your annual spending. Aim for 20–25x for a comfortable buffer across a ${result.yearsInRet}-year retirement.`},
    result.targetPortfolio&&result.monthlySavingGap>0&&{icon:"🎯",t:`To reach your goal of ${fmt(base.retireMonthlyExpenses)}/mo in retirement, you're ${fmt(result.monthlySavingGap)}/mo short. Retiring at ${base.retireAge+2} instead would close much of that gap without increasing contributions.`},
    base.retireAge-base.age<10&&base.savingsRate<20&&{icon:"⏱",t:`With ${base.retireAge-base.age} years until retirement, you're in the final stretch. Shifting to 20%+ savings and reducing risk in your portfolio is worth considering now.`},
  ].filter(Boolean).slice(0,3):[];

  if(showHero) return <Hero onStart={()=>{setShowHero(false);setTimeout(()=>appRef.current?.scrollIntoView({behavior:"smooth"}),50);}}/>;

  return (
    <div ref={appRef} style={{minHeight:"100vh"}}>
      {showModal&&result&&<ContactModal base={base} result={result} stress={stress} onClose={()=>setShowModal(false)} onSubmit={handleContact}/>}

      {/* HEADER */}
      <header style={{background:"rgba(5,8,15,0.88)",backdropFilter:"blur(20px)",borderBottom:`1px solid ${C.border}`,padding:"0 32px",display:"flex",alignItems:"center",justifyContent:"space-between",height:60,position:"sticky",top:0,zIndex:100}}>
        <button onClick={()=>setShowHero(true)} style={{display:"flex",alignItems:"center",gap:10,background:"none",border:"none",cursor:"pointer",color:"inherit",padding:0}}>
          <div style={{width:32,height:32,borderRadius:9,background:`linear-gradient(135deg,${C.accentDim},${C.accent})`,display:"grid",placeItems:"center",fontSize:14,color:"#02100C",fontWeight:800}}>◈</div>
          <div style={{textAlign:"left"}}>
            <div style={{fontFamily:"'Playfair Display'",fontSize:15,fontWeight:700,letterSpacing:"-0.01em"}}>ARK Financial Planners</div>
            <div style={{fontSize:9,color:C.muted,letterSpacing:"0.12em",textTransform:"uppercase"}}>Retirement Planning</div>
          </div>
        </button>
        <nav style={{display:"flex",gap:6}}>
          {[["plan","1 · Plan"],["results","2 · Results"],["scenarios","3 · What-Ifs"]].map(([id,lbl])=>(
            <button key={id} onClick={()=>setTab(id)} className={`tab-btn${tab===id?" act":""}`}>{lbl}</button>
          ))}
        </nav>
      </header>

      <div style={{maxWidth:1020,margin:"0 auto",padding:"32px 24px"}}>

        {/* ══ PLAN TAB ════════════════════════════════════════════════ */}
        {tab==="plan"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}} className="tc fi">
            <div>
              <div style={{marginBottom:26}}>
                <div style={{fontFamily:"'Playfair Display'",fontSize:28,fontWeight:900,lineHeight:1.15,marginBottom:8}}>
                  Let's see where you<br/>
                  <span style={{background:`linear-gradient(120deg,${C.accent},${C.gold})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>actually stand.</span>
                </div>
                <div style={{fontSize:13,color:C.muted,lineHeight:1.65}}>
                  Fill in your numbers. The right column updates in real time — including whether your money will outlast you.
                </div>
              </div>

              <div className="card" style={{padding:24,marginBottom:14}}>
                <Slider label="Your Current Age" value={base.age} min={18} max={70} fmtFn={v=>`${v} yrs`} onChange={v=>setB("age",v)}/>
                <div style={{marginBottom:20}}>
                  <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8,fontWeight:500}}>Biological Sex <span style={{textTransform:"none",letterSpacing:0,fontSize:10}}>— sets life expectancy</span></div>
                  <div style={{display:"flex",gap:8}}>
                    {[["female","Female · lives to ~85"],["male","Male · lives to ~75"]].map(([g,lbl])=>(
                      <button key={g} onClick={()=>setB("gender",g)} className={`chip${base.gender===g?" ca":""}`}>{lbl}</button>
                    ))}
                  </div>
                </div>
                <Slider label="Annual Income (gross)" value={base.income} min={20000} max={500000} step={5000} fmtFn={fmt} onChange={v=>setB("income",v)}
                  sub={`Assumed to grow at least ${pct((result?.INCOME_GROWTH||0.025)*100,1)}/yr (inflation floor)`}/>
                <Slider label="Monthly Spending (today)" value={base.monthlySpend} min={500} max={250000} step={500} fmtFn={fmt} onChange={v=>setB("monthlySpend",v)} ac={C.warn}/>
                <Slider label="Current Savings & Investments" value={base.savings} min={0} max={1000000} step={5000} fmtFn={fmt} onChange={v=>setB("savings",v)}/>
                <Slider label="Savings Rate" value={base.savingsRate} min={1} max={50} fmtFn={pct} onChange={v=>setB("savingsRate",v)}
                  ac={base.savingsRate>=20?C.accent:base.savingsRate>=10?C.gold:C.danger}/>
                <Slider label="Retirement Age" value={base.retireAge} min={Math.max(base.age+2,40)} max={80} fmtFn={v=>`Age ${v}`} onChange={v=>setB("retireAge",v)}/>
              </div>

              <div className="card" style={{padding:24,marginBottom:14,borderColor:base.retireMonthlyExpenses>0?"rgba(255,209,102,0.22)":C.border}}>
                <div style={{marginBottom:14}}>
                  <div style={{fontFamily:"'Playfair Display'",fontSize:15,fontWeight:700,marginBottom:4}}>What do you want retirement to look like?</div>
                  <div style={{fontSize:11,color:C.muted,lineHeight:1.6}}>Set a monthly spending target. We'll calculate the exact savings pot you need. Leave blank to use the standard 4% rule.</div>
                </div>
                <Slider label="Monthly spending in retirement" value={base.retireMonthlyExpenses||3000} min={500} max={300000} step={500}
                  fmtFn={v=>base.retireMonthlyExpenses===0?"Not set (using 4% rule)":fmt(v)+"/mo"}
                  onChange={v=>setB("retireMonthlyExpenses",v)} ac={C.gold}
                  sub={base.retireMonthlyExpenses>0&&result&&result.requiredSavingsRate!=null?`Needs ${pct(result.requiredSavingsRate,1)} savings rate · ${fmt(result.requiredMonthlySaving)}/mo`:null}/>
                <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                  <button onClick={()=>setB("retireMonthlyExpenses",0)} className={`chip${base.retireMonthlyExpenses===0?" cm":""}`}>Use 4% rule</button>
                  {GOALS.map(v=>(
                    <button key={v} onClick={()=>setB("retireMonthlyExpenses",v)} className={`chip${base.retireMonthlyExpenses===v?" cg":""}`}>{fmt(v)}/mo</button>
                  ))}
                </div>
              </div>

              <button onClick={()=>setShowOpt(p=>!p)} style={{width:"100%",background:"transparent",border:`1px dashed ${C.border}`,borderRadius:12,padding:"10px 16px",color:C.muted,fontSize:12,cursor:"pointer",display:"flex",justifyContent:"space-between",marginBottom:14}}>
                <span>+ Add debt balance (deducted from savings)</span>
                <span>{showOpt?"▲":"▼"}</span>
              </button>
              {showOpt&&<div className="card" style={{padding:22,marginBottom:14}}>
                <Slider label="Total Debt Balance" value={base.debtBalance} min={0} max={500000} step={5000} fmtFn={fmt} onChange={v=>setB("debtBalance",v)} ac={C.danger}/>
              </div>}

              <button className="cta" onClick={()=>setTab("results")}>Show me the full picture →</button>
            </div>

            {/* Live preview */}
            {result&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
              {/* Verdict */}
              <div className="card-g" style={{padding:24}}>
                <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:14}}>Live Preview</div>
                <div style={{marginBottom:16,padding:"14px 18px",background:result.lastsToLifeExp?"rgba(0,229,176,0.06)":"rgba(255,68,102,0.06)",border:`1px solid ${result.lastsToLifeExp?"rgba(0,229,176,0.2)":"rgba(255,68,102,0.2)"}`,borderRadius:14}}>
                  <div style={{fontFamily:"'Playfair Display'",fontSize:13,fontWeight:700,color:result.lastsToLifeExp?C.accent:C.danger,marginBottom:3}}>
                    {result.lastsToLifeExp?`✓ Money lasts past age ${result.lifeExp}`:`⚠ Money runs out before age ${result.lifeExp}`}
                  </div>
                  <div style={{fontSize:11,color:C.muted}}>
                    {result.lastsToLifeExp?`${result.surplusYears} years of buffer beyond life expectancy`:`Projected shortfall of ${result.lifeExp-result.runOut} years`}
                  </div>
                </div>
                <Chart data={result.chartData} retireAge={base.retireAge} lifeExp={result.lifeExp} stress={stress} height={130} targetPortfolio={result.targetPortfolio}/>
                <div style={{display:"flex",gap:14,marginTop:8,marginBottom:14,flexWrap:"wrap"}}>
                  {[["Building wealth",C.accent,false],["Drawing down",C.gold,true],[`Life expectancy`,C.danger,true]].map(([l,col,dash])=>(
                    <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
                      <svg width="14" height="6"><line x1="0" y1="3" x2="14" y2="3" stroke={col} strokeWidth="2" strokeDasharray={dash?"4,2":"none"}/></svg>
                      <span style={{fontSize:9,color:C.muted}}>{l}</span>
                    </div>
                  ))}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <SC label="Pot at Retirement" value={fmt(result.retPortfolio)} sub={`at age ${base.retireAge}`}/>
                  <SC label="Chance of success" value={pct(result.successProb)} color={result.successProb>=75?C.accent:result.successProb>=55?C.gold:C.danger} sub={result.lastsToLifeExp?`lasts to age ${result.lifeExp}`:`runs out age ${result.runOut}`}/>
                </div>
              </div>

              {/* Health */}
              <div className="card" style={{padding:20}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <span style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Financial Health</span>
                  <span style={{fontFamily:"'Playfair Display'",fontSize:14,fontWeight:700,color:hl.color}}>{hl.label}</span>
                </div>
                <div style={{height:5,background:C.subtle,borderRadius:3,overflow:"hidden",marginBottom:6}}>
                  <div style={{height:"100%",width:`${result.health}%`,background:`linear-gradient(90deg,${C.danger},${C.warn} 35%,${C.gold} 65%,${C.accent})`,transition:"width 0.4s ease"}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:9,color:C.muted}}>Needs work</span>
                  <span style={{fontFamily:"'Playfair Display'",fontSize:18,fontWeight:700,color:hl.color}}>{result.health}<span style={{fontSize:11,color:C.muted}}>/100</span></span>
                  <span style={{fontSize:9,color:C.muted}}>In great shape</span>
                </div>
              </div>

              {/* Lifespan bar */}
              <div className="card" style={{padding:20}}>
                <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>How long does the money last?</div>
                <LifeBar retireAge={base.retireAge} lifeExp={result.lifeExp} runOut={result.runOut}/>
              </div>

              {/* Goal */}
              {base.retireMonthlyExpenses>0&&result.targetPortfolio&&(
                <div className="card" style={{padding:20,borderColor:"rgba(255,209,102,0.18)"}}>
                  <div style={{fontSize:10,color:C.gold,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Goal: {fmt(base.retireMonthlyExpenses)}/mo</div>
                  <div style={{height:5,background:C.subtle,borderRadius:3,overflow:"hidden",marginBottom:7}}>
                    <div style={{height:"100%",width:`${Math.min(100,(result.onTrackRatio||0)*100)}%`,background:`linear-gradient(90deg,${C.goldDim},${C.gold})`,transition:"width 0.4s ease"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <span style={{fontSize:11,color:C.muted}}>Need: {fmt(result.targetPortfolio)}</span>
                    <span style={{fontSize:11,color:result.monthlySavingGap<=0?C.accent:C.warn,fontWeight:600}}>{result.monthlySavingGap<=0?"On track ✓":`Gap: +${fmt(result.monthlySavingGap)}/mo`}</span>
                  </div>
                </div>
              )}

              {/* Stress test (plain language) */}
              {stress&&(
                <div className="card" style={{padding:20}}>
                  <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>If Markets Don't Go to Plan (300 scenarios)</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
                    {[["Tough",fmt(stress.tough,true),C.warn],["Likely",fmt(stress.likely,true),C.text],["Good",fmt(stress.best,true),C.accent],["Will be OK",pct(stress.pctWillBeOk,0),stress.pctWillBeOk>=75?C.accent:stress.pctWillBeOk>=55?C.gold:C.danger]].map(([l,v,col])=>(
                      <div key={l} style={{textAlign:"center"}}>
                        <div style={{fontFamily:"'Playfair Display'",fontSize:15,fontWeight:700,color:col}}>{v}</div>
                        <div style={{fontSize:9,color:C.muted,marginTop:2}}>{l}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>}
          </div>
        )}

        {/* ══ RESULTS TAB ══════════════════════════════════════════════ */}
        {tab==="results"&&result&&(
          <div className="fi">
            <div style={{marginBottom:28,display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:16}}>
              <div>
                <div style={{fontFamily:"'Playfair Display'",fontSize:"clamp(34px,5vw,54px)",fontWeight:900,letterSpacing:"-0.03em",lineHeight:1,marginBottom:6}}>{fmt(result.retPortfolio)}</div>
                <div style={{fontSize:13,color:C.muted}}>Projected retirement pot at age {base.retireAge} · {pct(result.returnRate*100,1)} annual investment return assumed</div>
                <div style={{marginTop:10,display:"inline-flex",alignItems:"center",gap:8,padding:"7px 16px",borderRadius:100,background:result.lastsToLifeExp?"rgba(0,229,176,0.07)":"rgba(255,68,102,0.07)",border:`1px solid ${result.lastsToLifeExp?"rgba(0,229,176,0.22)":"rgba(255,68,102,0.22)"}`}}>
                  <span style={{fontSize:12,color:result.lastsToLifeExp?C.accent:C.danger,fontWeight:600}}>
                    {result.lastsToLifeExp?`✓ Funds last to age ${result.lifeExp} — ${result.surplusYears} years to spare`:`⚠ Funds run out at age ${result.runOut} — ${result.lifeExp-result.runOut} years short`}
                  </span>
                </div>
              </div>
              <div style={{background:`${hl.color}10`,border:`1px solid ${hl.color}28`,borderRadius:18,padding:"16px 24px",textAlign:"center"}}>
                <div style={{fontSize:9,color:hl.color,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4}}>Health Score</div>
                <div style={{fontFamily:"'Playfair Display'",fontSize:38,fontWeight:900,color:hl.color,lineHeight:1}}>{result.health}</div>
                <div style={{fontSize:12,color:hl.color,marginTop:2}}>{hl.label}</div>
              </div>
            </div>

            {/* Chart */}
            <div className="card" style={{padding:24,marginBottom:18}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
                <span style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Your money over time · red line = your life expectancy (age {result.lifeExp})</span>
                <div style={{display:"flex",gap:16}}>
                  {[["Building wealth",C.accent,false],["Drawing down",C.gold,true],[`Age ${result.lifeExp}`,C.danger,true]].map(([l,col,dash])=>(
                    <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
                      <svg width="16" height="6"><line x1="0" y1="3" x2="16" y2="3" stroke={col} strokeWidth="2" strokeDasharray={dash?"4,2":"none"}/></svg>
                      <span style={{fontSize:10,color:C.muted}}>{l}</span>
                    </div>
                  ))}
                </div>
              </div>
              <Chart data={result.chartData} retireAge={base.retireAge} lifeExp={result.lifeExp} stress={stress} height={170} targetPortfolio={result.targetPortfolio}/>
              <LifeBar retireAge={base.retireAge} lifeExp={result.lifeExp} runOut={result.runOut}/>
            </div>

            {/* Goal panel */}
            {base.retireMonthlyExpenses>0&&<GoalPanel result={result} base={base}/>}

            {/* 4-stat grid */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:18}} className="fc">
              <SC label="Income in Retirement" value={fmt(base.retireMonthlyExpenses>0?result.withdrawal:result.retIncome)} sub={base.retireMonthlyExpenses>0?"your goal (inflation-adjusted)":"4% rule estimate"} color={base.retireMonthlyExpenses>0?C.gold:undefined}/>
              <SC label="Chance of Success" value={pct(result.successProb)} sub="money outlasts you" color={result.successProb>=75?C.accent:result.successProb>=55?C.gold:C.danger}/>
              <SC label="If Markets Struggle" value={fmt(stress?stress.tough:0,true)} sub="conservative scenario" color={C.warn}/>
              <SC label="Years of Coverage" value={`${result.corpusMultiple.toFixed(1)}×`} sub={`your annual spending · ${result.yearsInRet}yr retirement`} color={result.corpusMultiple>=22?C.accent:result.corpusMultiple>=16?C.gold:C.danger}/>
            </div>

            {/* Stress test (plain language) */}
            {stress&&<div className="card" style={{padding:22,marginBottom:18}}>
              <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:16}}>What Happens if Markets Don't Cooperate? (300 scenarios run)</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}} className="sc">
                {[["If things go badly",stress.tough,C.warn,"Markets underperform, income stays flat"],["Most likely outcome",stress.likely,C.text,"Based on your inputs and typical market returns"],["If things go well",stress.best,C.accent,"Markets outperform, your income grows faster"]].map(([l,v,col,sub])=>(
                  <div key={l} style={{background:C.subtle,borderRadius:14,padding:"16px 18px"}}>
                    <div style={{fontFamily:"'Playfair Display'",fontSize:24,fontWeight:700,color:col}}>{fmt(v)}</div>
                    <div style={{fontSize:11,color:col,marginTop:2,fontWeight:600}}>{l}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:3}}>{sub}</div>
                  </div>

              </div>
              <div style={{marginTop:14,padding:"12px 16px",background:C.subtle,borderRadius:12,fontSize:12,color:C.muted}}>
                <b style={{color:stress.pctWillBeOk>=75?C.accent:C.warn}}>{pct(stress.pctWillBeOk,0)}</b> of all 300 scenarios show your money lasting to age {result.lifeExp}.
                {stress.pctWillBeOk<70&&<span style={{color:C.warn}}> We'd like to see this above 75% — let's look at what changes that.</span>}
              </div>
            </div>}

            {/* Insights */}
            {insights.length>0&&<div className="card" style={{padding:22,marginBottom:20}}>
              <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:14}}>What This Means For You</div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {insights.map((t,i)=>(
                  <div key={i} style={{display:"flex",gap:14,padding:"13px 16px",background:C.subtle,borderRadius:14}}>
                    <span style={{fontSize:18,flexShrink:0}}>{t.icon}</span>
                    <span style={{fontSize:13,color:C.muted,lineHeight:1.65}}>{t.t}</span>

              </div>

              <div>
                <div style={{fontFamily:"'Playfair Display'",fontSize:18,fontWeight:700,marginBottom:5}}>

                </div>
                <div style={{fontSize:13,color:C.muted,lineHeight:1.6,maxWidth:420}}>
                  {result.lastsToLifeExp
                    ?"A 30-minute conversation with one of our advisers can identify optimisations you might be missing — tax efficiency, investment mix, drawdown timing."
                    :"Our advisers specialise in exactly this situation. A single conversation often uncovers straightforward ways to close the shortfall."}
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10,alignItems:"flex-end"}}>
                <button onClick={()=>setShowModal(true)} style={{padding:"13px 28px",borderRadius:13,background:`linear-gradient(135deg,${C.accentDim},${C.accent})`,border:"none",color:"#02100C",fontFamily:"'DM Sans'",fontSize:14,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",boxShadow:`0 3px 22px rgba(0,229,176,0.22)`}}>
                  Get your plan + PDF summary
                </button>
                <div style={{fontSize:11,color:C.muted,textAlign:"right"}}>Free consultation · No obligation</div>
              </div>
            </div>
          </div>
        )}

        {/* ══ SCENARIOS / WHAT-IFS TAB ════════════════════════════════ */}
        {tab==="scenarios"&&result&&(
          <div className="fi">
            <div style={{marginBottom:22}}>
              <div style={{fontFamily:"'Playfair Display'",fontSize:26,fontWeight:700,marginBottom:6}}>What If…</div>
              <div style={{fontSize:13,color:C.muted}}>Pick a scenario, adjust the sliders, and see how each decision changes whether your money lasts.</div>
            </div>

            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:24}}>
              {Object.entries(PRES).map(([key,label])=>(
                <button key={key} onClick={()=>openSandbox(key)} className={`chip${sandbox===key?" ca":""}`}>{label}</button>
              ))}
            </div>

            {sandbox&&sbResult?(
              <div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}} className="tc">
                  {[{label:"Your current plan",res:result,inp:base,isScen:false},{label:`Scenario: ${PRES[sandbox]}`,res:sbResult,inp:sbInp,isScen:true}].map(({label,res,inp,isScen})=>(
                    <div key={label}>
                      <div style={{fontSize:10,color:isScen?C.accent:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>{label}</div>
                      <div style={{background:C.card,border:`1px solid ${isScen?"rgba(0,229,176,0.22)":C.border}`,borderRadius:20,padding:20}}>
                        <div style={{fontFamily:"'Playfair Display'",fontSize:28,fontWeight:700,color:isScen?(dp>=0?C.accent:C.danger):C.text,marginBottom:2}}>{fmt(res.retPortfolio)}</div>
                        <div style={{fontSize:11,color:res.lastsToLifeExp?C.accent:C.danger,marginBottom:12}}>
                          {res.lastsToLifeExp?`✓ lasts to age ${res.lifeExp}`:`⚠ runs out at ${res.runOut}`}
                        </div>
                        <Chart data={res.chartData} retireAge={inp.retireAge} lifeExp={res.lifeExp} height={100} targetPortfolio={res.targetPortfolio}/>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:12}}>
                          {[["Success",pct(res.successProb),isScen?(dP>=0?C.accent:C.danger):C.text],["Health",String(res.health),healthLabel(res.health).color],["Coverage",`${res.corpusMultiple.toFixed(1)}×`,C.text]].map(([l,v,col])=>(
                            <div key={l} style={{textAlign:"center"}}>
                              <div style={{fontFamily:"'Playfair Display'",fontSize:15,fontWeight:700,color:col}}>{v}</div>
                              <div style={{fontSize:9,color:C.muted}}>{l}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>

                {/* Impact */}
                <div className="card" style={{padding:"16px 22px",marginBottom:18,display:"flex",alignItems:"center",gap:28,flexWrap:"wrap"}}>
                  <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em"}}>Difference vs your current plan</div>
                  {[["Pot size",dp>=0?`+${fmt(dp)}`:fmt(dp),dp],["Chances",`${dP>=0?"+":""}${dP.toFixed(0)}pp`,dP],["Health",`${dH>=0?"+":""}${dH}`,dH],["Income/yr",`${dI>=0?"+":""}${fmt(dI)}/yr`,dI],["Lasts?",sbResult.lastsToLifeExp?"Yes ✓":"No ⚠",sbResult.lastsToLifeExp?1:-1]].map(([label,val,d])=>(
                    <div key={label}>
                      <div style={{fontFamily:"'Playfair Display'",fontSize:17,fontWeight:700,color:d>=0?C.accent:C.danger}}>{val}</div>
                      <div style={{fontSize:10,color:C.muted}}>{label}</div>
                    </div>
                  ))}
                </div>

                {/* Sliders */}
                <div className="card" style={{padding:24}}>
                  <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:18}}>Adjust the scenario · numbers update instantly</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 30px"}} className="tc">
                    <Slider label="Annual Income" value={sbInp.income} min={20000} max={500000} step={5000} fmtFn={fmt} onChange={v=>setSB("income",v)} ac={C.accent}/>
                    <Slider label="Monthly Spending" value={sbInp.monthlySpend} min={500} max={250000} step={500} fmtFn={fmt} onChange={v=>setSB("monthlySpend",v)} ac={C.warn}/>
                    <Slider label="Savings Rate" value={sbInp.savingsRate} min={1} max={50} fmtFn={pct} onChange={v=>setSB("savingsRate",v)} ac={C.accent}/>
                    <Slider label="Retirement Age" value={sbInp.retireAge} min={Math.max(sbInp.age+2,40)} max={80} fmtFn={v=>`Age ${v}`} onChange={v=>setSB("retireAge",v)} ac={C.gold}/>
                    <Slider label="Current Savings" value={sbInp.savings} min={0} max={1000000} step={5000} fmtFn={fmt} onChange={v=>setSB("savings",v)} ac={C.accent}/>
                    <Slider label="Debt Balance" value={sbInp.debtBalance} min={0} max={500000} step={5000} fmtFn={fmt} onChange={v=>setSB("debtBalance",v)} ac={C.danger}/>
                  </div>
                  <div style={{borderTop:`1px solid ${C.border}`,marginTop:8,paddingTop:18}}>
                    <Slider label="Monthly retirement spending target" value={sbInp.retireMonthlyExpenses||3000} min={500} max={300000} step={500}
                      fmtFn={v=>sbInp.retireMonthlyExpenses===0?"Not set (4% rule)":fmt(v)+"/mo"}
                      onChange={v=>setSB("retireMonthlyExpenses",v)} ac={C.gold}
                      sub={sbInp.retireMonthlyExpenses>0&&sbResult?.requiredSavingsRate!=null?`Needs ${pct(sbResult.requiredSavingsRate,1)} savings rate`:null}/>
                    <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                      <button onClick={()=>setSB("retireMonthlyExpenses",0)} className={`chip${sbInp.retireMonthlyExpenses===0?" cm":""}`}>Use 4% rule</button>
                      {GOALS.map(v=>(
                        <button key={v} onClick={()=>setSB("retireMonthlyExpenses",v)} className={`chip${sbInp.retireMonthlyExpenses===v?" cg":""}`}>{fmt(v)}/mo</button>
                      ))}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:12,marginTop:20,flexWrap:"wrap"}}>
                    <button className="sec" onClick={()=>{setBase({...sbInp});setSandbox(null);setTab("results");}}>Make this my plan →</button>
                    <button className="sec" style={{borderColor:C.gold,color:C.gold,background:"rgba(255,209,102,0.06)"}} onClick={()=>setShowModal(true)}>Get PDF + speak to an adviser</button>
                  </div>
                </div>
              </div>
            ):(
              <div style={{textAlign:"center",padding:"70px 0",color:C.muted,fontSize:14}}>
                <div style={{fontSize:32,marginBottom:12}}>🧪</div>
                Choose a scenario above to get started
              </div>
            )}
          </div>
        )}
      </div>

      {/* FOOTER */}
      <footer style={{borderTop:`1px solid ${C.border}`,padding:"22px 32px",marginTop:48,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:24,height:24,borderRadius:7,background:`linear-gradient(135deg,${C.accentDim},${C.accent})`,display:"grid",placeItems:"center",fontSize:11,color:"#02100C",fontWeight:800}}>◈</div>
          <span style={{fontFamily:"'Playfair Display'",fontSize:13,fontWeight:700}}>ARK Financial Planners</span>
        </div>
        <div style={{fontSize:11,color:C.muted,maxWidth:540,textAlign:"right",lineHeight:1.65}}>
          For educational purposes only. Not financial advice. Life expectancy figures are statistical benchmarks — individual outcomes vary significantly. Consult a qualified financial adviser before making any retirement or investment decisions.
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
