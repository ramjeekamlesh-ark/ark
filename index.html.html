                ))}
              </div>
              {result.targetPortfolio&&(
                <div style={{marginTop:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:5}}>
                    <span style={{color:"#4A5A7E"}}>Progress to target pot</span>
                    <span style={{color:result.onTrackRatio>=1?"#00E5B0":"#FF8F5A",fontWeight:600}}>
                      {result.onTrackRatio>=1?"On track ✓":`${((result.onTrackRatio||0)*100).toFixed(0)}% of the way there`}
                    </span>
                  </div>
                  <div style={{height:7,background:"#141D33",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${Math.min(100,(result.onTrackRatio||0)*100)}%`,
                      background:base.incomeMode==="custom"?"linear-gradient(90deg,#5C5CE0,#8B8BFF)":"linear-gradient(90deg,#C9A13B,#FFD166)",
                      transition:"width .4s"}}/>
                  </div>
                  {result.monthlySavingGap>0&&(
                    <div style={{marginTop:8,fontSize:12,color:"#FF8F5A"}}>
                      Save an additional <b>{disp(result.monthlySavingGap)}/mo</b> to hit your goal.
                      {result.reqSavingsRate&&<> That means a savings rate of <b>{result.reqSavingsRate.toFixed(1)}%</b>.</>}
                    </div>
                  )}
                  {result.monthlySavingGap<=0&&(
                    <div style={{marginTop:8,fontSize:12,color:"#00E5B0"}}>
                      ✓ You're on track. Your pot is projected to cover your target income.
                    </div>
                  )}
                </div>
              )}
              <div style={{marginTop:12,fontSize:11,color:"#4A5A7E"}}>
                → Change this on the Plan tab. Try different income modes to understand your options.
              </div>
            </div>

            {/* Stress test */}
            {stress&&<div className="card" style={{padding:22,marginBottom:18}}>
              <div style={{fontSize:11,color:"#4A5A7E",textTransform:"uppercase",letterSpacing:".1em",marginBottom:16}}>
                Range of outcomes (300 simulations)
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:16}} className="sc">
                {[["Tough market (bottom 10%)",stress.tough,"#FF8F5A"],["Most likely (median)",stress.likely,"#ECF0FA"],["Good market (top 10%)",stress.best,"#00E5B0"]].map(([l,v,col])=>(
                  <div key={l} style={{textAlign:"center",background:"#141D33",borderRadius:12,padding:"14px 0"}}>
                    <div style={{fontFamily:"'Playfair Display'",fontSize:22,fontWeight:700,color:col}}>{disp(v,true)}</div>
                    <div style={{fontSize:9,color:"#4A5A7E",marginTop:3,padding:"0 8px",lineHeight:1.4}}>{l}</div>
                  </div>
                ))}
              </div>
              <div style={{textAlign:"center",padding:"12px",background:"rgba(0,229,176,.04)",borderRadius:10,border:"1px solid rgba(0,229,176,.1)"}}>
                <b style={{color:stress.pctOk>=75?"#00E5B0":stress.pctOk>=55?"#FFD166":"#FF4466",fontFamily:"'Playfair Display'",fontSize:22}}>{stress.pctOk.toFixed(0)}%</b>
                <span style={{fontSize:12,color:"#4A5A7E"}}> of scenarios: money lasts to life expectancy age {result.lifeExp}</span>
              </div>
            </div>}

            {/* Household breakdown */}
            {hhMode&&result.p1Pot!=null&&(
              <div className="card" style={{padding:22,marginBottom:18}}>
                <div style={{fontSize:11,color:"#4A5A7E",textTransform:"uppercase",letterSpacing:".1em",marginBottom:16}}>How the household pot is built</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}} className="tc">
                  {[
                    {label:"👤 You",pot:result.p1Pot,retAge:base.retireAge,lifeExp:result.p1LifeExp,color:"#00E5B0",savings:base.savings,savRate:base.savingsRate,income:base.income},
                    {label:"👤 Partner",pot:result.p2Pot,retAge:partner.retireAge,lifeExp:result.p2LifeExp,color:"#8B8BFF",savings:partner.savings,savRate:partner.savingsRate,income:partner.income},
                  ].map(p=>(
                    <div key={p.label} style={{background:"#141D33",borderRadius:14,padding:"16px 18px",border:`1px solid ${p.color}22`}}>
                      <div style={{fontSize:10,color:p.color,textTransform:"uppercase",letterSpacing:".08em",marginBottom:8}}>{p.label}</div>
                      <div style={{fontFamily:"'Playfair Display'",fontSize:26,fontWeight:700,color:p.color,marginBottom:2}}>{disp(p.pot)}</div>
                      <div style={{fontSize:11,color:"#4A5A7E",marginBottom:10}}>pot at age {p.retAge} · life exp. {p.lifeExp}</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                        {[["Income",disp(p.income)],["Savings",disp(p.savings)],["Saves",p.savRate+"%/yr"],["Retires","Age "+p.retAge]].map(([l,v])=>(
                          <div key={l} style={{background:"#0F1525",borderRadius:8,padding:"8px 10px"}}>
                            <div style={{fontSize:8,color:"#4A5A7E",textTransform:"uppercase",letterSpacing:".07em",marginBottom:1}}>{l}</div>
                            <div style={{fontSize:13,fontWeight:600,color:"#ECF0FA"}}>{v}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{background:"rgba(0,229,176,.04)",borderRadius:12,padding:"14px 18px",border:"1px solid rgba(0,229,176,.1)"}}>
                  <div style={{fontSize:11,color:"#4A5A7E",marginBottom:8}}>Combined household pot: <b style={{color:"#00E5B0"}}>{disp(result.retPortfolio)}</b> — modelled on a <b>last-survivor basis</b> (funds planned to last to the longest-lived partner, age {result.lifeExp})</div>
                  <div style={{fontSize:11,color:"#4A5A7E"}}>Shared expenses: <b style={{color:"#FF8F5A"}}>{disp(base.monthlySpend)}/mo</b>
                    {base.debtBalance>0&&<> · Household debt: <b style={{color:"#FF4466"}}>{disp(base.debtBalance)}</b></>}
                  </div>
                </div>
              </div>
            )}

            {/* Action + CTA */}
            {verdict&&<div style={{background:`${verdict.color}10`,border:`1.5px solid ${verdict.color}33`,borderRadius:18,padding:"20px 22px",marginBottom:20}}>
              <div style={{fontFamily:"'Playfair Display'",fontSize:17,fontWeight:700,color:verdict.color,marginBottom:6}}>
                {verdict.icon} {verdict.headline}
              </div>
              <div style={{fontSize:13,color:"#ECF0FA",lineHeight:1.65,marginBottom:6}}>{verdict.sub}</div>
              <div style={{fontSize:12,color:"#4A5A7E",fontStyle:"italic"}}>→ {verdict.action}</div>
            </div>}

            <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
              <button className="cta" style={{flex:1,minWidth:160}} onClick={()=>setShowModal(true)}>
                Get a personalised plan →
              </button>
              <button className="sec" onClick={()=>setTab("scenarios")}>
                Explore What-Ifs →
              </button>
            </div>
          </div>
        )}

        {/* ══ SCENARIOS TAB ════════════════════════════════════════════════ */}
        {tab==="scenarios"&&result&&(
          <div className="fi">
            <div style={{marginBottom:22}}>
              <div style={{fontFamily:"'Playfair Display'",fontSize:22,fontWeight:900,marginBottom:6}}>What-If Scenarios</div>
              <div style={{fontSize:13,color:"#4A5A7E",lineHeight:1.6}}>Three quick scenarios to stress-test your plan — or build your own.</div>
            </div>

            {!sandbox&&(
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:18}} className="tc sc">
                {scenarios.map(sc=>(
                  <button key={sc.id} className={`scene-card${sandbox===sc.id?" act":""}`}
                    onClick={()=>{setSandbox(sc.id);setSbInp({...sc.inp});}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                      <div className="scene-q">{sc.q}</div>
                      <span style={{fontSize:10,padding:"3px 10px",borderRadius:100,border:`1px solid ${sc.badgeCol}44`,
                        color:sc.badgeCol,background:`${sc.badgeCol}11`,flexShrink:0,marginLeft:8,marginTop:2,whiteSpace:"nowrap"}}>{sc.badge}</span>
                    </div>
                    <div className="scene-sub">{sc.hook}</div>
                  </button>
                ))}
              </div>
            )}

            {sandbox&&(()=>{
              const sc=scenarios.find(s=>s.id===sandbox);
              if(!sc||!sbResult) return null;
              return(
                <div>
                  <button onClick={()=>setSandbox(null)} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"1px solid #1C2640",color:"#4A5A7E",borderRadius:10,padding:"8px 14px",cursor:"pointer",fontSize:12,marginBottom:18,fontFamily:"'DM Sans'"}}>
                    ← All scenarios
                  </button>

                  {sc&&<div style={{background:"rgba(0,229,176,.06)",border:"1px solid rgba(0,229,176,.2)",borderRadius:16,padding:"16px 20px",marginBottom:18}}>
                    <div style={{fontFamily:"'Playfair Display'",fontSize:16,fontWeight:700,marginBottom:4}}>{sc.q}</div>
                    <div style={{fontSize:13,color:sbResult.lastsToLifeExp?"#00E5B0":"#FF8F5A",lineHeight:1.6,fontWeight:600}}>
                      {sbResult.lastsToLifeExp?`✓ ${sc.hook}`:`⚠ ${sc.hook}`}
                    </div>
                  </div>}

                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}} className="tc">
                    {[{label:"Your current plan",res:result,inp:base,isScen:false},{label:"This scenario",res:sbResult,inp:sbInp,isScen:true}].map(({label,res,inp,isScen})=>(
                      <div key={label}>
                        <div style={{fontSize:10,color:isScen?"#00E5B0":"#4A5A7E",textTransform:"uppercase",letterSpacing:".1em",marginBottom:8}}>{label}</div>
                        <div style={{background:"#0F1525",border:`1px solid ${isScen?"rgba(0,229,176,.22)":"#1C2640"}`,borderRadius:20,padding:20}}>
                          <div style={{fontFamily:"'Playfair Display'",fontSize:26,fontWeight:700,color:isScen?(dp>=0?"#00E5B0":"#FF4466"):"#ECF0FA",marginBottom:2}}>{disp(res.retPortfolio)}</div>
                          <div style={{fontSize:11,color:res.lastsToLifeExp?"#00E5B0":"#FF4466",marginBottom:12}}>
                            {res.lastsToLifeExp?`✓ lasts to age ${res.lifeExp}`:`⚠ runs out at ${res.runOut}`}
                          </div>
                          <Chart data={res.chartData} retireAge={inp.retireAge} lifeExp={res.lifeExp} height={100}
                            goalMarkers={(inp.lifeGoals||[]).map(g=>({yr:g.atAge,icon:g.icon}))}/>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:12}}>
                            {[["Success",`${res.successProb}%`,isScen?(dP>=0?"#00E5B0":"#FF4466"):"#ECF0FA"],
                              ["Health",String(res.health),healthLabel(res.health).color]].map(([l,v,col])=>(
                              <div key={l} style={{textAlign:"center",background:"#141D33",borderRadius:10,padding:"8px 0"}}>
                                <div style={{fontFamily:"'Playfair Display'",fontSize:17,fontWeight:700,color:col}}>{v}</div>
                                <div style={{fontSize:9,color:"#4A5A7E"}}>{l}</div>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>

                  {/* Delta bar */}
                  <div className="card" style={{padding:"15px 20px",marginBottom:18,display:"flex",alignItems:"center",gap:24,flexWrap:"wrap"}}>
                    <div style={{fontSize:10,color:"#4A5A7E",textTransform:"uppercase",letterSpacing:".08em",flexShrink:0}}>vs your plan</div>
                    {[["Pot",dp>=0?`+${disp(dp)}`:disp(dp),dp],
                      ["Success",`${dP>=0?"+":""}${dP.toFixed(0)}pp`,dP],
                      ["Health",`${dH>=0?"+":""}${dH}`,dH],
                      ["Lasts?",sbResult.lastsToLifeExp?"Yes ✓":"No ⚠",sbResult.lastsToLifeExp?1:-1],
                    ].map(([label,val,d])=>(
                      <div key={label}>
                        <div style={{fontFamily:"'Playfair Display'",fontSize:16,fontWeight:700,color:d>=0?"#00E5B0":"#FF4466"}}>{val}</div>
                        <div style={{fontSize:9,color:"#4A5A7E"}}>{label}</div>
                      </div>
                    ))}
                  </div>

                  {/* Fine-tune sliders */}
                  <div className="card" style={{padding:24}}>
                    <div style={{fontSize:10,color:"#4A5A7E",textTransform:"uppercase",letterSpacing:".1em",marginBottom:18}}>Fine-tune this scenario</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 30px"}} className="tc">
                      <Slider label={`Annual Income (${cur})`} value={fromBase(sbInp.income)}
                        min={minIncome} max={maxIncome} step={stepIncome}
                        fmtFn={v=>sym+(v>=1e6?(v/1e6).toFixed(1)+"M":v>=1e3?(v/1e3).toFixed(0)+"K":Math.round(v).toLocaleString())}
                        onChange={v=>setSB("income",toBase(v))} color="#00E5B0"/>
                      <Slider label={`Monthly Spending (${cur})`} value={fromBase(sbInp.monthlySpend)}
                        min={minSpend} max={maxSpend} step={stepSpend}
                        fmtFn={v=>sym+(v>=1e3?(v/1e3).toFixed(0)+"K":Math.round(v).toLocaleString())+"/mo"}
                        onChange={v=>setSB("monthlySpend",toBase(v))} color="#FF8F5A"/>
                      <SavingsSlider income={sbInp.income} savingsRate={sbInp.savingsRate}
                        onChange={v=>setSB("savingsRate",v)} disp={disp}/>
                      <Slider label="Retirement Age" value={sbInp.retireAge}
                        min={Math.max(sbInp.age+2,40)} max={80}
                        fmtFn={v=>`Age ${v}`} onChange={v=>setSB("retireAge",v)} color="#FFD166"/>
                      <Slider label={`Current Savings (${cur})`} value={fromBase(sbInp.savings)}
                        min={0} max={maxSavings} step={stepSavings}
                        fmtFn={v=>v===0?"None":sym+(v>=1e6?(v/1e6).toFixed(1)+"M":v>=1e3?(v/1e3).toFixed(0)+"K":Math.round(v).toLocaleString())}
                        onChange={v=>setSB("savings",toBase(v))} color="#00E5B0"/>
                    </div>
                    <div style={{display:"flex",gap:12,marginTop:18,flexWrap:"wrap"}}>
                      <button className="sec" onClick={()=>{setBase({...sbInp});setSandbox(null);setTab("results");}}>
                        {hhMode?"Make this our plan →":"Make this my plan →"}
                      </button>
                      <button className="sec" style={{borderColor:"#FFD166",color:"#FFD166",background:"rgba(255,209,102,.06)"}}
                        onClick={()=>setShowModal(true)}>
                        Get PDF + speak to an adviser
                      </button>
                    </div>
                  </div>
                </div>
              );
            })()}
          </div>
        )}
      </div>

      {/* FOOTER */}
      <footer style={{borderTop:"1px solid #1C2640",padding:"20px 28px",marginTop:48,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:24,height:24,borderRadius:7,background:"linear-gradient(135deg,#00A87E,#00E5B0)",display:"grid",placeItems:"center",fontSize:11,color:"#02100C",fontWeight:800}}>◈</div>
          <span style={{fontFamily:"'Playfair Display'",fontSize:13,fontWeight:700}}>ARK Financial Planners</span>
          <span style={{fontSize:11,color:"#4A5A7E",marginLeft:4}}>{hhMode?"Household analysis · ":""}USD/MUR: 1 USD = {FX_MUR} MUR (fixed Jun 2025)</span>
        </div>
        <div style={{fontSize:11,color:"#4A5A7E",maxWidth:480,textAlign:"right",lineHeight:1.65}}>
          For educational purposes only. Not financial advice. Consult a qualified financial adviser before making decisions.
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
