<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ARK CRM — Consultants Portal</title>
<style>
:root{
  --bg:#F7F8FA;--surface:#fff;--card:#fff;--border:#E8EAF0;
  --text:#111827;--muted:#6B7280;--hint:#9CA3AF;--subtle:#F3F4F6;
  --accent:#1A56DB;--accent-lt:#EEF3FD;
  --ok:#16A34A;--ok-lt:#F0FDF4;
  --warn:#D97706;--warn-lt:#FFFBEB;
  --danger:#DC2626;--danger-lt:#FEF2F2;
  --p2:#7C3AED;--p2-lt:#F5F3FF;
  --archive:#78716C;--archive-lt:#F5F4F2;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:var(--text);font-size:14px;line-height:1.6}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:30px;height:30px;border-radius:8px;background:var(--accent);display:grid;place-items:center;font-size:13px;font-weight:700;color:#fff}
.logo-name{font-size:14px;font-weight:600}
.logo-tag{font-size:10px;color:var(--muted)}
.wrap{max-width:1100px;margin:0 auto;padding:24px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px;width:100%;max-width:380px}
.login-title{font-size:20px;font-weight:600;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.field{margin-bottom:14px}
.field-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.inp{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--card);color:var(--text);outline:none}
.inp:focus{border-color:var(--accent)}
.btn{padding:11px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#1447B8}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-ghost:hover{background:var(--subtle)}
.btn-danger{background:var(--danger-lt);border:1px solid rgba(220,38,38,.2);color:var(--danger)}
.btn-archive{background:var(--archive-lt);border:1px solid rgba(120,113,108,.25);color:var(--archive)}.btn-archive:hover{background:#EAE8E6}
.nav-tabs{display:flex;gap:4px;background:var(--subtle);border-radius:10px;padding:3px;border:1px solid var(--border);margin-bottom:24px}
.nav-tab{flex:1;padding:8px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center}
.nav-tab.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.06em}
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.tbl-wrap.arc{border-color:rgba(120,113,108,.35)}
.tbl-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.tbl-title{font-size:14px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--subtle)}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--subtle)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600}
.badge-new{background:#EEF3FD;color:#1A56DB}.badge-assigned{background:#FFFBEB;color:#B45309}
.badge-contacted{background:#F0FDF4;color:#16A34A}.badge-closed{background:#F3F4F6;color:#6B7280}
.badge-archived{background:var(--archive-lt);color:var(--archive)}
.search-bar{display:flex;gap:8px;flex-wrap:wrap}
.search-inp{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:var(--card);color:var(--text);outline:none;min-width:180px}
.search-inp:focus{border-color:var(--accent)}
select.search-inp{cursor:pointer}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:560px;width:100%;padding:28px;position:relative;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:600;margin-bottom:16px}
.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:12px;position:relative;padding-bottom:16px}
.tl-item:last-child{padding-bottom:0}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
.tl-line{position:absolute;left:4px;top:15px;bottom:0;width:2px;background:var(--border)}
.tl-item:last-child .tl-line{display:none}
.tl-body{flex:1;min-width:0}
.tl-date{font-size:10px;color:var(--muted);margin-bottom:2px}
.tl-text{font-size:13px;line-height:1.5}
.consultant-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:24px}
.consultant-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:all .15s}
.consultant-card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(26,86,219,.1)}
.avatar-big{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:16px;font-weight:700;margin-bottom:12px}
.sec-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
textarea.inp{resize:vertical;min-height:80px}
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px}
.alert-err{background:var(--danger-lt);border:1px solid rgba(220,38,38,.2);color:var(--danger)}
.archive-banner{background:var(--archive-lt);border:1px solid rgba(120,113,108,.2);border-radius:10px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:flex-start;gap:12px;font-size:12px;color:var(--archive)}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.spinner{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:var(--muted);font-size:13px}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:700px){
  .stats-row{grid-template-columns:1fr 1fr}
  .consultant-grid{grid-template-columns:1fr 1fr}
  table{font-size:12px}td,th{padding:8px 10px}
  .wrap{padding:16px}
}
</style>
</head>

/* ── Helpers ── */
function fmt(ts){
  if(!ts)return"—";
  const d=new Date(ts);
  return d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})+" "+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
}
function fmtShort(ts){
  if(!ts)return"—";
  return new Date(ts).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
}

function docToLead(doc){
  const d=doc.data();
  return{
    id:doc.id,
    name:d.name||"Unknown",email:d.email||"",phone:d.phone||"",
    health:d.health,sp:d.sp,pot:d.pot,potRaw:d.potRaw,
    monthlyIncome:d.monthlyIncome,monthlyIncomeRaw:d.monthlyIncomeRaw,
    verdict:d.verdict,lasts:d.lasts,fundsToAge:d.fundsToAge,
    surplusYears:d.surplusYears,coverageMultiple:d.coverageMultiple,
    retireAge:d.retireAge,age:d.age,gender:d.gender,lifeExpectancy:d.lifeExpectancy,
    savingsRate:d.savingsRate,income:d.income,monthlySpend:d.monthlySpend,
    savings:d.savings,debtBalance:d.debtBalance||null,
    incomeMode:d.incomeMode||"rule4",
    scenarioSelected:d.scenarioSelected||"likely",scenarioRate:d.scenarioRate||"5%",
    goals:d.goals||[],goalsDetail:d.goalsDetail||[],
    potWorstCase:d.potWorstCase||null,potBestCase:d.potBestCase||null,

    partnerAge:d.partnerAge||null,partnerGender:d.partnerGender||null,
    partnerRetireAge:d.partnerRetireAge||null,partnerSavingsRate:d.partnerSavingsRate||null,
    partnerIncome:d.partnerIncome||null,partnerSavings:d.partnerSavings||null,
    p1Pot:d.p1Pot||null,p2Pot:d.p2Pot||null,
    status:d.status||"new",assignedTo:d.assignedTo||"",priority:d.priority||"normal",
    history:d.history||[{ts:new Date().toISOString(),text:"Lead received from planner",author:"System",type:"system"}],
    createdAt:d.ts||d.createdAt||new Date().toISOString(),
    updatedAt:d.updatedAt||d.ts||new Date().toISOString(),
    archived:d.archived||false,archivedAt:d.archivedAt||null,archivedBy:d.archivedBy||null,
  };
}

async function downloadReport(lead){
  try{
    if(!lead.reportKey)return false;
    const snap=await db.collection("reports").doc(String(lead.reportKey)).get();
    if(!snap.exists)return false;
    const html=snap.data().html;
    if(!html)return false;
    const blob=new Blob([html],{type:"text/html;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="ARK-Report-"+(lead.name||"Client").replace(/\s+/g,"-")+".html";
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
    return true;
  }catch(e){console.error("Report download:",e);return false;}
}

function StatusBadge({status,isArchived}){
  if(isArchived)return h("span",{className:"badge badge-archived"},"Archived");
  const map={new:{cls:"badge-new",label:"New"},assigned:{cls:"badge-assigned",label:"Assigned"},contacted:{cls:"badge-contacted",label:"Contacted"},closed:{cls:"badge-closed",label:"Closed"}};
  const s=map[status]||map.new;
  return h("span",{className:"badge "+s.cls},s.label);
}

/* ═══════════════════════════════════════════════════════════════
   LOGIN
   ═══════════════════════════════════════════════════════════════ */
function Login(){
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[err,setErr]=useState("");
  const[busy,setBusy]=useState(false);
  const submit=async()=>{
    if(!email.trim()||!password)return;
    setErr("");setBusy(true);
    try{
      await auth.signInWithEmailAndPassword(email.trim(),password);
    }catch(e){
      setErr(["auth/user-not-found","auth/wrong-password","auth/invalid-credential"].includes(e.code)
        ?"Invalid email or password.":"Sign-in error: "+e.message);
    }
    setBusy(false);
  };
  return h("div",{className:"login-wrap"},
    h("div",{className:"login-card"},
      h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:20}},
        h("div",{className:"logo-mark",style:{width:36,height:36,fontSize:16}},"A"),
        h("div",null,
          h("div",{style:{fontSize:16,fontWeight:700}},"ARK Financial Planners"),
          h("div",{style:{fontSize:11,color:"var(--muted)"}},"Consultants Portal")
        )
      ),
      h("div",{className:"login-title"},"Sign in"),
      h("div",{className:"login-sub"},"For authorised consultants only"),
      err&&h("div",{className:"alert alert-err"},err),
      h("div",{className:"field"},
        h("div",{className:"field-lbl"},"Email address"),
        h("input",{className:"inp",type:"email",value:email,placeholder:"you@arkfp.com",
          onChange:e=>setEmail(e.target.value),onKeyDown:e=>e.key==="Enter"&&submit()})
      ),
      h("div",{className:"field"},
        h("div",{className:"field-lbl"},"Password"),
        h("input",{className:"inp",type:"password",value:password,placeholder:"••••••••",
          onChange:e=>setPassword(e.target.value),onKeyDown:e=>e.key==="Enter"&&submit()})
      ),
      h("button",{className:"btn btn-primary",style:{width:"100%",marginTop:8,opacity:busy?.6:1},
        onClick:submit,disabled:busy},busy?"Signing in…":"Sign in →")
    )
  );
}

/* ═══════════════════════════════════════════════════════════════
   LEAD MODAL
   ═══════════════════════════════════════════════════════════════ */
function LeadModal({lead,consultants,onClose,onSave,onArchive,isAdmin,isArchived}){
  const[status,setStatus]=useState(lead.status||"new");
  const[assignedTo,setAssignedTo]=useState(lead.assignedTo||"");
  const[note,setNote]=useState("");
  const[priority,setPriority]=useState(lead.priority||"normal");
  const[dlState,setDlState]=useState("idle");
  const[archiving,setArchiving]=useState(false);

  const save=()=>{
    const hist=[...(lead.history||[])];
    if(note.trim())hist.push({ts:new Date().toISOString(),text:note.trim(),author:isAdmin?"Admin":consultants.find(c=>c.id===assignedTo||c.email===assignedTo)?.name||"Consultant"});
    if(status!==lead.status)hist.push({ts:new Date().toISOString(),text:"Status changed to "+status,author:"System",type:"status"});
    if(assignedTo&&assignedTo!==lead.assignedTo){
      const cn=consultants.find(c=>c.id===assignedTo||c.email===assignedTo)?.name||assignedTo;
      hist.push({ts:new Date().toISOString(),text:"Assigned to "+cn,author:"Admin",type:"assign"});
    }
    onSave({...lead,status,assignedTo,priority,history:hist,updatedAt:new Date().toISOString()});
  };

  const doArchive=async()=>{
    if(!window.confirm("Move this lead to the archive? It will no longer appear in the active leads list."))return;
    setArchiving(true);
    await onArchive(lead);
    setArchiving(false);
    onClose();
  };

  const infoRows=[
    ["Email",lead.email||"—"],["Phone",lead.phone||"—"],
    ["Currency",lead.cur||"—"],["Mode",lead.hhMode?"Household":"Individual"],
    ["Health score",(lead.health||"—")+"/100"],["Monthly income",lead.monthlyIncome||"—"],
    ["Pot size",lead.pot||"—"],["Verdict",lead.verdict||"—"],
    ["Savings rate",(lead.savingsRate||"—")+"%"],["Retirement age","Age "+(lead.retireAge||"—")],
    ["Income strategy",(lead.incomeMode==="expenses"?"Same lifestyle":lead.incomeMode==="custom"?"Custom target":"4% rule")],
    ["Scenario",(lead.scenarioSelected==="tough"?"Worst 4%":lead.scenarioSelected==="best"?"Best 6%":"Base 5%")],
    ["Funds last to","Age "+(lead.fundsToAge||"—")],
    ["Coverage",(lead.coverageMultiple!=null?lead.coverageMultiple.toFixed(1)+"×":"—")],
    ["Worst-case pot",lead.potWorstCase||"—"],["Best-case pot",lead.potBestCase||"—"],
  ];

  return h("div",{className:"modal-ov",onClick:onClose},
    h("div",{className:"modal-box",onClick:e=>e.stopPropagation()},
      h("button",{onClick:onClose,style:{position:"absolute",top:14,right:16,background:"none",border:"none",color:"var(--muted)",fontSize:20,cursor:"pointer"}},"×"),
      h("div",{className:"modal-title"},
        lead.name||"Unknown",
        isArchived&&h("span",{style:{marginLeft:10,fontSize:11,background:"var(--archive-lt)",color:"var(--archive)",padding:"2px 10px",borderRadius:100,fontWeight:600,verticalAlign:"middle"}},"Archived")
      ),

      /* Client info */
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16,fontSize:12}},
        infoRows.map(arr=>h("div",{key:arr[0],style:{background:"var(--subtle)",borderRadius:8,padding:"8px 10px"}},
          h("div",{style:{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".05em",marginBottom:1}},arr[0]),
          h("div",{style:{fontWeight:600,fontSize:13}},String(arr[1]))
        ))
      ),

      /* Partner info */
      lead.hhMode&&lead.partnerAge&&h("div",{style:{marginBottom:14}},
        h("div",{className:"sec-lbl"},"Partner details"),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:12}},
          [["Partner age",lead.partnerAge],["Partner gender",lead.partnerGender],
           ["Partner retire","Age "+(lead.partnerRetireAge||"—")],["Partner savings rate",(lead.partnerSavingsRate||"—")+"%"],
           ["Partner income",lead.partnerIncome],["Partner savings",lead.partnerSavings],
           ["Your pot",lead.p1Pot],["Partner pot",lead.p2Pot]
          ].map(arr=>h("div",{key:arr[0],style:{background:"var(--p2-lt)",borderRadius:8,padding:"8px 10px",border:"1px solid rgba(124,58,237,.12)"}},
            h("div",{style:{fontSize:10,color:"var(--p2)",textTransform:"uppercase",letterSpacing:".05em",marginBottom:1}},arr[0]),
            h("div",{style:{fontWeight:600,fontSize:13,color:"var(--p2)"}},String(arr[1]||"—"))
          ))
        )
      ),

      /* Goals */
      (lead.goals||[]).length>0&&h("div",{style:{marginBottom:14}},
        h("div",{className:"sec-lbl"},"Life goals"),
        h("div",{style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}},
          (lead.goals||[]).map(g=>h("span",{key:g,style:{padding:"3px 10px",borderRadius:100,background:"var(--warn-lt)",border:"1px solid rgba(217,119,6,.2)",fontSize:11,color:"var(--warn)"}},g))
        ),
        (lead.goalsDetail||[]).length>0&&h("div",{style:{fontSize:12}},
          (lead.goalsDetail||[]).map(g=>{
            const freq=g.recurYears>0?" · every "+g.recurYears+" yrs":(g.id==="trip"?" · once":"");
            const mort=g.id==="house"&&g.mortgagePct>0?" · "+g.mortgagePct+"% mortgage @ "+g.mortgageRate+"%":"";
            return h("div",{key:g.id,style:{display:"flex",justifyContent:"space-between",padding:"5px 8px",background:"var(--subtle)",borderRadius:6,marginBottom:4}},
              h("span",{style:{color:"var(--muted)"}},(g.icon||"⭐")+" "+g.label+" (age "+g.atAge+")"+freq+mort),
              h("span",{style:{fontWeight:600,color:"var(--warn)"}},g.amount)
            );
          })
        )
      ),

      /* Assignment & status — admin, active only */
      isAdmin&&!isArchived&&h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}},
        h("div",null,
          h("div",{className:"field-lbl"},"Assign to"),

      /* Report download */
      h("div",{style:{marginBottom:14,padding:"12px 14px",background:"var(--accent-lt)",border:"1px solid rgba(26,86,219,.18)",borderRadius:10}},
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}},
          h("div",null,
            h("div",{style:{fontSize:12,fontWeight:700,color:"var(--accent)",marginBottom:2}},"Client Report"),
            h("div",{style:{fontSize:11,color:"var(--muted)",lineHeight:1.5}},

            className:"btn btn-primary btn-sm",disabled:dlState==="loading",
            style:{flexShrink:0,opacity:dlState==="loading"?.6:1,
              background:dlState==="done"?"var(--ok)":dlState==="none"?"var(--danger-lt)":"var(--accent)",
              border:dlState==="none"?"1px solid rgba(220,38,38,.3)":"none",
              color:dlState==="none"?"var(--danger)":"#fff"},
            onClick:async()=>{
              setDlState("loading");
              const ok=await downloadReport(lead);
              setDlState(ok?"done":"none");
              setTimeout(()=>setDlState("idle"),3000);
            }
          },dlState==="loading"?"Fetching…":dlState==="done"?"✓ Downloaded":dlState==="none"?"Not found":"⬇ Download Report")
        )

      /* Action buttons */

        "Archived on "+fmt(lead.archivedAt)+(lead.archivedBy?" by "+lead.archivedBy:"")
      ),

      /* History */
      (lead.history||[]).length>0&&h("div",null,
        h("div",{className:"sec-lbl"},"Case history"),
        h("div",{className:"timeline"},
          [...(lead.history||[])].reverse().map(function(item,i){
            const isSys=item.type==="status"||item.type==="assign"||item.type==="system";
            return h("div",{key:i,className:"tl-item"},
              h("div",{className:"tl-dot",style:{background:isSys?"var(--border)":"var(--accent)"}}),
              h("div",{className:"tl-line"}),
              h("div",{className:"tl-body"},
                h("div",{className:"tl-date"},fmt(item.ts)+(item.author?" · "+item.author:"")),
                h("div",{className:"tl-text",style:{color:isSys?"var(--muted)":"var(--text)"}},item.text)
              )
            );
          })
        )
      )
    )
  );
}

/* ── ADD CONSULTANT MODAL ── */
function AddConsultantModal({onClose,onAdd}){
  const[name,setName]=useState("");
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[role,setRole]=useState("Consultant");
  const[color,setColor]=useState("#7C3AED");
  const[busy,setBusy]=useState(false);
  const[err,setErr]=useState("");
  const[done,setDone]=useState(false);
  const colors=["#1A56DB","#7C3AED","#0D9488","#DC2626","#D97706","#16A34A"];
  const valid=name.trim()&&email.trim()&&password.length>=6;

  const submit=async()=>{
    if(!valid)return;
    setErr("");setBusy(true);
    try{
      /* Use a secondary Firebase app instance so creating the new user
         does NOT sign the admin out of their own session */
      const secondaryApp=firebase.apps.find(a=>a.name==="secondary")||
        firebase.initializeApp(FIREBASE_CONFIG,"secondary");
      const secondaryAuth=secondaryApp.auth();
      await secondaryAuth.createUserWithEmailAndPassword(email.trim().toLowerCase(),password);
      await secondaryAuth.signOut();

      /* Add to CRM consultant list */
      const initials=name.trim().split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
      onAdd({
        id:"c"+Date.now(),
        name:name.trim(),
        email:email.trim().toLowerCase(),
        role,color,initials,
        createdAt:new Date().toISOString()
      });
      setDone(true);
    }catch(e){
      const msg={
        "auth/email-already-in-use":"This email already has a Firebase account.",
        "auth/invalid-email":"Please enter a valid email address.",
        "auth/weak-password":"Password must be at least 6 characters.",
      }[e.code]||"Error: "+e.message;
      setErr(msg);
    }
    setBusy(false);
  };

  if(done)return h("div",{className:"modal-ov",onClick:onClose},
    h("div",{className:"modal-box",style:{maxWidth:400,textAlign:"center"},onClick:e=>e.stopPropagation()},
      h("div",{style:{fontSize:44,marginBottom:12}},"✅"),
      h("div",{style:{fontSize:16,fontWeight:700,marginBottom:8}},"Consultant created"),
      h("div",{style:{fontSize:13,color:"var(--muted)",marginBottom:20,lineHeight:1.6}},
        name+" can now log in to the CRM with ",h("b",null,email)," and their password."
      ),
      h("button",{className:"btn btn-primary",style:{width:"100%"},onClick:onClose},"Done")
    )
  );

  return h("div",{className:"modal-ov",onClick:onClose},
    h("div",{className:"modal-box",style:{maxWidth:420},onClick:e=>e.stopPropagation()},
      h("button",{onClick:onClose,style:{position:"absolute",top:14,right:16,background:"none",border:"none",color:"var(--muted)",fontSize:20,cursor:"pointer"}},"×"),
      h("div",{className:"modal-title"},"Add consultant"),
      h("div",{style:{marginBottom:16,padding:"10px 14px",background:"var(--ok-lt)",border:"1px solid rgba(22,163,74,.2)",borderRadius:8,fontSize:12,color:"var(--muted)"}},
        "✓ Their Firebase login will be created automatically — no need to visit the Firebase Console."
      ),
      err&&h("div",{className:"alert alert-err"},err),
      h("div",{className:"field"},
        h("div",{className:"field-lbl"},"Full name *"),
        h("input",{className:"inp",value:name,onChange:e=>setName(e.target.value),placeholder:"e.g. Sarah Mooten"})
      ),
      h("div",{className:"field"},
        h("div",{className:"field-lbl"},"Email *"),
        h("input",{className:"inp",type:"email",value:email,onChange:e=>setEmail(e.target.value),placeholder:"email@example.com"})
      ),
      h("div",{className:"field"},
        h("div",{className:"field-lbl"},"Password * (min 6 characters)"),
        h("input",{className:"inp",type:"password",value:password,onChange:e=>setPassword(e.target.value),placeholder:"Temporary password for them to use"})
      ),
      h("div",{className:"field"},
        h("div",{className:"field-lbl"},"Role"),
        h("select",{className:"inp",value:role,onChange:e=>setRole(e.target.value)},
          ["Consultant","Senior Consultant","Manager"].map(r=>h("option",{key:r,value:r},r)))
      ),
      h("div",{className:"field"},
        h("div",{className:"field-lbl"},"Avatar colour"),
        h("div",{style:{display:"flex",gap:8,marginTop:4}},
          colors.map(c=>h("button",{key:c,onClick:()=>setColor(c),
            style:{width:28,height:28,borderRadius:8,background:c,
              border:color===c?"3px solid #111827":"2px solid transparent",cursor:"pointer"}}))
        )
      ),
      h("button",{className:"btn btn-primary",
        style:{width:"100%",opacity:(valid&&!busy)?1:.5},
        onClick:submit,disabled:busy||!valid},
        busy?"Creating account…":"Create consultant →"
      )
    )
  );
}

/* ═══════════════════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════════════════ */
function App(){
  const[authUser,setAuthUser]=useState(null);
  const[authLoading,setAuthLoading]=useState(true);
  const[profile,setProfile]=useState(null);
  const[tab,setTab]=useState("leads");
  const[leads,setLeads]=useState([]);
  const[archivedLeads,setArchivedLeads]=useState([]);
  const[consultants,setConsultants]=useState([]);
  const[selLead,setSelLead]=useState(null);
  const[selArchived,setSelArchived]=useState(null);
  const[selConsultant,setSelConsultant]=useState(null);
  const[search,setSearch]=useState("");
  const[arcSearch,setArcSearch]=useState("");
  const[filterStatus,setFilterStatus]=useState("all");
  const[filterCon,setFilterCon]=useState("all");
  const[showAddCon,setShowAddCon]=useState(false);
  const[leadsLoading,setLeadsLoading]=useState(true);
  const[toast,setToast]=useState("");

  /* Auth state listener */
  useEffect(function(){
    return auth.onAuthStateChanged(function(user){
      if(user){
        setAuthUser(user);
        /* Check hardcoded PROFILES first, then localStorage consultant list
           so any consultant created via the CRM modal also gets their
           proper name, colour and initials when they log in */
        if(PROFILES[user.email]){
          setProfile(PROFILES[user.email]);
        }else{
          try{
            const stored=JSON.parse(localStorage.getItem("crm_consultants")||"[]");
            const match=stored.find(c=>c.email===user.email);
            if(match){
              setProfile({name:match.name,role:"consultant",color:match.color||"#7C3AED",initials:match.initials||match.name.slice(0,2).toUpperCase()});
            }else{
              setProfile({name:user.email,role:"consultant",color:"#6B7280",initials:"?"});
            }
          }catch(e){
            setProfile({name:user.email,role:"consultant",color:"#6B7280",initials:"?"});
          }
        }
      }else{
        setAuthUser(false);setProfile(null);
      }
      setAuthLoading(false);
    });
  },[]);

  /* Firestore listeners — only when signed in */
  useEffect(function(){
    if(!authUser)return;
    try{
      const s=localStorage.getItem("crm_consultants");
      if(s){
        setConsultants(JSON.parse(s));
      }else{
        /* Seed default consultants on first load */
        const defaults=[
          {id:"c1",name:"Kamshi",email:"kamlesh@megatrendcapital.com",role:"Consultant",color:"#7C3AED",initials:"KM",createdAt:new Date().toISOString()},
        ];
        setConsultants(defaults);
        localStorage.setItem("crm_consultants",JSON.stringify(defaults));
      }
    }catch(e){}

    const u1=db.collection("leads").orderBy("ts","desc").onSnapshot(function(snap){
      setLeads(snap.docs.map(docToLead));setLeadsLoading(false);
    },function(e){console.error(e);setLeadsLoading(false);showToast("Connection error: "+e.message);});

    const u2=db.collection("archived_leads").orderBy("archivedAt","desc").onSnapshot(function(snap){
      setArchivedLeads(snap.docs.map(docToLead));
    },function(e){console.error(e);});

    return function(){u1();u2();};
  },[authUser]);

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(""),3000);}

  async function saveLead(updated){
    try{
      await db.collection("leads").doc(String(updated.id)).update({
        status:updated.status,assignedTo:updated.assignedTo,
        priority:updated.priority,history:updated.history,
        updatedAt:new Date().toISOString()
      });
      setSelLead(null);showToast("Case updated ✓");
    }catch(e){showToast("Save failed: "+e.message);}
  }

  async function archiveLead(lead){
    try{
      const now=new Date().toISOString();
      const archivedBy=profile?.name||authUser?.email||"Admin";
      /* Write full doc to archived_leads */
      await db.collection("archived_leads").doc(String(lead.id)).set({
        ...lead,archivedAt:now,archivedBy,
      });
      /* Mark original as archived (hides from active view) */
      await db.collection("leads").doc(String(lead.id)).update({
        archived:true,archivedAt:now,archivedBy,
        history:[...(lead.history||[]),{ts:now,text:"Moved to archive by "+archivedBy,author:archivedBy,type:"archive"}],
        updatedAt:now,
      });
      showToast("Lead archived ✓");
    }catch(e){showToast("Archive failed: "+e.message);}
  }

  function addConsultant(c){
    const next=[...consultants,c];setConsultants(next);
    try{localStorage.setItem("crm_consultants",JSON.stringify(next));}catch(e){}
    setShowAddCon(false);showToast("Consultant added ✓");
  }
  function deleteConsultant(id){
    if(!window.confirm("Remove this consultant?"))return;
    const next=consultants.filter(c=>c.id!==id);setConsultants(next);
    try{localStorage.setItem("crm_consultants",JSON.stringify(next));}catch(e){}
    showToast("Consultant removed");
  }

  if(authLoading)return h("div",{className:"spinner"},h("div",{className:"spin"}),h("span",null,"Connecting…"));
  if(!authUser)return h(Login,null);

  const isAdmin=profile?.role==="admin";
  const activeLeads=leads.filter(l=>!l.archived);
  const myLeads=isAdmin?activeLeads:activeLeads.filter(l=>l.assignedTo===authUser.email);

  const filtered=myLeads.filter(function(l){
    const q=search.toLowerCase();
    const mQ=!q||(l.name||"").toLowerCase().includes(q)||(l.email||"").toLowerCase().includes(q)||(l.phone||"").includes(q);
    const mS=filterStatus==="all"||l.status===filterStatus;
    const mC=filterCon==="all"||l.assignedTo===filterCon;
    return mQ&&mS&&mC;
  });

  const filteredArc=archivedLeads.filter(function(l){
    const q=arcSearch.toLowerCase();
    return !q||(l.name||"").toLowerCase().includes(q)||(l.email||"").toLowerCase().includes(q);
  });

  const counts={
    new:activeLeads.filter(l=>l.status==="new").length,
    assigned:activeLeads.filter(l=>l.status==="assigned").length,
    contacted:activeLeads.filter(l=>l.status==="contacted").length,
    closed:activeLeads.filter(l=>l.status==="closed").length,
  };

  /* ── Leads / Archive table ── */
  function LeadsTable({data,title,isArc}){
    return h("div",{className:"tbl-wrap"+(isArc?" arc":"")},
      h("div",{className:"tbl-hdr"},
        h("div",{className:"tbl-title"},title," ",h("span",{style:{fontSize:12,color:"var(--muted)",fontWeight:400}},"("+data.length+")")),
        h("div",{className:"search-bar"},
          h("input",{className:"search-inp",
            placeholder:isArc?"Search archived…":"Search name, email, phone…",
            value:isArc?arcSearch:search,
            onChange:e=>isArc?setArcSearch(e.target.value):setSearch(e.target.value)
          }),
          !isArc&&h("select",{className:"search-inp",value:filterStatus,onChange:e=>setFilterStatus(e.target.value)},
            ["all","new","assigned","contacted","closed"].map(s=>h("option",{key:s,value:s},s==="all"?"All statuses":s.charAt(0).toUpperCase()+s.slice(1)))
          ),
          !isArc&&isAdmin&&h("select",{className:"search-inp",value:filterCon,onChange:e=>setFilterCon(e.target.value)},
            [h("option",{key:"all",value:"all"},"All consultants"),
             ...consultants.map(c=>h("option",{key:c.id,value:c.id},c.name))]
          )
        )
      ),
      data.length===0
        ?h("div",{className:"empty"},h("div",{className:"empty-icon"},isArc?"🗄":"📭"),h("div",null,isArc?"No archived leads":"No leads found"))
        :h("div",{style:{overflowX:"auto"}},
          h("table",null,
            h("thead",null,h("tr",null,
              h("th",null,"Client"),h("th",null,"Contact"),h("th",null,"Plan"),
              h("th",null,isArc?"Status":"Status"),
              isAdmin&&!isArc&&h("th",null,"Assigned to"),
              !isArc&&h("th",null,"Priority"),
              h("th",null,isArc?"Archived on":"Received"),
              h("th",null,"Action")
            )),
            h("tbody",null,data.map(function(lead){
              const con=consultants.find(c=>c.id===lead.assignedTo||c.email===lead.assignedTo);
              const priCol={low:"var(--muted)",normal:"var(--text)",high:"var(--warn)",urgent:"var(--danger)"}[lead.priority||"normal"];
              return h("tr",{key:lead.id,style:isArc?{opacity:.85}:{}},
                h("td",null,
                  h("div",{style:{fontWeight:600,fontSize:13}},lead.name||"—"),
                  lead.hhMode&&h("span",{style:{fontSize:10,color:"var(--p2)",background:"var(--p2-lt)",padding:"1px 6px",borderRadius:100,marginTop:2,display:"inline-block"}},"HH")
                ),
                h("td",null,
                  h("div",{style:{fontSize:12}},lead.email||"—"),
                  h("div",{style:{fontSize:11,color:"var(--muted)"}},lead.phone||"")
                ),
                h("td",null,
                  h("div",{style:{fontSize:12}},lead.monthlyIncome?lead.monthlyIncome+"/mo":"—"),
                  h("div",{style:{fontSize:11,color:lead.verdict==="On track"?"var(--ok)":"var(--danger)"}},lead.verdict||"")
                ),
                h("td",null,h(StatusBadge,{status:lead.status,isArchived:isArc})),
                isAdmin&&!isArc&&h("td",null,
                  con
                    ?h("div",{style:{display:"flex",alignItems:"center",gap:6}},
                        h("div",{style:{width:24,height:24,borderRadius:6,background:con.color,display:"grid",placeItems:"center",fontSize:10,fontWeight:700,color:"#fff",flexShrink:0}},con.initials),
                        h("span",{style:{fontSize:12}},con.name)
                      )
                    :h("span",{style:{fontSize:12,color:"var(--hint)"}},"Unassigned")
                ),
                !isArc&&h("td",null,h("span",{style:{fontSize:12,fontWeight:600,color:priCol}},
                  (lead.priority||"normal").charAt(0).toUpperCase()+(lead.priority||"normal").slice(1)
                )),
                h("td",null,h("span",{style:{fontSize:11,color:"var(--muted)"}},
                  isArc?fmtShort(lead.archivedAt):fmtShort(lead.createdAt)
                )),
                h("td",null,h("button",{
                  className:"btn btn-sm",
                  style:{background:isArc?"var(--archive)":"var(--accent)",color:"#fff",border:"none"},
                  onClick:()=>isArc?setSelArchived(lead):setSelLead(lead)
                },"Open"))
              );
            }))
          )
        )
    );
  }

  const adminTabs=[["leads","📋 All Leads"],["archive","🗄 Archive"],["consultants","👥 Consultants"],["dashboard","📊 Dashboard"]];

  return h("div",null,
    toast&&h("div",{style:{position:"fixed",bottom:24,right:24,background:"#111827",color:"#fff",padding:"10px 18px",borderRadius:10,fontSize:13,fontWeight:500,zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,.2)"}},toast),

    selLead&&h(LeadModal,{lead:selLead,consultants,onClose:()=>setSelLead(null),onSave:saveLead,onArchive:archiveLead,isAdmin,isArchived:false}),
    selArchived&&h(LeadModal,{lead:selArchived,consultants,onClose:()=>setSelArchived(null),onSave:()=>{},onArchive:()=>{},isAdmin,isArchived:true}),
    showAddCon&&h(AddConsultantModal,{onClose:()=>setShowAddCon(false),onAdd:addConsultant}),

    h("header",{className:"hdr"},
      h("div",{className:"logo"},
        h("div",{className:"logo-mark"},"A"),
        h("div",null,h("div",{className:"logo-name"},"ARK Financial Planners"),h("div",{className:"logo-tag"},"CRM · Consultants Portal"))
      ),
      h("div",{style:{display:"flex",alignItems:"center",gap:12}},
        h("div",{style:{fontSize:12,color:"var(--muted)"}},
          h("span",{style:{display:"inline-flex",alignItems:"center",gap:6}},
            h("div",{style:{width:20,height:20,borderRadius:6,background:profile?.color||"var(--accent)",display:"grid",placeItems:"center",fontSize:9,fontWeight:700,color:"#fff"}},profile?.initials||"?"),
            profile?.name||authUser?.email," · ",
            h("b",null,isAdmin?"Administrator":"Consultant")
          )
        ),
        h("button",{className:"btn btn-ghost btn-sm",onClick:()=>auth.signOut()},"Sign out")
      )
    ),

    h("div",{className:"wrap"},

      isAdmin&&h("div",{className:"nav-tabs"},
        adminTabs.map(arr=>h("button",{key:arr[0],className:"nav-tab"+(tab===arr[0]?" on":""),onClick:()=>setTab(arr[0])},arr[1]))
      ),

      /* ── LEADS TAB ── */
      (tab==="leads"||!isAdmin)&&h("div",null,
        leadsLoading
          ?h("div",{style:{textAlign:"center",padding:48,color:"var(--muted)"}},"Loading leads…")
          :h("div",null,
            isAdmin&&h("div",{className:"stats-row"},
              [{l:"New",v:counts.new,c:"var(--accent)"},
               {l:"Assigned",v:counts.assigned,c:"var(--warn)"},
               {l:"Contacted",v:counts.contacted,c:"var(--ok)"},
               {l:"Closed",v:counts.closed,c:"var(--muted)"}
              ].map(s=>h("div",{key:s.l,className:"stat-card"},h("div",{className:"stat-val",style:{color:s.c}},s.v),h("div",{className:"stat-lbl"},s.l)))
            ),
            h(LeadsTable,{data:filtered,title:isAdmin?"All Active Leads":"My Assigned Leads",isArc:false})
          )
      ),

      /* ── ARCHIVE TAB ── */
      tab==="archive"&&isAdmin&&h("div",null,
        h("div",{className:"archive-banner"},
          h("span",{style:{fontSize:22,lineHeight:1}},"🗄"),
          h("div",null,
            h("div",{style:{fontWeight:700,marginBottom:3}},"Lead Archive"),
            h("div",null,"Closed leads moved here by an administrator. All data and reports remain fully accessible. Archived leads do not appear in the active pipeline or dashboard counts.")
          )
        ),
        h(LeadsTable,{data:filteredArc,title:"Archived Leads",isArc:true})
      ),

      /* ── CONSULTANTS TAB ── */
      tab==="consultants"&&isAdmin&&h("div",null,
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
          h("div",{style:{fontSize:18,fontWeight:600}},"Consultants"),
          h("button",{className:"btn btn-primary btn-sm",onClick:()=>setShowAddCon(true)},"+ Add consultant")
        ),
        h("div",{className:"consultant-grid"},
          consultants.map(function(con){
            const myL=activeLeads.filter(l=>l.assignedTo===con.id||l.assignedTo===con.email);
            const arcL=archivedLeads.filter(l=>l.assignedTo===con.id||l.assignedTo===con.email);
            const open=myL.filter(l=>l.status!=="closed").length;
            const closed=myL.filter(l=>l.status==="closed").length;
            return h("div",{key:con.id,className:"consultant-card",onClick:()=>setSelConsultant(selConsultant===con.id?null:con.id)},
              h("div",{className:"avatar-big",style:{background:con.color+"18",color:con.color}},con.initials),
              h("div",{style:{fontSize:15,fontWeight:600,marginBottom:2}},con.name),
              h("div",{style:{fontSize:11,color:"var(--muted)",marginBottom:10}},con.role," · ",con.email),
              h("div",{style:{display:"flex",gap:8,marginBottom:10}},
                h("div",{style:{flex:1,background:"var(--subtle)",borderRadius:8,padding:"8px",textAlign:"center"}},
                  h("div",{style:{fontSize:18,fontWeight:700,color:"var(--warn)"}},open),
                  h("div",{style:{fontSize:9,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".06em"}},"Open")),
                h("div",{style:{flex:1,background:"var(--subtle)",borderRadius:8,padding:"8px",textAlign:"center"}},
                  h("div",{style:{fontSize:18,fontWeight:700,color:"var(--ok)"}},closed),
                  h("div",{style:{fontSize:9,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".06em"}},"Closed")),
                h("div",{style:{flex:1,background:"var(--archive-lt)",borderRadius:8,padding:"8px",textAlign:"center"}},
                  h("div",{style:{fontSize:18,fontWeight:700,color:"var(--archive)"}},arcL.length),
                  h("div",{style:{fontSize:9,color:"var(--archive)",textTransform:"uppercase",letterSpacing:".06em"}},"Archived"))
              ),
              h("button",{className:"btn btn-danger btn-sm",style:{width:"100%",fontSize:11},
                onClick:function(e){e.stopPropagation();deleteConsultant(con.id);}},"Remove")
            );
          })
        ),
        selConsultant&&h("div",null,
          h("div",{style:{fontSize:16,fontWeight:600,marginBottom:14}},"Leads for "+consultants.find(c=>c.id===selConsultant)?.name),
          h(LeadsTable,{data:activeLeads.filter(l=>l.assignedTo===selConsultant||l.assignedTo===consultants.find(c=>c.id===selConsultant)?.email),title:"Assigned leads",isArc:false})
        )
      ),

      /* ── DASHBOARD TAB ── */
      tab==="dashboard"&&isAdmin&&h("div",null,
        h("div",{style:{fontSize:18,fontWeight:600,marginBottom:20}},"Dashboard"),
        h("div",{className:"stats-row"},
          [{l:"Active leads",v:activeLeads.length,c:"var(--text)"},
           {l:"New",v:counts.new,c:"var(--accent)"},
           {l:"In progress",v:counts.assigned+counts.contacted,c:"var(--warn)"},
           {l:"Closed",v:counts.closed,c:"var(--ok)"}
          ].map(s=>h("div",{key:s.l,className:"stat-card"},h("div",{className:"stat-val",style:{color:s.c}},s.v),h("div",{className:"stat-lbl"},s.l)))
        ),
        h("div",{className:"stat-card",style:{display:"inline-flex",alignItems:"center",gap:16,marginBottom:24,background:"var(--archive-lt)",border:"1px solid rgba(120,113,108,.25)"}},
          h("div",{style:{fontSize:28,fontWeight:700,color:"var(--archive)"}},archivedLeads.length),
          h("div",{style:{fontSize:11,color:"var(--archive)",textTransform:"uppercase",letterSpacing:".06em"}},"Total archived")
        ),
        h("div",{className:"card"},
          h("div",{className:"sec-lbl"},"Performance by consultant"),
          h("table",null,
            h("thead",null,h("tr",null,
              h("th",null,"Consultant"),h("th",null,"Assigned"),h("th",null,"Open"),h("th",null,"Closed"),h("th",null,"Archived"),h("th",null,"Conversion")
            )),
            h("tbody",null,consultants.map(function(con){
              const cl=activeLeads.filter(l=>l.assignedTo===con.id||l.assignedTo===con.email);
              const arc=archivedLeads.filter(l=>l.assignedTo===con.id||l.assignedTo===con.email);
              const total=cl.length,open=cl.filter(l=>l.status!=="closed").length,closed=cl.filter(l=>l.status==="closed").length;
              const rate=total>0?Math.round(closed/total*100):0;
              return h("tr",{key:con.id},
                h("td",null,h("div",{style:{display:"flex",alignItems:"center",gap:8}},
                  h("div",{style:{width:26,height:26,borderRadius:7,background:con.color,display:"grid",placeItems:"center",fontSize:10,fontWeight:700,color:"#fff"}},con.initials),
                  con.name)),
                h("td",null,h("b",null,total)),
                h("td",null,h("span",{style:{color:"var(--warn)"}},open)),
                h("td",null,h("span",{style:{color:"var(--ok)"}},closed)),
                h("td",null,h("span",{style:{color:"var(--archive)"}},arc.length)),
                h("td",null,h("div",{style:{display:"flex",alignItems:"center",gap:8}},
                  h("div",{style:{flex:1,height:6,background:"var(--border)",borderRadius:3}},
                    h("div",{style:{height:"100%",width:rate+"%",background:"var(--ok)",borderRadius:3}})),
                  h("span",{style:{fontSize:12,fontWeight:600}},rate+"%")
                ))
              );
            }))
          )
        ),
        h("div",{className:"card"},
          h("div",{className:"sec-lbl"},"Recent activity"),
          activeLeads.filter(l=>(l.history||[]).length>0)
            .sort((a,b)=>new Date(b.updatedAt||b.createdAt)-new Date(a.updatedAt||a.createdAt))
            .slice(0,8).length===0
            ?h("div",{style:{color:"var(--muted)",fontSize:13,padding:"16px 0"}},"No activity yet.")
            :h("div",{className:"timeline"},
              activeLeads.filter(l=>(l.history||[]).length>0)
                .sort((a,b)=>new Date(b.updatedAt||b.createdAt)-new Date(a.updatedAt||a.createdAt))
                .slice(0,8).map(function(lead){
                  const last=(lead.history||[]).slice(-1)[0];
                  return h("div",{key:lead.id,className:"tl-item"},
                    h("div",{className:"tl-dot",style:{background:"var(--accent)"}}),
                    h("div",{className:"tl-line"}),
                    h("div",{className:"tl-body"},
                      h("div",{className:"tl-date"},fmtShort(lead.updatedAt||lead.createdAt)+" · "+lead.name),
                      h("div",{className:"tl-text"},last?last.text:"New lead")
                    )
                  );
                })
            )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
</script>
</body>
</html>
