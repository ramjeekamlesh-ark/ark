<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ARK Financial Planners — Brutally Honest Retirement Planning</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#05080F;--surface:#0B0F1C;--card:#0F1525;--border:#1C2640;--border2:#243050;
  --accent:#00E5B0;--adim:#00A87E;--gold:#FFD166;--gdim:#C9A13B;
  --warn:#FF8F5A;--danger:#FF4466;
  --text:#ECF0FA;--muted:#4A5A7E;--subtle:#141D33;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(0,229,176,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,176,.018) 1px,transparent 1px);
  background-size:64px 64px;pointer-events:none}
body::after{content:'';position:fixed;top:-20%;left:50%;transform:translateX(-50%);
  width:900px;height:600px;background:radial-gradient(ellipse,rgba(0,229,176,.032) 0%,transparent 68%);pointer-events:none;z-index:0}
#root{position:relative;z-index:1}

/* ── FAT-FINGER SLIDERS (fix #1) ── */
.slider-wrap{margin-bottom:22px}
.slider-labels{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.slider-label{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;font-weight:500}
.slider-value{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;letter-spacing:-.01em}
.slider-sub{font-size:10px;color:var(--accent);font-style:italic;margin-bottom:6px}
.slider-sub2{font-size:10px;color:var(--muted);margin-top:5px}
/* Track sits on top, full height invisible range sits over it */
.slider-track-wrap{position:relative;height:28px;display:flex;align-items:center;cursor:pointer}
.slider-track{position:absolute;left:0;right:0;height:6px;background:var(--subtle);border-radius:3px}
.slider-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px;transition:width .06s}
input[type=range]{
  position:absolute;left:0;top:0;width:100%;height:100%;
  opacity:0;cursor:pointer;margin:0;z-index:2
}
input[type=range]::-webkit-slider-thumb{width:32px;height:32px;-webkit-appearance:none}
input[type=range]::-moz-range-thumb{width:32px;height:32px;border:none;opacity:0}
/* Visible thumb */
.slider-thumb{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  width:26px;height:26px;border-radius:50%;
  border:3px solid var(--bg);pointer-events:none;z-index:1;
  box-shadow:0 0 0 3px rgba(0,229,176,.22),0 2px 8px rgba(0,0,0,.5);
  transition:left .06s
}


/* General */
input[type=text],input[type=email],input[type=tel]{
  font-family:'DM Sans',sans-serif;font-size:15px;background:var(--subtle);
  border:1px solid var(--border);border-radius:12px;color:var(--text);
  padding:14px 16px;width:100%;outline:none;transition:border-color .2s
}
input[type=text]:focus,input[type=email]:focus,input[type=tel]:focus{border-color:var(--accent)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Animations */
.fi{animation:fi .5s cubic-bezier(.22,1,.36,1) both}
.fu{animation:fu .45s cubic-bezier(.22,1,.36,1) both}
.fu1{animation:fu .45s .07s cubic-bezier(.22,1,.36,1) both}
.fu2{animation:fu .45s .14s cubic-bezier(.22,1,.36,1) both}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:100px;
  border:1px solid rgba(0,229,176,.22);background:rgba(0,229,176,.06);
  font-size:11px;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;margin-bottom:20px}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pp 2.2s infinite}
@keyframes pp{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,229,176,.4)}50%{opacity:.7;box-shadow:0 0 0 6px rgba(0,229,176,0)}}

/* Currency toggle (fix #4) */
.cur-toggle{display:flex;gap:0;background:var(--subtle);border-radius:10px;padding:3px;border:1px solid var(--border)}
.cur-btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:6px 16px;
  border-radius:8px;border:none;cursor:pointer;transition:all .18s;color:var(--muted);background:transparent}
.cur-btn.on{background:var(--accent);color:#02100C}

/* Tabs */
.tab-btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:8px 18px;
  border-radius:100px;border:1px solid var(--border);background:transparent;
  color:var(--muted);cursor:pointer;transition:all .2s}
.tab-btn:hover{border-color:var(--border2);color:var(--text)}
.tab-btn.act{border-color:var(--accent);background:rgba(0,229,176,.1);color:var(--accent)}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px}
.card-g{background:var(--card);border:1px solid rgba(0,229,176,.18);border-radius:20px;
  box-shadow:0 0 50px rgba(0,229,176,.04)}

/* Chips */
.chip{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:5px 14px;
  border-radius:100px;border:1px solid var(--border);background:transparent;
  color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.ca{border-color:var(--accent);background:rgba(0,229,176,.1);color:var(--accent)}
.chip.cg{border-color:var(--gold);background:rgba(255,209,102,.09);color:var(--gold)}
.chip.cm{border-color:var(--muted);background:rgba(74,90,126,.14);color:var(--text)}
.chip.cw{border-color:var(--warn);background:rgba(255,143,90,.1);color:var(--warn)}

/* Scenario cards — full-width, question always visible */
.scene-card{
  background:var(--card);border:1px solid var(--border);border-radius:18px;
  padding:20px 22px;cursor:pointer;transition:all .2s;text-align:left;width:100%
}
.scene-card:hover{border-color:var(--accent);background:rgba(0,229,176,.04);transform:translateY(-1px)}
.scene-card.act{border-color:var(--accent);background:rgba(0,229,176,.06)}
.scene-q{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;line-height:1.35;margin-bottom:6px;color:#ECF0FA}
.scene-sub{font-size:12px;color:var(--muted);line-height:1.55}

/* CTA */
.cta{width:100%;padding:18px 0;border-radius:14px;
  background:linear-gradient(135deg,var(--adim),var(--accent));
  border:none;color:#02100C;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;box-shadow:0 4px 32px rgba(0,229,176,.22);transition:all .2s}
.cta:hover{transform:translateY(-2px);box-shadow:0 8px 44px rgba(0,229,176,.32)}
.cta:active{transform:translateY(0)}
.sec{padding:12px 24px;border-radius:12px;border:1px solid var(--accent);
  background:rgba(0,229,176,.07);color:var(--accent);font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.sec:hover{background:rgba(0,229,176,.14)}

/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(2,4,10,.85);
  backdrop-filter:blur(10px);z-index:999;display:flex;align-items:center;
  justify-content:center;padding:24px}
.modal-box{background:var(--card);border:1px solid var(--border2);border-radius:24px;
  max-width:500px;width:100%;padding:38px;position:relative;
  box-shadow:0 32px 80px rgba(0,0,0,.6);max-height:90vh;overflow-y:auto}

/* Life goal pill (fix #5) */
.goal-pill{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  border-radius:14px;border:1px solid var(--border);background:transparent;
  cursor:pointer;transition:all .18s;text-align:left;width:100%
}
.goal-pill:hover{border-color:var(--border2)}
.goal-pill.on{border-color:var(--gold);background:rgba(255,209,102,.07)}
.goal-pill-icon{font-size:20px;flex-shrink:0}
.goal-pill-label{font-size:13px;font-weight:600;color:var(--text)}
.goal-pill-sub{font-size:10px;color:var(--muted)}

@media(max-width:760px){
  .tc{grid-template-columns:1fr !important}
  .fc{grid-template-columns:1fr 1fr !important}
  .sc{grid-template-columns:1fr !important}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo}=React;

// ── CURRENCY (fix #4) ──────────────────────────────────────────────────────────
// USD/MUR — rate fixed as of June 2025: 1 USD = 46.5 MUR
const FX_MUR = 46.5;
const CURRENCIES = {
  USD:{ sym:"$", code:"USD", toBase:v=>v, fromBase:v=>v, label:"US Dollar" },
  MUR:{ sym:"₨", code:"MUR", toBase:v=>v/FX_MUR, fromBase:v=>v*FX_MUR, label:"Mauritian Rupee" },
};

function useCur(){
  const [cur,setCur]=useState("USD");
  const C2=CURRENCIES[cur];
  // fmt converts a BASE (USD) value → display string in selected currency
  const disp=(v,short=false)=>{
    if(typeof v!=="number"||isNaN(v)) return "—";
    const val=C2.fromBase(v);
    const sym=C2.sym;
    if(val>=1e6) return `${sym}${(val/1e6).toFixed(short?1:2)}M`;
    if(val>=1e3) return `${sym}${(val/1e3).toFixed(short?0:1)}K`;
    return `${sym}${Math.round(val).toLocaleString()}`;
  };
  // input converts user-entered display value → base (USD)
  const toBase=(v)=>C2.toBase(Number(v));
  const fromBase=(v)=>C2.fromBase(v);
  return {cur,setCur,disp,toBase,fromBase,sym:C2.sym};
}

// ── FINANCIAL ENGINE ───────────────────────────────────────────────────────────
function runProjection(inp){
  const{age,gender,income,monthlySpend,savings,savingsRate,retireAge,
    debtBalance=0,retireMonthlyExpenses=0,lifeGoals=[]}=inp;
  const lifeExp=gender==="male"?75:85;
  const yearsInRet=Math.max(1,lifeExp-retireAge);
  const INFLATION=0.025,INCOME_GROWTH=Math.max(0.03,INFLATION),SWR=0.04;
  const ytr=Math.max(1,retireAge-age);
  const returnRate=ytr>10?0.075:ytr>5?0.05:0.035;

  // Build schedule of goal withdrawals keyed by year
  const goalWithdrawals={};
  (lifeGoals||[]).forEach(g=>{
    if(g.amount>0&&g.atAge>age&&g.atAge<retireAge){
      const yr=g.atAge-age; // years from now
      goalWithdrawals[yr]=(goalWithdrawals[yr]||0)+g.amount;
    }
  });

  let portfolio=Math.max(0,savings-debtBalance);
  const accum=[];
  for(let t=0;t<ytr;t++){
    const curIncome=income*Math.pow(1+INCOME_GROWTH,t);
    portfolio=portfolio*(1+returnRate)+curIncome*(savingsRate/100);
    // Deduct life goal at this year
    if(goalWithdrawals[t]) portfolio=Math.max(0,portfolio-goalWithdrawals[t]);
    accum.push({yr:age+t,val:Math.max(0,portfolio),phase:"grow"});
  }

  const retPortfolio=Math.max(0,portfolio);
  const retIncome=retPortfolio*SWR;
  const inflatedSpend=monthlySpend*12*Math.pow(1+INFLATION,ytr);
  const desiredAnnual=retireMonthlyExpenses>0
    ?retireMonthlyExpenses*12*Math.pow(1+INFLATION,ytr):null;
  const withdrawal=desiredAnnual!==null
    ?desiredAnnual:Math.max(inflatedSpend*0.7,retIncome);
  const targetPortfolio=retireMonthlyExpenses>0
    ?(retireMonthlyExpenses*12*Math.pow(1+INFLATION,ytr))/SWR:null;

  let reqMonthlySaving=null,reqSavingsRate=null;
  if(targetPortfolio!==null){
    const PV=Math.max(0,savings-debtBalance),r=returnRate/12,n=ytr*12;
    const gr=Math.pow(1+r,n),needed=targetPortfolio-PV*gr;
    reqMonthlySaving=needed>0?(needed*r)/(gr-1):0;
    reqSavingsRate=Math.min(80,Math.max(0,(reqMonthlySaving*12/income)*100));
  }
  const curMonthlySaving=(income*(savingsRate/100))/12;
  const monthlySavingGap=reqMonthlySaving!==null?reqMonthlySaving-curMonthlySaving:null;

  const maxDraw=Math.max(40,yearsInRet+15);
  let runOut=retireAge+maxDraw,drawnPort=retPortfolio;
  const drawdown=[];
  for(let y=0;y<=maxDraw;y++){
    const w=withdrawal*Math.pow(1+INFLATION,y);
    drawnPort=drawnPort*(1+0.04)-w;
    if(drawnPort<=0){runOut=retireAge+y;break;}
    if(y<maxDraw) drawdown.push({yr:retireAge+y,val:Math.max(0,drawnPort),phase:"draw"});
  }

  const lastsToLifeExp=runOut>=lifeExp;
  const surplusYears=runOut-lifeExp;
  const corpusMultiple=withdrawal>0?retPortfolio/withdrawal:0;

  // Health score
  const savScore=Math.min(30,(savingsRate/20)*30);
  const spendScore=Math.min(25,Math.max(0,25-((monthlySpend*12)/income)*25));
  const progScore=Math.min(20,(savings/(income*3))*20);
  const readyBase=targetPortfolio
    ?Math.min(25,(retPortfolio/targetPortfolio)*25)
    :Math.min(25,(retPortfolio/(withdrawal*yearsInRet))*25);
  const health=Math.round(savScore+spendScore+progScore+(lastsToLifeExp?readyBase:readyBase*0.5));

  const successProb=Math.min(97,Math.max(5,
    (lastsToLifeExp?60:25)+
    (surplusYears>=10?18:surplusYears>=5?10:surplusYears>=0?4:0)+
    (savingsRate>=20?10:savingsRate>=15?6:savingsRate>=10?3:0)+
    (corpusMultiple>=25?9:corpusMultiple>=18?5:0)
  ));

  const onTrackRatio=targetPortfolio?Math.min(1.5,retPortfolio/targetPortfolio):null;

  // Total goal impact
  const totalGoalAmount=(lifeGoals||[]).reduce((s,g)=>s+(g.amount||0),0);

  return{
    retPortfolio,retIncome,successProb,runOut,health,lifeExp,yearsInRet,
    returnRate,withdrawal,ytr,lastsToLifeExp,corpusMultiple,surplusYears,
    chartData:[...accum,...drawdown],
    targetPortfolio,reqMonthlySaving,reqSavingsRate,
    curMonthlySaving,monthlySavingGap,onTrackRatio,
    inflatedSpend,INCOME_GROWTH,totalGoalAmount,
  };
}

// What savings rate is needed to retire N years earlier?
function calcEarlyRetireSavings(inp,yearsEarlier){
  const target=Math.max(inp.age+2,inp.retireAge-yearsEarlier);
  const ytr=Math.max(1,target-inp.age);
  const returnRate=ytr>10?0.075:ytr>5?0.05:0.035;
  const lifeExp=inp.gender==="male"?75:85;
  const yearsInRet=Math.max(1,lifeExp-target);
  const INFLATION=0.025,INCOME_GROWTH=0.03;
  // Need enough for ~25x annual spend
  const inflatedSpend=inp.monthlySpend*12*Math.pow(1+INFLATION,ytr);
  const neededPort=Math.max(
    inp.retireMonthlyExpenses>0
      ?(inp.retireMonthlyExpenses*12*Math.pow(1+INFLATION,ytr))/0.04
      :inflatedSpend*0.7*25,
    inflatedSpend*20
  );
  const PV=Math.max(0,inp.savings-inp.debtBalance);
  const r=returnRate/12,n=ytr*12;
  const gr=Math.pow(1+r,n),needed=neededPort-PV*gr;
  const monthlyNeeded=needed>0?(needed*r)/(gr-1):0;
  const rateNeeded=Math.min(80,Math.max(0,(monthlyNeeded*12/inp.income)*100));
  return{targetAge:target,rateNeeded,monthlyNeeded,neededPort};
}

function runStressTest(inp){
  const results=[];
  for(let i=0;i<300;i++){
    const n=()=>1+(Math.random()-.5)*.08;
    const r=runProjection({...inp,income:inp.income*n(),savings:inp.savings*n()});
    results.push({port:r.retPortfolio,lasts:r.lastsToLifeExp});
  }
  results.sort((a,b)=>a.port-b.port);
  return{
    best:results[270].port,likely:results[150].port,tough:results[30].port,
    pctOk:(results.filter(r=>r.lasts).length/300)*100,
  };
}

function healthLabel(s){
  if(s<35) return{label:"Critical",color:"#FF4466"};
  if(s<55) return{label:"At Risk",color:"#FF8F5A"};
  if(s<75) return{label:"Stable",color:"#FFD166"};
  return{label:"Strong",color:"#00E5B0"};
}

// ── SLIDER (fat-finger friendly fix #1) ───────────────────────────────────────
function Slider({label,value,min,max,step=1,fmtFn,onChange,color,sub,sub2}){
  const col=color||"#00E5B0";
  const p=Math.min(100,Math.max(0,((value-min)/(max-min))*100));
  return(
    <div className="slider-wrap">
      <div className="slider-labels">
        <span className="slider-label">{label}</span>
        <span className="slider-value" style={{color:col}}>{fmtFn(value)}</span>
      </div>
      {sub&&<div className="slider-sub">{sub}</div>}
      <div className="slider-track-wrap">
        <div className="slider-track">
          <div className="slider-fill" style={{width:`${p}%`,background:`linear-gradient(90deg,${col}60,${col})`}}/>
        </div>
        <div className="slider-thumb" style={{left:`${p}%`,background:col}}/>
        <input type="range" min={min} max={max} step={step} value={value}
          onChange={e=>onChange(Number(e.target.value))}/>
      </div>
      {sub2&&<div className="slider-sub2">{sub2}</div>}
    </div>
  );
}

// ── SAVINGS SLIDER (% only, amount shown inline — no extra boxes) ──────────────
function SavingsSlider({income,savingsRate,onChange,disp}){
  const col=savingsRate>=20?"#00E5B0":savingsRate>=10?"#FFD166":"#FF4466";
  const monthlyAmt=(income*(savingsRate/100))/12;
  return(
    <div className="slider-wrap">
      <div className="slider-labels">
        <span className="slider-label">Savings Rate <span style={{textTransform:"none",letterSpacing:0,fontSize:10,color:"#4A5A7E"}}>(% of gross income)</span></span>
        <span className="slider-value" style={{color:col}}>{savingsRate}%</span>
      </div>
      <div className="slider-sub" style={{color:col}}>{disp(monthlyAmt)}/mo saved · {savingsRate<10?"aim for 15%+":savingsRate<20?"good — aim for 20%":"excellent"}</div>
      <div className="slider-track-wrap">
        <div className="slider-track">
          <div className="slider-fill" style={{
            width:`${Math.min(100,(savingsRate/50)*100)}%`,
            background:`linear-gradient(90deg,${col}60,${col})`
          }}/>
        </div>
        <div className="slider-thumb" style={{left:`${Math.min(100,(savingsRate/50)*100)}%`,background:col}}/>
        <input type="range" min={1} max={50} step={1} value={savingsRate}
          onChange={e=>onChange(Number(e.target.value))}/>
      </div>
    </div>
  );
}

// ── CHART ──────────────────────────────────────────────────────────────────────
function Chart({data,retireAge,lifeExp,goalMarkers=[],height=150}){
  if(!data||!data.length) return null;
  const W=600,H=height,pad={l:10,r:10,t:14,b:22};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const maxV=Math.max(...data.map(d=>d.val),1)*1.1;
  const minYr=data[0].yr,maxYr=data[data.length-1].yr;
  const range=Math.max(1,maxYr-minYr);
  const sx=yr=>pad.l+((yr-minYr)/range)*cw;
  const sy=v=>pad.t+ch-(v/maxV)*ch;
  const grow=data.filter(d=>d.phase==="grow");
  const draw=data.filter(d=>d.phase==="draw");
  const tp=pts=>pts.map((d,i)=>`${i?"L":"M"}${sx(d.yr).toFixed(1)},${sy(d.val).toFixed(1)}`).join(" ");
  const retX=sx(retireAge);
  const lifeX=lifeExp>=minYr&&lifeExp<=maxYr?sx(lifeExp):null;
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible",display:"block"}}>
      <defs>
        <linearGradient id="gg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#00E5B0" stopOpacity=".25"/><stop offset="100%" stopColor="#00E5B0" stopOpacity="0"/>
        </linearGradient>
        <linearGradient id="gd" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#FFD166" stopOpacity=".2"/><stop offset="100%" stopColor="#FFD166" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {grow.length>1&&<path d={`${tp(grow)} L${sx(grow[grow.length-1].yr)},${pad.t+ch} L${sx(grow[0].yr)},${pad.t+ch} Z`} fill="url(#gg)"/>}
      {draw.length>1&&<path d={`${tp(draw)} L${sx(draw[draw.length-1].yr)},${pad.t+ch} L${sx(draw[0].yr)},${pad.t+ch} Z`} fill="url(#gd)"/>}
      {grow.length>1&&<path d={tp(grow)} fill="none" stroke="#00E5B0" strokeWidth="2.5" strokeLinejoin="round"/>}
      {draw.length>1&&<path d={tp(draw)} fill="none" stroke="#FFD166" strokeWidth="2" strokeLinejoin="round" strokeDasharray="7,3"/>}
      {/* Goal markers */}
      {goalMarkers.map((gm,i)=>{
        const gx=sx(gm.yr);
        return gx>=pad.l&&gx<=pad.l+cw?(
          <g key={i}>
            <line x1={gx} y1={pad.t} x2={gx} y2={pad.t+ch} stroke="#FF8F5A" strokeWidth="1" strokeDasharray="3,3" opacity=".6"/>
            <text x={gx+3} y={pad.t+22} fill="#FF8F5A" fontSize="8" fontFamily="DM Sans" opacity=".85">{gm.icon}</text>
          </g>
        ):null;
      })}
      <line x1={retX} y1={pad.t} x2={retX} y2={pad.t+ch} stroke="#4A5A7E" strokeWidth="1" strokeDasharray="3,3" opacity=".6"/>
      <text x={retX+3} y={pad.t+10} fill="#4A5A7E" fontSize="9" fontFamily="DM Sans" opacity=".9">retire {retireAge}</text>
      {lifeX!==null&&<g>
        <line x1={lifeX} y1={pad.t} x2={lifeX} y2={pad.t+ch} stroke="#FF4466" strokeWidth="1.5" strokeDasharray="4,3" opacity=".7"/>
        <text x={lifeX+3} y={pad.t+10} fill="#FF4466" fontSize="9" fontFamily="DM Sans" opacity=".9">age {lifeExp}</text>
      </g>}
      {[minYr,Math.round((minYr+maxYr)/2),maxYr].map(yr=>(
        <text key={yr} x={sx(yr)} y={H-4} fill="#4A5A7E" fontSize="9" fontFamily="DM Sans" textAnchor="middle" opacity=".7">{yr}</text>
      ))}
    </svg>
  );
}

// ── LIFESPAN BAR ───────────────────────────────────────────────────────────────
function LifeBar({retireAge,lifeExp,runOut}){
  const end=Math.max(lifeExp+12,runOut+6),range=end-retireAge;
  const lifePos=((lifeExp-retireAge)/range)*100;
  const runPos=Math.min(100,((Math.min(runOut,end)-retireAge)/range)*100);
  const ok=runOut>=lifeExp;
  return(
    <div style={{marginTop:14}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
        <span style={{fontSize:11,color:"#4A5A7E"}}>Retire age {retireAge}</span>
        <span style={{fontSize:11,fontWeight:600,color:ok?"#00E5B0":"#FF4466"}}>
          {ok?`✓ ${runOut-lifeExp} years to spare`:`⚠ Runs short by ${lifeExp-runOut} years`}
        </span>
      </div>
      <div style={{position:"relative",height:14,background:"#141D33",borderRadius:7,overflow:"hidden"}}>
        <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${runPos}%`,
          background:ok?"linear-gradient(90deg,#00A87E88,#00E5B0)":"linear-gradient(90deg,#FF8F5A88,#FF4466)",
          borderRadius:7,transition:"width .5s ease"}}/>
        <div style={{position:"absolute",top:0,left:`${lifePos}%`,width:2,height:"100%",
          background:"rgba(255,255,255,.4)",transform:"translateX(-1px)"}}/>
      </div>
      <div style={{position:"relative",height:16,marginTop:2}}>
        <div style={{position:"absolute",left:`${lifePos}%`,transform:"translateX(-50%)",
          fontSize:9,color:"#4A5A7E",whiteSpace:"nowrap"}}>
          Life expectancy age {lifeExp}
        </div>
      </div>
    </div>
  );
}

function generatePDF(base,result,stress,contactInfo,cur,disp){
  const{jsPDF}=window.jspdf;

  const W=210,M=20,tw=W-M*2;

    mu=[74,90,126],dn=[255,68,102],cb=[15,21,37],sb=[20,29,51];
  const sf=c=>doc.setFillColor(...c);
  const st=c=>doc.setTextColor(...c);
  const sd=c=>doc.setDrawColor(...c);

  sf(dk);doc.rect(0,0,W,297,"F");
  sf([11,15,28]);doc.rect(0,0,W,44,"F");
  sd(tl);doc.setLineWidth(.4);doc.line(0,44,W,44);
  sf(tl);doc.roundedRect(M,10,22,22,3,3,"F");
  st(dk);doc.setFont("helvetica","bold");doc.setFontSize(14);doc.text("ARK",M+2.5,25);
  st(wh);doc.setFontSize(14);doc.text("ARK Financial Planners",M+28,18);
  st(mu);doc.setFont("helvetica","normal");doc.setFontSize(8);doc.text("RETIREMENT PLANNING TOOL",M+28,25);
  st(mu);doc.text(`For: ${contactInfo?.name||"You"}`,M+28,33);
  doc.text(`${new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}`,W-M,33,{align:"right"});
  doc.text(`Currency: ${cur}`,W-M,40,{align:"right"});

  let y=56;
  st(wh);doc.setFont("helvetica","bold");doc.setFontSize(20);doc.text("Your Retirement Plan Summary",M,y);y+=8;
  st(mu);doc.setFont("helvetica","normal");doc.setFontSize(9);doc.text("Personalised projection based on your inputs",M,y);y+=14;

  const ok=result.lastsToLifeExp;
  sf(ok?[0,50,35]:[60,10,15]);doc.roundedRect(M,y,tw,18,3,3,"F");
  sd(ok?tl:dn);doc.setLineWidth(.5);doc.roundedRect(M,y,tw,18,3,3,"S");
  st(ok?tl:dn);doc.setFont("helvetica","bold");doc.setFontSize(11);
  doc.text(ok?"✓  Your savings are projected to outlast your life expectancy":"⚠  Your savings may run short before your life expectancy",M+6,y+11.5);
  y+=26;

  const boxes=[
    ["Pot at Retirement",disp(result.retPortfolio),`at age ${base.retireAge}`,tl],
    ["Annual Income",disp(base.retireMonthlyExpenses>0?result.withdrawal:result.retIncome),base.retireMonthlyExpenses>0?"goal-based":"4% rule",gd],
    ["Health Score",`${result.health}/100`,healthLabel(result.health).label,healthLabel(result.health).color.replace("#","").match(/.{2}/g).map(v=>parseInt(v,16))],
    ["Money lasts to",result.runOut>result.lifeExp+10?"Age 95+":String(`Age ${result.runOut}`),result.runOut>=result.lifeExp?`${result.surplusYears}yr surplus`:`${result.lifeExp-result.runOut}yr short`,result.runOut>=result.lifeExp?tl:dn],
  ];
  const bw=(tw-6)/2,bh=24;
  boxes.forEach((b,i)=>{
    const bx=M+(i%2)*(bw+6),by=y+Math.floor(i/2)*(bh+6);
    sf(cb);doc.roundedRect(bx,by,bw,bh,3,3,"F");
    st(mu);doc.setFont("helvetica","normal");doc.setFontSize(7);doc.text(b[0].toUpperCase(),bx+5,by+7);
    const col=Array.isArray(b[3])?b[3]:wh;
    st(col);doc.setFont("helvetica","bold");doc.setFontSize(13);doc.text(String(b[1]),bx+5,by+16);
    st(mu);doc.setFont("helvetica","normal");doc.setFontSize(7);doc.text(String(b[2]),bx+5,by+21.5);
  });
  y+=2*bh+18;

  st(wh);doc.setFont("helvetica","bold");doc.setFontSize(11);doc.text("Your Inputs",M,y);y+=7;
  sd([28,38,64]);doc.setLineWidth(.3);doc.line(M,y,M+tw,y);y+=8;
  const rows=[
    ["Age",String(base.age),"Retirement Age",String(base.retireAge)],
    ["Sex",base.gender==="male"?"Male":"Female","Life Expectancy",`Age ${result.lifeExp}`],
    ["Annual Income",disp(base.income),"Savings Rate",`${base.savingsRate}% (${disp(base.income*base.savingsRate/100)}/yr)`],
    ["Monthly Spend",disp(base.monthlySpend),"Current Savings",disp(base.savings)],
    ["Return Rate",`${(result.returnRate*100).toFixed(1)}%/yr`,"Income Growth",`${(result.INCOME_GROWTH*100).toFixed(1)}%/yr`],
    ["Corpus Multiple",`${result.corpusMultiple.toFixed(1)}×`,"Retirement Duration",`${result.yearsInRet} years`],
  ];
  rows.forEach(([k1,v1,k2,v2])=>{
    sf(sb);doc.roundedRect(M,y,tw,10,1.5,1.5,"F");
    st(mu);doc.setFont("helvetica","normal");doc.setFontSize(7.5);doc.text(k1,M+4,y+6.5);
    st(wh);doc.setFont("helvetica","bold");doc.text(v1,M+tw/2-4,y+6.5,{align:"right"});
    st(mu);doc.setFont("helvetica","normal");doc.text(k2,M+tw/2+4,y+6.5);
    st(wh);doc.setFont("helvetica","bold");doc.text(v2,M+tw,y+6.5,{align:"right"});
    y+=12;
  });
  y+=8;

  if(base.lifeGoals&&base.lifeGoals.length>0){
    if(y>230){doc.addPage();sf(dk);doc.rect(0,0,W,297,"F");y=20;}
    st(wh);doc.setFont("helvetica","bold");doc.setFontSize(11);doc.text("Life Goals Impact",M,y);y+=7;
    sd([28,38,64]);doc.setLineWidth(.3);doc.line(M,y,M+tw,y);y+=8;
    base.lifeGoals.forEach(g=>{
      sf(sb);doc.roundedRect(M,y,tw,10,1.5,1.5,"F");
      st(mu);doc.setFont("helvetica","normal");doc.setFontSize(7.5);doc.text(`${g.icon} ${g.label} at age ${g.atAge}`,M+4,y+6.5);
      st([255,143,90]);doc.setFont("helvetica","bold");doc.text(`-${disp(g.amount)}`,M+tw,y+6.5,{align:"right"});
      y+=12;
    });
    sf(sb);doc.roundedRect(M,y,tw,10,1.5,1.5,"F");
    st(mu);doc.setFont("helvetica","normal");doc.setFontSize(7.5);doc.text("TOTAL WITHDRAWN FOR LIFE GOALS",M+4,y+6.5);
    st([255,143,90]);doc.setFont("helvetica","bold");doc.text(`-${disp(result.totalGoalAmount)}`,M+tw,y+6.5,{align:"right"});
    y+=18;
  }

  if(stress){
    if(y>230){doc.addPage();sf(dk);doc.rect(0,0,W,297,"F");y=20;}
    st(wh);doc.setFont("helvetica","bold");doc.setFontSize(11);doc.text("Range of Outcomes (300 Scenarios)",M,y);y+=7;
    sd([28,38,64]);doc.setLineWidth(.3);doc.line(M,y,M+tw,y);y+=8;
    const sw=(tw-12)/3;
    [[disp(stress.tough),"If things go badly","#FF8F5A"],[disp(stress.likely),"Most likely","#ECF0FA"],[disp(stress.best),"If things go well","#00E5B0"]].forEach((b,i)=>{
      const bx=M+i*(sw+6);sf(cb);doc.roundedRect(bx,y,sw,22,3,3,"F");
      const col=b[2].replace("#","").match(/.{2}/g).map(v=>parseInt(v,16));
      st(col);doc.setFont("helvetica","bold");doc.setFontSize(12);doc.text(b[0],bx+sw/2,y+10,{align:"center"});
      st(mu);doc.setFont("helvetica","normal");doc.setFontSize(7.5);doc.text(b[1],bx+sw/2,y+18,{align:"center"});
    });
    y+=30;
    sf(cb);doc.roundedRect(M,y,tw,12,2,2,"F");
    const pw=stress.pctOk;
    const pc=pw>=75?tl:pw>=55?gd:dn;
    st(pc);doc.setFont("helvetica","bold");doc.setFontSize(9);
    doc.text(`${pw.toFixed(0)}% of 300 scenarios show your money lasting to age ${result.lifeExp}`,M+tw/2,y+7.5,{align:"center"});
    y+=20;
  }

  if(y>260){doc.addPage();sf(dk);doc.rect(0,0,W,297,"F");y=20;}
  sf([11,15,28]);doc.rect(0,280,W,17,"F");
  sd([28,38,64]);doc.setLineWidth(.3);doc.line(0,280,W,280);
  st(mu);doc.setFont("helvetica","normal");doc.setFontSize(7);
  doc.text("ARK Financial Planners · For educational purposes only. Not financial advice.",M,289);
  doc.text("Consult a qualified financial adviser before making any decisions.",W-M,289,{align:"right"});

  doc.save(contactInfo?.name?`ARK-Plan-${contactInfo.name.split(" ")[0]}.pdf`:"ARK-Plan.pdf");
}

// ── CRM STORAGE ────────────────────────────────────────────────────────────────
async function saveLead(lead){
  try{
    const id=`lead:${Date.now()}`;
    await window.storage.set(id,JSON.stringify({...lead,id,savedAt:new Date().toISOString()}));
    return true;
  }catch(e){console.error("CRM save failed",e);return false;}
}
async function loadLeads(){
  try{
    const keys=await window.storage.list("lead:");
    if(!keys||!keys.keys||!keys.keys.length) return [];
    const leads=await Promise.all(
      keys.keys.map(async k=>{
        try{const r=await window.storage.get(k);return r?JSON.parse(r.value):null;}
        catch{return null;}
      })
    );
    return leads.filter(Boolean).sort((a,b)=>b.savedAt>a.savedAt?1:-1);
  }catch(e){return [];}
}

// ── SCENARIO CARDS (hooked what-ifs fix #6) ────────────────────────────────────
function ScenarioCards({base,result,onSelect,active,disp}){
  const early5=calcEarlyRetireSavings(base,5);
  const early10=calcEarlyRetireSavings(base,10);
  const at20=runProjection({...base,savingsRate:20});
  const cutSpend=runProjection({...base,monthlySpend:Math.round(base.monthlySpend*.8)});
  const noGoals=base.lifeGoals&&base.lifeGoals.length>0
    ?runProjection({...base,lifeGoals:[]}):null;

  const scenarios=[
    {
      id:"earlyRetire5",
      q:`Can I retire at ${early5.targetAge} — 5 years earlier?`,
      hook:early5.rateNeeded<=50
        ?`Yes — if you save ${early5.rateNeeded.toFixed(1)}% of your income from now.`
        :`It's tight — needs ${early5.rateNeeded.toFixed(1)}% savings rate. Let's see how close you can get.`,
      inp:{...base,retireAge:early5.targetAge},
      badge:early5.rateNeeded<=base.savingsRate?"Achievable ✓":"Stretch goal",
      badgeCol:early5.rateNeeded<=base.savingsRate?"#00E5B0":"#FFD166",
    },
    {
      id:"earlyRetire10",
      q:`What if I retire at ${early10.targetAge} — a whole decade early?`,
      hook:`You'd need to save ${early10.rateNeeded.toFixed(1)}% of your income. Here's what that looks like.`,
      inp:{...base,retireAge:early10.targetAge},
      badge:"Bold move",badgeCol:"#FF8F5A",
    },
    {
      id:"save20",
      q:"What if I simply saved 20% of my income?",
      hook:result?`That would add ${disp(at20.retPortfolio-result.retPortfolio)} to your pot by retirement.`:"See the difference one decision makes.",
      inp:{...base,savingsRate:20},
      badge:"Easy win",badgeCol:"#00E5B0",
    },
    {
      id:"cutSpend",
      q:"What if I spent 20% less each month?",
      hook:result?`Your money would last ${Math.max(0,cutSpend.runOut-result.runOut)} extra years.`:"Spending less now buys you time later.",
      inp:{...base,monthlySpend:Math.round(base.monthlySpend*.8)},
      badge:"High impact",badgeCol:"#00E5B0",
    },
    ...(noGoals?[{
      id:"noGoals",
      q:"What if I skipped my planned big purchases?",
      hook:`Your retirement pot would be ${disp(noGoals.retPortfolio-result.retPortfolio)} larger.`,
      inp:{...base,lifeGoals:[]},
      badge:"Trade-off",badgeCol:"#FFD166",
    }]:[]),
    {
      id:"lateRetire",
      q:`What if I work 5 more years — retire at ${Math.min(80,base.retireAge+5)}?`,
      hook:"Working longer is one of the most powerful moves in retirement planning.",
      inp:{...base,retireAge:Math.min(80,base.retireAge+5)},
      badge:"Powerful lever",badgeCol:"#00E5B0",
    },
    {id:"custom",q:"I want to build my own scenario.",hook:"Adjust any variable — see the impact instantly.",inp:{...base},badge:"Custom",badgeCol:"#4A5A7E"},
  ];
  return{scenarios};
}

  const DEF={
    age:35,gender:"female",
    income:90000,   // always stored in USD base
    monthlySpend:3200,
    savings:45000,
    savingsRate:12,
    retireAge:65,
    debtBalance:0,
    retireMonthlyExpenses:0,
    lifeGoals:[],
  };
  const [base,setBase]=useState(DEF);
  const [sandbox,setSandbox]=useState(null);
  const [sbInp,setSbInp]=useState({...DEF});
  const [result,setResult]=useState(null);
  const [stress,setStress]=useState(null);
  const [sbResult,setSbResult]=useState(null);

  const setB=(k,v)=>setBase(p=>({...p,[k]:v}));
  const setSB=(k,v)=>setSbInp(p=>({...p,[k]:v}));

  useEffect(()=>{
    setResult(runProjection(base));
    setStress(runStressTest(base));
  },[JSON.stringify(base)]);
  useEffect(()=>{
    if(sandbox) setSbResult(runProjection(sbInp));
  },[JSON.stringify(sbInp),sandbox]);

  // Life goals handlers
  const addGoal=(gt)=>setB("lifeGoals",[...(base.lifeGoals||[]),{...gt,amount:gt.defaultAmt,atAge:Math.min(gt.defaultAge,base.retireAge-1)}]);
  const removeGoal=(id)=>setB("lifeGoals",(base.lifeGoals||[]).filter(g=>g.id!==id));
  const updateGoal=(id,key,val)=>setB("lifeGoals",(base.lifeGoals||[]).map(g=>g.id===id?{...g,[key]:val}:g));

  const addSbGoal=(gt)=>setSB("lifeGoals",[...(sbInp.lifeGoals||[]),{...gt,amount:gt.defaultAmt,atAge:Math.min(gt.defaultAge,sbInp.retireAge-1)}]);
  const removeSbGoal=(id)=>setSB("lifeGoals",(sbInp.lifeGoals||[]).filter(g=>g.id!==id));
  const updateSbGoal=(id,key,val)=>setSB("lifeGoals",(sbInp.lifeGoals||[]).map(g=>g.id===id?{...g,[key]:val}:g));

  const {scenarios}=result?ScenarioCards({base,result,active:sandbox,disp}):{scenarios:[]};

  const handleContact=(info)=>{
    setContactInfo(info);
    // Save to CRM on first submit (not on PDF download re-trigger)
    if(!info.download&&result){
      const shortfall=result.lifeExp-result.runOut;
      saveLead({
        name:info.name,
        email:info.email,
        phone:info.phone,
        health:result.health,
        successProb:result.successProb,
        potDisplay:disp(result.retPortfolio),
        retPortfolio:result.retPortfolio,
        verdict:result.lastsToLifeExp?"On track":"Needs action",

        retireAge:base.retireAge,
        currency:cur,
        note:`Age ${base.age}, retire ${base.retireAge}, saving ${base.savingsRate}%`,
      });
    }
    if(info.download){
      setShowModal(false);
      setTimeout(()=>generatePDF(base,result,stress,info,cur,disp),300);
    }
  };

  const hl=result?healthLabel(result.health):{label:"",color:"#00E5B0"};
  const dp=sbResult&&result?sbResult.retPortfolio-result.retPortfolio:0;
  const dP=sbResult&&result?sbResult.successProb-result.successProb:0;
  const dH=sbResult&&result?sbResult.health-result.health:0;

  // Goal markers for chart
  const goalMarkers=(base.lifeGoals||[]).map(g=>({yr:g.atAge,icon:g.icon}));

  // Brutal brief summary — one punch, hits the most critical number
  function getBrutalVerdict(result,base,disp){
    const shortfall=result.lifeExp-result.runOut;
    const gap=result.monthlySavingGap;
    const targetMonthly=base.retireMonthlyExpenses>0?base.retireMonthlyExpenses:0;
    // Use the actual projected monthly income (withdrawal-based when goal set, else 4% rule)
    const projectedMonthly=(base.retireMonthlyExpenses>0?result.withdrawal:result.retIncome)/12;
    // True gap: only negative if projected income actually falls short of goal
    const incomeShortfall=targetMonthly>0?targetMonthly-projectedMonthly:0;

    if(!result.lastsToLifeExp){
      if(shortfall>=15) return{
        color:"#FF4466",icon:"🔴",
        headline:`Your money runs out ${shortfall} years too soon.`,
        sub:`At ${base.retireAge} you'll have ${disp(result.retPortfolio)}. At your life expectancy of ${result.lifeExp} — you'll have nothing. That's the gap you need to close.`,
        action:`Save ${Math.min(50,base.savingsRate+8)}% instead of ${base.savingsRate}% and retire at ${Math.min(80,base.retireAge+3)}.`
      };
      return{
        color:"#FF8F5A",icon:"⚠️",
        headline:`${shortfall} year shortfall. Fixable — but not on autopilot.`,
        sub:`Your pot of ${disp(result.retPortfolio)} runs out at ${result.runOut}. You need it to last to ${result.lifeExp}.`,
        action:gap>0?`Close the gap: save ${disp(gap)} more per month.`:`Retire ${Math.min(5,shortfall)} years later or cut monthly spending by 15%.`
      };
    }
    if(result.surplusYears<5) return{
      color:"#FFD166",icon:"🟡",
      headline:`You're fine — unless anything goes wrong.`,
      sub:`Money lasts ${result.surplusYears} years past age ${result.lifeExp}. That's a thin margin for a ${result.yearsInRet}-year retirement.`,
      action:`A 3% savings bump now adds ${disp(runProjection({...base,savingsRate:base.savingsRate+3}).retPortfolio-result.retPortfolio)} — buy yourself real breathing room.`
    };
    // Goal set and projected income genuinely falls short
    if(targetMonthly>0&&incomeShortfall>0) return{
      color:"#FF8F5A",icon:"🎯",
      headline:`You're ${disp(incomeShortfall/12*12)}/yr short of your retirement goal.`,
      sub:`You want ${disp(targetMonthly)}/mo. Your pot is projected to deliver ${disp(projectedMonthly)}/mo — a ${disp(incomeShortfall)}/mo gap.`,
      action:`Saving ${result.reqSavingsRate?.toFixed(1)}% of income (you're at ${base.savingsRate}%) closes it.`
    };
    // Goal set and already on track or exceeded
    if(targetMonthly>0&&incomeShortfall<=0) return{
      color:"#00E5B0",icon:"✅",
      headline:`On track for your ${disp(targetMonthly)}/mo retirement goal.`,
      sub:`Your pot is projected to deliver ${disp(projectedMonthly)}/mo — ${disp(-incomeShortfall)}/mo above your target. Money lasts ${result.surplusYears} years past age ${result.lifeExp}.`,
      action:`You're ahead. Focus now on protecting gains and tax efficiency.`
    };
    return{
      color:"#00E5B0",icon:"✅",
      headline:`Solid. Money lasts ${result.surplusYears} years past your life expectancy.`,
      sub:`Pot at retirement: ${disp(result.retPortfolio)}. Projected income: ${disp(projectedMonthly)}/mo. You're in good shape.`,
      action:`Focus shifts to tax efficiency and protecting what you've built.`
    };
  }

  const verdict=result?getBrutalVerdict(result,base,disp):null;

  // Currency-aware retirement income quick-picks (stored in USD base)

  // USD: 2.5k, 5k, 7.5k, 10k, 20k, 25k

  if(showHero) return <Hero onStart={()=>{setShowHero(false);setTimeout(()=>appRef.current?.scrollIntoView({behavior:"smooth"}),50);}}/>;

  // Currency-scaled slider helpers

  const incomeDisp=fromBase(base.income);
  const spendDisp=fromBase(base.monthlySpend);
  const savingsDisp=fromBase(base.savings);

  const sbIncomeDisp=fromBase(sbInp.income);
  const sbSpendDisp=fromBase(sbInp.monthlySpend);
  const sbSavingsDisp=fromBase(sbInp.savings);

  const minIncome=cur==="MUR"?465000:10000;
  const minSpend=cur==="MUR"?23250:500;
  const maxIncome=cur==="MUR"?25000000:500000;
  const maxSpend=cur==="MUR"?11625000:250000;

  const stepSavings=cur==="MUR"?250000:5000;

  return(
    <div ref={appRef} style={{minHeight:"100vh"}}>
      {showModal&&result&&<ContactModal base={base} result={result} stress={stress} onClose={()=>setShowModal(false)} onSubmit={handleContact} disp={disp}/>}

            ))}
          </nav>

      <div style={{maxWidth:1040,margin:"0 auto",padding:"28px 20px"}}>

        {/* ══ PLAN TAB ══════════════════════════════════════════════════════ */}
        {tab==="plan"&&(

                      min={minIncome} max={maxIncome} step={stepIncome}
                      fmtFn={v=>sym+(v>=1e6?(v/1e6).toFixed(1)+"M":v>=1e3?(v/1e3).toFixed(0)+"K":Math.round(v).toLocaleString())}
                      onChange={v=>setSB("income",toBase(v))} color="#00E5B0"/>
                    <Slider label={`Monthly Spending (${cur})`} value={sbSpendDisp}
                      min={minSpend} max={maxSpend} step={stepSpend}
                      fmtFn={v=>sym+(v>=1e3?(v/1e3).toFixed(0)+"K":Math.round(v).toLocaleString())}
                      onChange={v=>setSB("monthlySpend",toBase(v))} color="#FF8F5A"/>
                    <SavingsSlider income={sbInp.income} savingsRate={sbInp.savingsRate}
                      onChange={v=>setSB("savingsRate",v)} disp={disp}/>
                    <Slider label="Retirement Age" value={sbInp.retireAge}
                      min={Math.max(sbInp.age+2,40)} max={80}
                      fmtFn={v=>`Age ${v}`} onChange={v=>setSB("retireAge",v)} color="#FFD166"/>
                    <Slider label={`Current Savings (${cur})`} value={sbSavingsDisp}
                      min={0} max={maxSavings} step={stepSavings}
                      fmtFn={v=>sym+(v>=1e6?(v/1e6).toFixed(1)+"M":v>=1e3?(v/1e3).toFixed(0)+"K":Math.round(v).toLocaleString())}
                      onChange={v=>setSB("savings",toBase(v))} color="#00E5B0"/>
                  </div>

                  {/* Life goals in sandbox */}
                  <div style={{borderTop:"1px solid #1C2640",marginTop:12,paddingTop:18}}>
                    <div style={{fontSize:11,color:"#4A5A7E",marginBottom:12,textTransform:"uppercase",letterSpacing:".08em"}}>Life goals in this scenario</div>
                    <LifeGoals goals={sbInp.lifeGoals||[]} onAdd={addSbGoal} onRemove={removeSbGoal}
                      onUpdate={updateSbGoal} baseAge={sbInp.age} retireAge={sbInp.retireAge}
                      disp={disp} toBase={toBase} fromBase={fromBase} cur={cur}/>
                  </div>

                  <div style={{display:"flex",gap:12,marginTop:18,flexWrap:"wrap"}}>
                    <button className="sec" onClick={()=>{setBase({...sbInp});setSandbox(null);setTab("results");}}>
                      Make this my plan →
                    </button>
                    <button className="sec" style={{borderColor:"#FFD166",color:"#FFD166",background:"rgba(255,209,102,.06)"}}
                      onClick={()=>setShowModal(true)}>
                      Get PDF + speak to an adviser
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* FOOTER */}
      <footer style={{borderTop:"1px solid #1C2640",padding:"20px 28px",marginTop:48,
        display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:24,height:24,borderRadius:7,background:"linear-gradient(135deg,#00A87E,#00E5B0)",
            display:"grid",placeItems:"center",fontSize:11,color:"#02100C",fontWeight:800}}>◈</div>
          <span style={{fontFamily:"'Playfair Display'",fontSize:13,fontWeight:700}}>ARK Financial Planners</span>
          <span style={{fontSize:11,color:"#4A5A7E",marginLeft:4}}>USD/MUR rate: 1 USD = {FX_MUR} MUR (fixed Jun 2025)</span>
        </div>
        <div style={{fontSize:11,color:"#4A5A7E",maxWidth:480,textAlign:"right",lineHeight:1.65}}>
          For educational purposes only. Not financial advice. Consult a qualified financial adviser before making decisions.
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
