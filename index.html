<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ARK Financial Planners</title>
<style>
:root{
  --bg:#F7F8FA;--surface:#fff;--card:#fff;--border:#E8EAF0;
  --text:#111827;--muted:#6B7280;--hint:#9CA3AF;--subtle:#F3F4F6;
  --accent:#1A56DB;--accent-lt:#EEF3FD;
  --gold:#B45309;--gold-lt:#FFFBEB;
  --ok:#16A34A;--ok-lt:#F0FDF4;
  --warn:#D97706;--warn-lt:#FFFBEB;
  --danger:#DC2626;--danger-lt:#FEF2F2;
  --p2:#7C3AED;--p2-lt:#F5F3FF;
}
[data-theme=dark]{
  --bg:#0F1117;--surface:#1A1D27;--card:#1E2130;--border:#2A2E40;
  --text:#F1F5F9;--muted:#94A3B8;--hint:#4B5563;--subtle:#242736;
  --accent:#3B82F6;--accent-lt:#1E2A40;
  --gold:#F59E0B;--gold-lt:#1F1A0D;
  --ok:#22C55E;--ok-lt:#0D2016;
  --warn:#F59E0B;--warn-lt:#1F1A0D;
  --danger:#EF4444;--danger-lt:#200D0D;
  --p2:#A78BFA;--p2-lt:#1E1530;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:var(--text);font-size:14px;line-height:1.6;overflow-x:hidden}
button{cursor:pointer;font-family:inherit}
input{font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.wrap{max-width:660px;margin:0 auto;padding:0 16px}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.hdr-inner{height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo-btn{display:flex;align-items:center;gap:10px;background:none;border:none;padding:0;color:var(--text);cursor:pointer}
.logo-mark{width:30px;height:30px;border-radius:8px;background:var(--accent);display:grid;place-items:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tog{display:flex;background:var(--subtle);border-radius:8px;padding:2px;border:1px solid var(--border)}
.tog-btn{padding:6px 12px;border-radius:6px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:500;font-family:inherit}
.tog-btn.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.dm-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--subtle);display:grid;place-items:center;font-size:15px;cursor:pointer}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px}
.sec-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.sl-wrap{margin-bottom:18px}
.sl-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.sl-label{font-size:12px;font-weight:500;color:var(--muted)}
.sl-hint{font-size:10px;color:var(--hint);font-style:italic;font-weight:400;margin-left:5px}
.sl-val{font-size:17px;font-weight:600;letter-spacing:-.4px}
.sl-sub{font-size:11px;margin-bottom:4px;min-height:16px}
.sl-row{display:flex;align-items:center;gap:8px}
.sl-pm{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--subtle);color:var(--muted);font-size:18px;font-weight:400;display:grid;place-items:center;cursor:pointer;flex-shrink:0;line-height:1;user-select:none;-webkit-user-select:none}
.sl-pm:active{background:var(--border)}
.sl-track-wrap{position:relative;height:36px;display:flex;align-items:center;flex:1}
.sl-track{position:absolute;left:0;right:0;height:4px;background:var(--border);border-radius:2px}
.sl-fill{position:absolute;left:0;top:0;height:100%;border-radius:2px}
.sl-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;border:2.5px solid var(--surface);box-shadow:0 1px 5px rgba(0,0,0,.25);pointer-events:none;z-index:1}
input[type=range].sl-input{position:absolute;left:0;width:100%;height:100%;opacity:0;cursor:pointer;margin:0;z-index:2;-webkit-appearance:none}
.g-chips{display:flex;gap:6px;margin-bottom:14px}
.g-chip{flex:1;padding:7px 6px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:500;cursor:pointer;text-align:center}
.mode-tog{display:flex;background:var(--subtle);border-radius:8px;padding:2px;border:1px solid var(--border);margin-bottom:14px}
.mode-btn{flex:1;padding:8px 0;border-radius:6px;border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.mode-btn.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.person-pair{display:flex;gap:12px;margin-bottom:12px}
.person-card{background:var(--card);border-radius:14px;padding:16px;flex:1;min-width:0}
.person-card.p1{border:1px solid rgba(59,130,246,.3)}
.person-card.p2{border:1px solid rgba(167,139,250,.3)}
.person-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.avatar{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:13px;font-weight:700;flex-shrink:0}
.goals-tog{width:100%;border:1px dashed var(--border);border-radius:8px;padding:11px 14px;background:transparent;color:var(--muted);font-family:inherit;font-size:12px;font-weight:500;display:flex;justify-content:space-between;cursor:pointer;text-align:left}
.goals-tog.has{border-color:rgba(245,158,11,.4);color:var(--gold)}
.goal-pill{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;text-align:left;width:100%;font-family:inherit}
.goal-pill.on{border-color:var(--gold);background:var(--gold-lt);color:var(--gold)}
.imode-wrap{display:flex;gap:6px;margin-bottom:12px}
.imode-btn{flex:1;padding:10px 6px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;font-size:11px;font-weight:500;cursor:pointer;text-align:center;line-height:1.4}
.scen-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.scen-btn{padding:12px 8px;border-radius:10px;border:1px solid var(--border);background:var(--card);cursor:pointer;text-align:center;font-family:inherit}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-box{background:var(--subtle);border-radius:10px;padding:13px 15px}
.stat-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.stat-val{font-size:20px;font-weight:600;letter-spacing:-.4px;line-height:1.1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px}
.wi-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.wi-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-family:inherit;text-align:left}
.wi-detail{margin-top:4px;background:var(--subtle);border-radius:10px;padding:14px;border:1px solid var(--border)}
.wi-nums{display:flex;gap:8px;margin-bottom:10px}
.wi-num{flex:1;background:var(--card);border-radius:8px;padding:7px 10px;border:1px solid var(--border)}
.wi-num-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.wi-num-val{font-size:14px;font-weight:600}
.hh-snap{background:var(--subtle);border-radius:12px;padding:12px 14px;margin-bottom:12px}
.hh-snap-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.hh-snap-item{background:var(--card);border-radius:8px;padding:8px 10px;text-align:center;border:1px solid var(--border)}
.cta{width:100%;padding:14px;border-radius:8px;background:var(--accent);border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.teaser{background:var(--accent-lt);border:1px solid rgba(59,130,246,.2);border-radius:12px;padding:14px 16px;cursor:pointer;margin-bottom:14px}
.callout{border-radius:8px;padding:10px 13px;margin-bottom:10px;font-size:12px;line-height:1.7}
.verdict{border-radius:12px;padding:16px 18px;margin-bottom:14px}
.lifebar{margin-top:12px}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:440px;width:100%;padding:28px;position:relative;max-height:90vh;overflow-y:auto}
.modal-input{font-family:inherit;font-size:14px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 13px;width:100%;outline:none}
.modal-input:focus{border-color:var(--accent)}
.mini-input{font-family:inherit;font-size:13px;background:var(--subtle);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:7px 10px;outline:none;width:100%}
.mini-input:focus{border-color:var(--accent);background:var(--card)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.field-lbl{font-size:10px;color:var(--muted);font-weight:500;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.debt-box{background:var(--danger-lt);border:1px solid rgba(220,38,38,.15);border-radius:10px;padding:12px;margin-top:8px}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;background:var(--bg);position:relative}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:100px;border:1px solid var(--border);font-size:11px;color:var(--muted);margin-bottom:24px;background:var(--surface)}
.hero-dot{width:6px;height:6px;border-radius:50%;background:var(--ok)}
.hero-title{font-family:Georgia,serif;font-size:clamp(34px,6vw,60px);font-weight:400;line-height:1.1;letter-spacing:-.03em;margin-bottom:18px;color:var(--text)}
.hero-sub{font-size:clamp(14px,1.8vw,17px);color:var(--muted);max-width:500px;line-height:1.7;margin-bottom:32px}
.hero-cta{padding:14px 48px;border-radius:8px;background:var(--accent);border:none;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:40px;font-family:inherit}
.hero-feats{display:flex;gap:28px;justify-content:center;flex-wrap:wrap}
.hero-feat{text-align:center;max-width:100px}
.hero-feat-icon{width:36px;height:36px;border-radius:10px;background:var(--surface);border:1px solid var(--border);display:grid;place-items:center;margin:0 auto 8px;font-size:16px}
.footer{border-top:1px solid var(--border);padding:16px;margin-top:20px;background:var(--surface)}
.footer-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--surface);border-top:1px solid var(--border);grid-template-columns:repeat(2,1fr);padding:6px 0}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:6px 4px;color:var(--muted);font-size:10px;font-weight:500;font-family:inherit}
.bnav-btn.on{color:var(--accent)}
.bnav-icon{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2}
.fade{animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){
  .person-pair{flex-direction:column}
  .hh-snap-row{grid-template-columns:1fr 1fr}
  .scen-grid{grid-template-columns:1fr}
  .desktop-only{display:none!important}
  .bnav{display:grid}
  body{padding-bottom:64px}
  .imode-wrap{flex-direction:column}
}
</style>

<body>
<div id="app"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useMemo,createElement:h}=React;
const FX=46.5;
const CURR={
  USD:{sym:"$",toB:v=>v,frB:v=>v},
  MUR:{sym:"₨",toB:v=>v/FX,frB:v=>v*FX}
};

/* ── dark mode ── */
function useDark(){
  const[dark,setDark]=useState(()=>window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches);
  useEffect(()=>{document.documentElement.setAttribute("data-theme",dark?"dark":"light");},[dark]);
  return[dark,setDark];
}

/* ── currency ── */
function useCur(){
  const[cur,setCur]=useState("USD");
  const C=CURR[cur];
  const disp=(v,sh)=>{
    if(typeof v!=="number"||isNaN(v))return"—";
    const val=C.frB(v),s=C.sym;
    if(val>=1e6)return s+(val/1e6).toFixed(sh?1:2)+"M";
    if(val>=1e3)return s+(val/1e3).toFixed(sh?0:1)+"K";
    return s+Math.round(val).toLocaleString();
  };
  return{cur,setCur,disp,toB:C.toB,frB:C.frB,sym:C.sym};
}

/* ── debt calc ── */
function debtCalc(principal,annualRate,termMonths){
  if(!principal||principal<=0)return{monthlyPmt:0,totalInterest:0};
  if(!annualRate||annualRate<=0){
    const mp=termMonths>0?principal/termMonths:principal;
    return{monthlyPmt:mp,totalInterest:0};
  }
  const mr=annualRate/100/12,n=Math.max(1,termMonths);
  const mp=principal*(mr*Math.pow(1+mr,n))/(Math.pow(1+mr,n)-1);
  return{monthlyPmt:mp,totalInterest:Math.max(0,mp*n-principal)};
}

/* ── helpers ── */
function fmtAmt(v,sym){
  if(!v||v<=0)return"None";
  if(v>=1e6)return sym+(v/1e6).toFixed(2)+"M";
  if(v>=1e3)return sym+(v/1e3).toFixed(0)+"K";
  return sym+Math.round(v).toLocaleString();
}
function hlabel(s){
  if(s<35)return{l:"Poor",c:"var(--danger)"};
  if(s<55)return{l:"Needs work",c:"var(--warn)"};
  if(s<75)return{l:"On track",c:"var(--ok)"};
  return{l:"Strong",c:"var(--ok)"};
}

/* ── projection engine ── */
function proj(inp,rate){
  const{age,gender,income,monthlySpend:ms,savings,savingsRate:sr,retireAge:ra,
    debtBalance:db=0,debtRate:dr=0,debtTerm:dt=0,
    retireMonthlyExpenses:rme=0,lifeGoals:lg=[],incomeMode:im="rule4"}=inp;
  const ai=income*12,le=gender==="male"?75:85,yir=Math.max(1,le-ra);
  const INF=0.025,IG=0.03,SWR=0.04,ytr=Math.max(1,ra-age);
  const r=rate!==undefined?rate:0.05;
  const dbt=debtCalc(db,dr,dt);
  const debtMonths=Math.min(dt||0,ytr*12);
  /* goal withdrawals */
  const gw={};
  const mortDrag={};
  (lg||[]).forEach(g=>{
    const amt=g.amount||0; if(!amt)return;
    if(g.id==="trip"&&(g.recurYears||0)>0){
      for(let a2=g.atAge;a2<ra;a2+=g.recurYears){
        const yr=a2-age; if(yr>0)gw[yr]=(gw[yr]||0)+amt;
      }
    } else if(g.atAge>age){
      const yr=g.atAge-age;
      const effAmt=(g.id==="house"&&(g.mortgagePct||0)>0)
        ?amt*(1-(g.mortgagePct/100)):amt;
      gw[yr]=(gw[yr]||0)+effAmt;
      if(g.id==="house"&&(g.mortgagePct||0)>0&&(g.mortgageRate||0)>0&&(g.mortgageTerm||0)>0){
        const principal=amt*(g.mortgagePct/100);
        const md=debtCalc(principal,g.mortgageRate,g.mortgageTerm*12);
        const startYr=yr;
        for(let t2=startYr;t2<startYr+g.mortgageTerm&&t2<ytr;t2++){
          mortDrag[t2]=(mortDrag[t2]||0)+md.monthlyPmt*12;
        }
      }
    }
  });
  let port=Math.max(0,savings-db);
  const acc=[];
  for(let t=0;t<ytr;t++){
    const curIncome=ai*Math.pow(1+IG,t);
    const debtMos=Math.min(12,Math.max(0,debtMonths-t*12));
    const effSav=Math.max(0,curIncome*(sr/100)-dbt.monthlyPmt*debtMos-(mortDrag[t]||0));
    port=port*(1+r)+effSav;
    if(gw[t])port=Math.max(0,port-gw[t]);
    acc.push({yr:age+t,val:Math.max(0,port),phase:"grow"});
  }
  const rp=Math.max(0,port),isp=ms*12*Math.pow(1+INF,ytr);
  let wd,tp=null,rms=null,rsr=null;
  if(im==="expenses"){wd=isp;tp=isp/SWR;}
  else if(im==="custom"&&rme>0){const d=rme*12*Math.pow(1+INF,ytr);wd=d;tp=d/SWR;}
  else{wd=Math.max(isp*0.7,rp*SWR);}
  if(tp!==null){
    const PV=Math.max(0,savings-db),mr2=r/12,n2=ytr*12,gr=Math.pow(1+mr2,n2),nd=tp-PV*gr;
    rms=nd>0?(nd*mr2)/(gr-1):0;
    rsr=Math.min(80,Math.max(0,(rms/income)*100));
  }
  const maxD=Math.max(40,yir+15);
  let ro=ra+maxD,dp=rp;
  const dds=[];
  for(let y=0;y<=maxD;y++){
    const w=wd*Math.pow(1+INF,y);
    dp=dp*(1+r)-w;
    if(dp<=0){ro=ra+y;break;}
    if(y<maxD)dds.push({yr:ra+y,val:Math.max(0,dp),phase:"draw"});
  }
  const lasts=ro>=le,sur=ro-le,cm=wd>0?rp/wd:0;
  const sc1=Math.min(30,(sr/20)*30),sc2=Math.min(25,Math.max(0,25-(ms/income)*25));
  const sc3=Math.min(20,(savings/(ai*3))*20);
  const rb=tp?Math.min(25,(rp/tp)*25):Math.min(25,(rp/(wd*yir))*25);
  const health=Math.round(sc1+sc2+sc3+(lasts?rb:rb*0.5));
  const sp=Math.min(97,Math.max(5,(lasts?60:25)+(sur>=10?18:sur>=5?10:sur>=0?4:0)+(sr>=20?10:sr>=15?6:sr>=10?3:0)+(cm>=25?9:cm>=18?5:0)));
  return{retP:rp,sp,ro,health,le,yir,r,wd,ytr,lasts,cm,sur,
    data:[...acc,...dds],tp,rms,rsr,inf:Math.pow(1+INF,ytr),
    debtMonthlyPmt:dbt.monthlyPmt};
}

function stressTest(inp){
  const t=proj(inp,0.04),l=proj(inp,0.05),b=proj(inp,0.06);
  return{tough:t,likely:l,best:b,
    tP:t.retP,lP:l.retP,bP:b.retP,
    tM:t.wd/12,lM:l.wd/12,bM:b.wd/12};
}

function hhProj(p1,p2,rate){
  rate=rate||0.05;
  const INF=0.025,SWR=0.04,r=rate;
  const r1=proj({...p1,incomeMode:"rule4",lifeGoals:p1.lifeGoals||[]},r);
  const r2=proj({...p2,incomeMode:"rule4",lifeGoals:[]},r);
  const hra=Math.max(p1.retireAge,p2.retireAge);
  const le1=p1.gender==="male"?75:85,le2=p2.gender==="male"?75:85,hle=Math.max(le1,le2);
  const pot1=r1.retP*Math.pow(1+r,Math.max(0,hra-p1.retireAge));
  const pot2=r2.retP*Math.pow(1+r,Math.max(0,hra-p2.retireAge));
  const cp=pot1+pot2,ci=p1.income+p2.income;
  const ytr=Math.max(1,hra-Math.min(p1.age,p2.age));
  const isp=p1.monthlySpend*12*Math.pow(1+INF,ytr);
  const im=p1.incomeMode||"rule4";
  let wd,tp=null;
  if(im==="expenses"){wd=isp;tp=isp/SWR;}
  else if(im==="custom"&&(p1.retireMonthlyExpenses||0)>0){
    const d=p1.retireMonthlyExpenses*12*Math.pow(1+INF,ytr);wd=d;tp=d/SWR;
  } else{wd=Math.max(isp*0.7,cp*SWR);}
  const yir=Math.max(1,hle-hra),maxD=Math.max(40,yir+15);
  let ro=hra+maxD,dp=cp;const dds=[];
  for(let y=0;y<=maxD;y++){
    const w=wd*Math.pow(1+INF,y);dp=dp*(1+r)-w;
    if(dp<=0){ro=hra+y;break;}
    if(y<maxD)dds.push({yr:hra+y,val:Math.max(0,dp),phase:"draw"});
  }
  const lasts=ro>=hle,sur=ro-hle,cm=wd>0?cp/wd:0;
  const gm={};
  [...r1.data,...r2.data].filter(d=>d.phase==="grow").forEach(d=>{gm[d.yr]=(gm[d.yr]||0)+d.val;});
  const grow=Object.keys(gm).map(Number).sort((a,b)=>a-b).map(yr=>({yr,val:gm[yr],phase:"grow"}));
  const avg=(p1.income*p1.savingsRate+p2.income*p2.savingsRate)/ci;
  const sc1=Math.min(30,(avg/20)*30),sc2=Math.min(25,Math.max(0,25-(p1.monthlySpend/ci)*25));
  const sc3=Math.min(20,((p1.savings+p2.savings)/((ci*12)*3))*20);
  const rb=tp?Math.min(25,(cp/tp)*25):Math.min(25,(cp/(wd*yir))*25);
  const health=Math.round(sc1+sc2+sc3+(lasts?rb:rb*0.5));
  const sp=Math.min(97,Math.max(5,(lasts?60:25)+(sur>=10?18:sur>=5?10:sur>=0?4:0)+(avg>=20?10:avg>=15?6:avg>=10?3:0)+(cm>=25?9:cm>=18?5:0)));
  const inf=Math.pow(1+INF,ytr);
  const p1s=cp>0?pot1/cp:0.5,p2s=cp>0?pot2/cp:0.5,tma=wd/12;
  let pp1=pot1,pp2=pot2;
  const sLE=Math.min(le1,le2),p1df=le1<=le2,hdd=[];
  for(let y=0;y<=maxD;y++){
    const yr=hra+y;
    if(yr<=sLE){
      pp1=pp1*(1+r)-wd*p1s*Math.pow(1+INF,y);
      pp2=pp2*(1+r)-wd*p2s*Math.pow(1+INF,y);
    } else {
      const cb=Math.max(0,pp1)+Math.max(0,pp2);
      const nc=cb*(1+r)-wd*Math.pow(1+INF,y);
      if(p1df){pp1=0;pp2=nc;}else{pp2=0;pp1=nc;}
    }
    hdd.push({yr,p1v:Math.max(0,pp1),p2v:Math.max(0,pp2)});
    if(Math.max(0,pp1)+Math.max(0,pp2)<=0)break;
  }
  return{retP:cp,sp,ro,health,le:hle,yir,wd,ytr,lasts,cm,sur,
    data:[...grow,...dds],hdd,tp,p1P:r1.retP,p2P:r2.retP,le1,le2,hra,
    p1s,p2s,p1mt:tma*p1s/inf,p2mt:tma*p2s/inf,tma,inf,
    debtMonthlyPmt:r1.debtMonthlyPmt};
}

function hhStress(p1,p2){
  const t=hhProj(p1,p2,0.04),l=hhProj(p1,p2,0.05),b=hhProj(p1,p2,0.06);
  return{tough:t,likely:l,best:b,tP:t.retP,lP:l.retP,bP:b.retP,tM:t.wd/12,lM:l.wd/12,bM:b.wd/12};
}

function earlyCalc(inp,n,rate){
  rate=rate||0.05;
  const target=Math.max(inp.age+2,inp.retireAge-n),ytr=Math.max(1,target-inp.age);
  const isp=inp.monthlySpend*12*Math.pow(1.025,ytr);
  const need=Math.max(
    inp.incomeMode==="expenses"||(inp.incomeMode==="custom"&&inp.retireMonthlyExpenses>0)
      ?((inp.incomeMode==="custom"?inp.retireMonthlyExpenses:inp.monthlySpend)*12*Math.pow(1.025,ytr))/0.04
      :isp*0.7*25,isp*20);
  const PV=Math.max(0,inp.savings-(inp.debtBalance||0));
  const mr=rate/12,n2=ytr*12,gr=Math.pow(1+mr,n2);
  const mn=Math.max(0,need-PV*gr)>0?((need-PV*gr)*mr)/(gr-1):0;
  return{targetAge:target,rn:Math.min(80,Math.max(0,(mn/inp.income)*100))};
}

    h("div",{className:"sl-hdr"},

/* ── DEBT SECTION ── */
function DebtSection({db,dr,dt,onDB,onDR,onDT,disp,frB,toB,cur,sym,maxDbDisp,stepDbDisp}){
  const hasDebt=db>0;
  const termYears=dt?Math.round(dt/12):0;

  const fmtV=v=>v===0?"None":fmtAmt(v,sym);

  // Dynamic step: Rs1k below Rs1m, Rs100k above
  const dynamicStep=cur==="MUR"?(dbDisp<1000000?1000:100000):stepDbDisp;
  const dec=()=>{const n=Math.max(0,dbDisp-dynamicStep);onDB(toB(n));};
  const inc=()=>{const n=Math.min(maxDbDisp,dbDisp+dynamicStep);onDB(toB(n));};

/* ── CHART ── */
function Chart({data,ra,le,hdd}){
  if(!data||!data.length)return null;
  const W=600,H=180,P={l:8,r:8,t:14,b:20};
  const cw=W-P.l-P.r,ch=H-P.t-P.b;
  const av=[...data.map(d=>d.val)];
  if(hdd)hdd.forEach(d=>av.push(d.p1v||0,d.p2v||0));
  const maxV=Math.max(...av,1)*1.12;
  const ay=[...data.map(d=>d.yr)];
  if(hdd)hdd.forEach(d=>ay.push(d.yr));
  const minY=Math.min(...ay),maxY=Math.max(...ay),rng=Math.max(1,maxY-minY);
  const sx=yr=>P.l+((yr-minY)/rng)*cw;
  const sy=v=>P.t+ch-(Math.max(0,v)/maxV)*ch;
  const grow=data.filter(d=>d.phase==="grow");
  const draw=hdd||data.filter(d=>d.phase==="draw");
  const tp=pts=>pts.map((d,i)=>(i?"L":"M")+sx(d.yr).toFixed(1)+","+sy(d.val).toFixed(1)).join(" ");
  const tp1=pts=>pts.map((d,i)=>(i?"L":"M")+sx(d.yr).toFixed(1)+","+sy(d.p1v||0).toFixed(1)).join(" ");
  const tp2=pts=>pts.map((d,i)=>(i?"L":"M")+sx(d.yr).toFixed(1)+","+sy(d.p2v||0).toFixed(1)).join(" ");
  const rx=sx(ra),lx=le>=minY&&le<=maxY?sx(le):null;
  return h("svg",{width:"100%",viewBox:"0 0 "+W+" "+H,style:{overflow:"visible",display:"block"}},
    h("defs",null,
      h("linearGradient",{id:"gg",x1:"0",y1:"0",x2:"0",y2:"1"},
        h("stop",{offset:"0%",stopColor:"#3B82F6",stopOpacity:".15"}),
        h("stop",{offset:"100%",stopColor:"#3B82F6",stopOpacity:".01"})),
      h("linearGradient",{id:"gd",x1:"0",y1:"0",x2:"0",y2:"1"},
        h("stop",{offset:"0%",stopColor:"#0D9488",stopOpacity:".15"}),
        h("stop",{offset:"100%",stopColor:"#0D9488",stopOpacity:".01"})),
      h("linearGradient",{id:"gp",x1:"0",y1:"0",x2:"0",y2:"1"},
        h("stop",{offset:"0%",stopColor:"#A78BFA",stopOpacity:".12"}),
        h("stop",{offset:"100%",stopColor:"#A78BFA",stopOpacity:".01"}))
    ),
    grow.length>1&&h("path",{d:tp(grow)+" L"+sx(grow[grow.length-1].yr)+","+(P.t+ch)+" L"+sx(grow[0].yr)+","+(P.t+ch)+" Z",fill:"url(#gg)"}),
    grow.length>1&&h("path",{d:tp(grow),fill:"none",stroke:"#3B82F6",strokeWidth:"2",strokeLinejoin:"round"}),
    hdd?[
      draw.length>1&&h("path",{key:"f1",d:tp1(draw)+" L"+sx(draw[draw.length-1].yr)+","+(P.t+ch)+" L"+sx(draw[0].yr)+","+(P.t+ch)+" Z",fill:"url(#gd)"}),
      draw.length>1&&h("path",{key:"f2",d:tp2(draw)+" L"+sx(draw[draw.length-1].yr)+","+(P.t+ch)+" L"+sx(draw[0].yr)+","+(P.t+ch)+" Z",fill:"url(#gp)"}),
      draw.length>1&&h("path",{key:"l1",d:tp1(draw),fill:"none",stroke:"#0D9488",strokeWidth:"1.8",strokeDasharray:"6,3"}),
      draw.length>1&&h("path",{key:"l2",d:tp2(draw),fill:"none",stroke:"#A78BFA",strokeWidth:"1.8",strokeDasharray:"6,3"})
    ]:[
      draw.length>1&&h("path",{key:"fd",d:tp(draw)+" L"+sx(draw[draw.length-1].yr)+","+(P.t+ch)+" L"+sx(draw[0].yr)+","+(P.t+ch)+" Z",fill:"url(#gd)"}),
      draw.length>1&&h("path",{key:"ld",d:tp(draw),fill:"none",stroke:"#F59E0B",strokeWidth:"2",strokeDasharray:"6,3"})
    ],
    h("line",{x1:rx,y1:P.t,x2:rx,y2:P.t+ch,stroke:"#9CA3AF",strokeWidth:"1",strokeDasharray:"3,3"}),
    h("text",{x:rx+3,y:P.t+9,fill:"#9CA3AF",fontSize:"8",fontFamily:"sans-serif"},"retire "+ra),
    lx&&h("line",{x1:lx,y1:P.t,x2:lx,y2:P.t+ch,stroke:"#EF4444",strokeWidth:"1.5",strokeDasharray:"4,3",opacity:".8"}),
    lx&&h("text",{x:lx+3,y:P.t+9,fill:"#EF4444",fontSize:"8",fontFamily:"sans-serif"},"age "+le),
    [minY,Math.round((minY+maxY)/2),maxY].map(yr=>
      h("text",{key:yr,x:sx(yr),y:H-3,fill:"#9CA3AF",fontSize:"8",fontFamily:"sans-serif",textAnchor:"middle"},yr)
    )
  );
}

/* ── INCOME MODE ── */
function IncomeMode({mode,onChange,ms,ca,onCA,result,disp,toB,frB,cur,sym,isHH}){
  const p4=result?result.wd/12:0;
  const ytr=result?result.ytr:0;

  const ispMo=ms*Math.pow(1.025,ytr);
  const pct=ispMo>0?Math.round(p4/ispMo*100):0;
  const pctColor=pct>=100?"var(--ok)":pct>=70?"var(--warn)":"var(--danger)";
  const minC=cur==="MUR"?5000:100,maxC=cur==="MUR"?2500000:50000,stepC=cur==="MUR"?5000:100;
  const modes=[
    {k:"rule4",icon:"📐",label:"4% Rule",sub:"Let pot decide",ac:"var(--accent)",ab:"var(--accent-lt)"},
    {k:"expenses",icon:"🏠",label:"Same lifestyle",sub:"Match today",ac:"var(--gold)",ab:"var(--gold-lt)"},
    {k:"custom",icon:"🎯",label:"My target",sub:"Set a number",ac:"var(--p2)",ab:"var(--p2-lt)"},

/* ── HEALTH RING ── */
function Ring({score,color}){
  const r=22,circ=2*Math.PI*r,dash=circ*(Math.min(100,Math.max(0,score))/100);
  return h("div",{style:{position:"relative",width:56,height:56,flexShrink:0}},
    h("svg",{width:56,height:56,viewBox:"0 0 56 56",style:{transform:"rotate(-90deg)"}},
      h("circle",{cx:28,cy:28,r,fill:"none",stroke:"var(--border)",strokeWidth:4}),
      h("circle",{cx:28,cy:28,r,fill:"none",stroke:color,strokeWidth:4,
        strokeDasharray:dash+" "+(circ-dash),strokeLinecap:"round"})
    ),
    h("div",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color}},score)
  );
}

/* ── PDF GENERATOR ── */
function generatePDF(info,result,base,partner,hh,disp,sym,frB,cur){
  try{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const W=210,M=18,COL=W-M*2;
    let y=0;

    // ── Header band ──
    doc.setFillColor(26,86,219);doc.rect(0,0,W,32,"F");
    doc.setFillColor(255,255,255);doc.rect(0,28,W,6,"F");
    doc.setFont("helvetica","bold");doc.setFontSize(18);doc.setTextColor(255,255,255);
    doc.text("ARK Financial Planners",M,16);
    doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(180,210,255);
    doc.text("Personalised Retirement Plan",M,23);
    doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(120,140,180);
    doc.text("Generated "+new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}),W-M,23,{align:"right"});
    y=42;

    // ── Helper functions ──
    const section=(title)=>{
      y+=4;
      doc.setFillColor(240,244,255);doc.rect(M,y,COL,8,"F");
      doc.setFont("helvetica","bold");doc.setFontSize(9);doc.setTextColor(26,86,219);
      doc.text(title.toUpperCase(),M+3,y+5.5);
      y+=12;
    };
    const row=(label,value,valColor)=>{
      doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(100,110,130);
      doc.text(label,M,y);
      doc.setFont("helvetica","bold");doc.setFontSize(9);
      if(valColor)doc.setTextColor(...valColor);else doc.setTextColor(17,24,39);
      doc.text(String(value),W-M,y,{align:"right"});
      doc.setDrawColor(230,234,240);doc.setLineWidth(0.2);doc.line(M,y+2,W-M,y+2);
      y+=8;
    };
    const note=(txt,color)=>{
      doc.setFont("helvetica","italic");doc.setFontSize(8);
      doc.setTextColor(...(color||[100,110,130]));
      doc.text(txt,M,y,{maxWidth:COL});y+=6;
    };
    const badge=(label,value,bg,fg)=>{
      doc.setFillColor(...bg);doc.roundedRect(M,y,COL/2-4,14,2,2,"F");
      doc.setFont("helvetica","normal");doc.setFontSize(8);doc.setTextColor(...fg);
      doc.text(label,M+4,y+5);
      doc.setFont("helvetica","bold");doc.setFontSize(11);
      doc.text(String(value),M+4,y+11);
      y+=18;
    };
    const twoCol=(items)=>{
      const half=COL/2-4;
      items.forEach((item,i)=>{
        const x=i%2===0?M:M+half+8;
        if(i%2===0&&i>0)y+=16;
        doc.setFillColor(245,247,252);doc.roundedRect(x,y,half,14,2,2,"F");
        doc.setFont("helvetica","normal");doc.setFontSize(7.5);doc.setTextColor(100,110,130);
        doc.text(item[0],x+4,y+5);
        doc.setFont("helvetica","bold");doc.setFontSize(10);doc.setTextColor(17,24,39);
        doc.text(String(item[1]),x+4,y+11);
      });
      y+=18;
    };

    // ── Client info ──
    section("Client Information");
    row("Name",info.name);
    row("Email",info.email);
    if(info.phone)row("Phone",info.phone);
    row("Planning mode",hh?"Household (two partners)":"Individual");
    y+=2;

    // ── Health snapshot ──
    section("Financial Health Snapshot");
    const hl=hlabel(result.health);
    const hCol=hl.c==="var(--ok)"?[22,163,74]:hl.c==="var(--warn)"?[217,119,6]:[220,38,38];
    row("Health score",result.health+"/100 — "+hl.l,hCol);
    row("Success probability",result.sp+"%",result.sp>=75?[22,163,74]:result.sp>=55?[217,119,6]:[220,38,38]);
    row("Coverage ratio",result.cm.toFixed(1)+"× annual spending");
    row("Funds status",result.lasts?"✓ Lasts to age "+result.le+" ("+result.sur+" yrs surplus)":"⚠ Runs short at age "+result.ro,result.lasts?[22,163,74]:[220,38,38]);
    y+=2;

    // ── Retirement income ──
    section("Projected Retirement Income");
    const inf=result.inf||1;
    row("Monthly income at retirement",disp(result.wd/12));
    row("In today's purchasing power",disp(result.wd/12/inf));
    row("Inflation applied","2.5% per year over "+result.ytr+" years");
    if(hh&&result.p1mt!=null){
      y+=2;
      row("Your share ("+Math.round(result.p1s*100)+"%)",disp(result.wd/12*result.p1s)+" / "+disp(result.p1mt)+" today",[26,86,219]);
      row("Partner's share ("+Math.round(result.p2s*100)+"%)",disp(result.wd/12*result.p2s)+" / "+disp(result.p2mt)+" today",[124,58,237]);
    }
    y+=2;

    // ── Portfolio ──
    section("Retirement Portfolio");
    if(hh&&result.p1P!=null){
      row("Your pot (retires age "+base.retireAge+")",disp(result.p1P),[26,86,219]);
      row("Partner's pot (retires age "+partner.retireAge+")",disp(result.p2P),[124,58,237]);
      row("Combined pot",disp(result.retP),[22,163,74]);
    } else {
      row("Projected retirement pot",disp(result.retP));
    }
    y+=2;

    // ── Input summary ──
    section("Your Inputs");
    if(hh){
      row("Your monthly income",disp(base.income));
      row("Your savings to date",disp(base.savings));
      row("Your savings rate",base.savingsRate+"%");
      row("Your retirement age","Age "+base.retireAge);
      row("Partner monthly income",disp(partner.income));
      row("Partner savings",disp(partner.savings));
      row("Partner savings rate",partner.savingsRate+"%");
      row("Partner retirement age","Age "+partner.retireAge);
      row("Monthly household expenses",disp(base.monthlySpend));
    } else {
      row("Monthly income",disp(base.income));
      row("Monthly spending",disp(base.monthlySpend));
      row("Savings to date",disp(base.savings));
      row("Savings rate",base.savingsRate+"% of gross income");
      row("Target retirement age","Age "+base.retireAge);
      if(base.debtBalance>0)row("Outstanding debt",disp(base.debtBalance)+" @ "+base.debtRate+"% / "+Math.round((base.debtTerm||0)/12)+" yrs");
    }
    if((base.lifeGoals||[]).length>0){
      y+=2;
      section("Life Goals");
      (base.lifeGoals||[]).forEach(g=>{
        const label=g.icon+" "+g.label+(g.id==="trip"&&g.recurYears>0?" (every "+g.recurYears+" yrs)":"");
        row(label,disp(g.amount)+" at age "+g.atAge);
      });
    }

    // ── Stress test ──
    y+=2;
    section("Return Scenario Summary");
    row("Worst case (4% return) — pot",disp(result.retP*0.85,true));
    row("Base case (5% return) — pot",disp(result.retP),null);
    row("Best case (6% return) — pot",disp(result.retP*1.18,true));
    y+=2;

    // ── Footer ──
    if(y>260){doc.addPage();y=20;}
    doc.setFillColor(26,86,219);doc.rect(0,282,W,15,"F");
    doc.setFont("helvetica","normal");doc.setFontSize(7.5);doc.setTextColor(180,210,255);
    doc.text("ARK Financial Planners · arkfinancialplanners.com · 1 USD = 46.5 MUR",W/2,289,{align:"center"});
    doc.setTextColor(140,170,220);
    doc.text("For educational purposes only. Not financial advice. Consult a qualified financial consultant before making decisions.",W/2,294,{align:"center",maxWidth:COL});

    doc.save("ARK-Retirement-Plan-"+info.name.replace(/\s+/g,"-")+".pdf");
    return true;
  }catch(e){console.error(e);return false;}
}

/* ── MODAL ── */
function Modal({result,onClose,disp,base,partner,hh,frB,sym,cur}){
  const[name,setName]=useState("");
  const[email,setEmail]=useState("");
  const[phone,setPhone]=useState("");
  const[saveCRM,setSaveCRM]=useState(false);
  const[done,setDone]=useState(false);
  const[loading,setLoading]=useState(false);
  const[pdfError,setPdfError]=useState(false);
  const ok=result.lasts,hl=hlabel(result.health);
  const valid=name.trim()&&email.trim();

  const submit=async function(){
    if(!valid)return;
    setLoading(true);
    const info={name,email,phone};
    // Generate PDF
    const pdfOk=generatePDF(info,result,base,partner,hh,disp,sym,frB,cur);
    if(!pdfOk)setPdfError(true);
    // Save to CRM if opted in
    if(saveCRM){
      try{
        await window.storage.set("lead:"+Date.now(),JSON.stringify({
          name,email,phone,
          health:result.health,successProb:result.sp,
          pot:disp(result.retP),monthlyIncome:disp(result.wd/12),
          verdict:result.lasts?"On track":"Needs action",
          retireAge:base.retireAge,age:base.age,
          savingsRate:base.savingsRate,cur,hhMode:hh,
          ts:new Date().toISOString()
        }));
      }catch(e){console.error("CRM save failed",e);}
    }
    setLoading(false);
    setDone(true);
  };

  if(done)return h("div",{className:"modal-ov",onClick:onClose},
    h("div",{className:"modal-box",onClick:e=>e.stopPropagation(),style:{textAlign:"center"}},
      h("div",{style:{fontSize:40,marginBottom:14}},pdfError?"⚠️":"✅"),

      h("p",{style:{fontSize:13,color:"var(--muted)",lineHeight:1.7,marginBottom:pdfError?16:8}},

      !pdfError&&saveCRM&&h("p",{style:{fontSize:12,color:"var(--ok)",marginBottom:16}},"✓ Your details have been saved. A consultant may reach out."),
      !pdfError&&!saveCRM&&h("p",{style:{fontSize:12,color:"var(--muted)",marginBottom:16}},"No details stored — your privacy is protected."),
      h("button",{className:"cta",onClick:onClose},"Close")
    )
  );

  return h("div",{className:"modal-ov",onClick:onClose},
    h("div",{className:"modal-box",onClick:e=>e.stopPropagation()},
      h("button",{onClick:onClose,style:{position:"absolute",top:14,right:16,background:"none",border:"none",color:"var(--muted)",fontSize:20,cursor:"pointer"}},"×"),
      h("div",{style:{fontSize:18,fontWeight:600,marginBottom:4,color:"var(--text)"}},"Download your plan"),
      h("p",{style:{fontSize:13,color:"var(--muted)",marginBottom:16,lineHeight:1.6}},"Fill in your details to generate a personalised PDF retirement plan."),
      // Health badge
      h("div",{style:{background:ok?"var(--ok-lt)":"var(--danger-lt)",border:"1px solid "+(ok?"rgba(34,197,94,.2)":"rgba(239,68,68,.2)"),borderRadius:10,padding:"10px 14px",marginBottom:18,fontSize:12,color:"var(--muted)",lineHeight:1.6}},
        h("b",{style:{color:ok?"var(--ok)":"var(--danger)"}},ok?"✓ On track":"⚠ Action needed"),
        " · Health: ",h("b",{style:{color:hl.c}},result.health+"/100 · "+hl.l),
        " · Monthly income: ",h("b",{style:{color:"var(--text)"}},disp(result.wd/12)+"/mo")
      ),
      // Fields
      h("div",{style:{display:"flex",flexDirection:"column",gap:10,marginBottom:16}},

        ),

          h("div",{style:{fontSize:11,color:"var(--muted)",marginBottom:4,fontWeight:500}},"Phone (optional)"),
          h("input",{type:"tel",value:phone,onChange:e=>setPhone(e.target.value),placeholder:"+230 5XXX XXXX",className:"modal-input"})
        )

      // CRM opt-in checkbox
      h("label",{style:{display:"flex",alignItems:"flex-start",gap:10,padding:"12px 14px",background:"var(--accent-lt)",border:"1px solid rgba(59,130,246,.2)",borderRadius:10,marginBottom:18,cursor:"pointer"}},
