<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ARK Financial Planners</title>
<style>
/* ── Facebook brand palette ── */
:root{
  --bg:#F0F2F5;
  --surface:#FFFFFF;
  --card:#FFFFFF;
  --border:#CED0D4;
  --text:#1C1E21;
  --muted:#65676B;
  --hint:#8A8D91;
  --subtle:#E4E6EB;
  /* Primary blue */
  --accent:#1877F2;
  --accent-dim:#1558B0;
  --accent-lt:#E7F3FF;
  /* Secondary blue for spending/goals */
  --teal:#0081FB;
  --teal-lt:#E7F0FF;
  /* Status colours — reserved for warnings/status only */
  --ok:#2D8A4E;
  --ok-lt:#E8F5ED;
  --warn:#D97706;
  --warn-lt:#FEF3C7;
  --danger:#C0392B;
  --danger-lt:#FDECEA;
  /* Partner purple */
  --p2:#7C3AED;
  --p2-lt:#F5F3FF;
  /* Gold — for goals */
  --gold:#B45309;
  --gold-lt:#FFFBEB;
}
[data-theme=dark]{
  --bg:#18191A;
  --surface:#242526;
  --card:#3A3B3C;
  --border:#3E4042;
  --text:#E4E6EB;
  --muted:#B0B3B8;
  --hint:#6B6F76;
  --subtle:#3A3B3C;
  --accent:#2D88FF;
  --accent-dim:#1877F2;
  --accent-lt:#263951;
  --teal:#66BFFF;
  --teal-lt:#1C2E40;
  --ok:#3DA35D;
  --ok-lt:#1A3326;
  --warn:#F59E0B;
  --warn-lt:#2D2200;
  --danger:#EF4444;
  --danger-lt:#2D0F0F;
  --p2:#A78BFA;
  --p2-lt:#1E1530;
  --gold:#F59E0B;
  --gold-lt:#1F1A0D;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;color:var(--text);font-size:14px;line-height:1.5;overflow-x:hidden}
button{cursor:pointer;font-family:inherit;touch-action:manipulation}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.wrap{max-width:660px;margin:0 auto;padding:0 16px}

/* Header */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.hdr-inner{height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo-btn{display:flex;align-items:center;gap:10px;background:none;border:none;padding:0;color:var(--text);cursor:pointer}
.logo-mark{width:32px;height:32px;border-radius:50%;background:var(--accent);display:grid;place-items:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* Toggle */
.tog{display:flex;background:var(--subtle);border-radius:20px;padding:2px;border:1px solid var(--border)}
.tog-btn{padding:5px 14px;border-radius:20px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:600;font-family:inherit;transition:all .15s}
.tog-btn.on{background:var(--surface);color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.15)}

/* Dark mode btn */
.dm-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--subtle);display:grid;place-items:center;font-size:15px;cursor:pointer}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.08)}

/* Section label */
.sec-lbl{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:10px;letter-spacing:.02em}

/* Slider */
.sl-wrap{margin-bottom:18px}
.sl-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.sl-label{font-size:13px;font-weight:500;color:var(--muted)}
.sl-hint{font-size:11px;color:var(--hint);font-style:italic;font-weight:400;margin-left:5px}
.sl-val{font-size:17px;font-weight:700;letter-spacing:-.3px}
.sl-sub{font-size:11px;margin-bottom:4px;min-height:16px}
.sl-row{display:flex;align-items:center;gap:8px}
.sl-pm{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--subtle);color:var(--text);font-size:18px;display:grid;place-items:center;cursor:pointer;flex-shrink:0;user-select:none;-webkit-user-select:none;transition:background .12s}
.sl-pm:active{background:var(--border)}
.sl-track-wrap{position:relative;height:36px;display:flex;align-items:center;flex:1}
.sl-track{position:absolute;left:0;right:0;height:5px;background:var(--subtle);border-radius:3px}
.sl-fill{position:absolute;left:0;top:0;height:100%;border-radius:3px}
.sl-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.3);pointer-events:none;z-index:1}
input[type=range].sl-input{position:absolute;left:0;width:100%;height:100%;opacity:0;cursor:pointer;margin:0;z-index:2;-webkit-appearance:none}

/* Gender chips */
.g-chips{display:flex;gap:8px;margin-bottom:16px}
.g-chip{flex:1;padding:8px 6px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;text-align:center;font-family:inherit;transition:all .15s}

/* Mode toggle */
.mode-tog{display:flex;background:var(--subtle);border-radius:12px;padding:3px;border:1px solid var(--border);margin-bottom:14px}
.mode-btn{flex:1;padding:8px 0;border-radius:10px;border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .18s}
.mode-btn.on{background:var(--surface);color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.12)}

/* Person cards */
.person-pair{display:flex;gap:12px;margin-bottom:12px}
.person-card{background:var(--card);border-radius:12px;padding:16px;flex:1;min-width:0;border:1px solid var(--border);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.person-card.p1{border-top:3px solid var(--accent)}
.person-card.p2{border-top:3px solid var(--p2)}
.person-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.avatar{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font-size:13px;font-weight:700;flex-shrink:0}

/* Goals */
.goals-tog{width:100%;border:1.5px dashed var(--border);border-radius:12px;padding:11px 14px;background:transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:500;display:flex;justify-content:space-between;cursor:pointer;text-align:left;transition:all .15s}
.goals-tog:hover{border-color:var(--accent);color:var(--accent)}
.goals-tog.has{border-color:var(--accent);color:var(--accent);background:var(--accent-lt)}
.goal-pill{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;text-align:left;width:100%;font-family:inherit;transition:all .15s}
.goal-pill:hover{border-color:var(--teal);color:var(--teal)}
.goal-pill.on{border-color:var(--teal);background:var(--teal-lt);color:var(--teal)}

/* Income mode */
.imode-wrap{display:flex;gap:6px;margin-bottom:12px}
.imode-btn{flex:1;padding:10px 6px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;text-align:center;line-height:1.4;transition:all .15s}

/* Scenario */
.scen-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.scen-btn{padding:12px 8px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;text-align:center;font-family:inherit;transition:all .15s}
.scen-btn:hover{border-color:var(--accent)}

/* Stat grid */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-box{background:var(--subtle);border-radius:10px;padding:14px}
.stat-lbl{font-size:12px;font-weight:500;color:var(--muted);margin-bottom:3px}
.stat-val{font-size:22px;font-weight:700;letter-spacing:-.4px;line-height:1.1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px}

/* HH snap */
.hh-snap{background:var(--subtle);border-radius:12px;padding:12px 14px;margin-bottom:12px}
.hh-snap-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.hh-snap-item{background:var(--card);border-radius:8px;padding:8px 10px;text-align:center;border:1px solid var(--border)}

/* CTA */
.cta{width:100%;padding:14px;border-radius:24px;background:var(--accent);border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .18s;letter-spacing:.01em}
.cta:hover{background:var(--accent-dim)}

/* Teaser */
.teaser{background:var(--accent-lt);border:1.5px solid rgba(24,119,242,.25);border-radius:12px;padding:14px 16px;cursor:pointer;margin-bottom:14px;transition:all .15s}
.teaser:hover{border-color:var(--accent)}

/* Callout */
.callout{border-radius:10px;padding:11px 14px;margin-bottom:10px;font-size:13px;line-height:1.6}

/* Verdict */
.verdict{border-radius:12px;padding:16px 18px;margin-bottom:14px}

/* Life bar */
.lifebar{margin-top:12px}

/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:440px;width:100%;padding:28px;position:relative;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.modal-input{font-family:inherit;font-size:14px;background:var(--subtle);border:1.5px solid var(--border);border-radius:8px;color:var(--text);padding:10px 13px;width:100%;outline:none;transition:border-color .15s}
.modal-input:focus{border-color:var(--accent);background:var(--card)}

/* Mini input */
.mini-input{font-family:inherit;font-size:13px;background:var(--subtle);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:7px 10px;outline:none;width:100%;transition:border-color .15s}
.mini-input:focus{border-color:var(--accent);background:var(--card)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.field-lbl{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:3px;letter-spacing:.02em}
.debt-box{background:var(--subtle);border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:8px}

/* Hero */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;background:var(--bg);position:relative}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 16px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:500;color:var(--muted);margin-bottom:24px;background:var(--surface)}
.hero-dot{width:7px;height:7px;border-radius:50%;background:var(--ok)}
.hero-title{font-family:Georgia,'Times New Roman',serif;font-size:clamp(34px,6vw,60px);font-weight:400;line-height:1.1;letter-spacing:-.03em;margin-bottom:18px;color:var(--text)}
.hero-sub{font-size:clamp(15px,1.8vw,18px);color:var(--muted);max-width:500px;line-height:1.8;margin-bottom:32px}
.hero-cta{padding:15px 52px;border-radius:24px;background:var(--accent);border:none;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:40px;font-family:inherit;transition:all .2s;letter-spacing:.01em}
.hero-cta:hover{background:var(--accent-dim);transform:translateY(-1px)}
.hero-feats{display:flex;gap:28px;justify-content:center;flex-wrap:wrap}
.hero-feat{text-align:center;max-width:110px}
.hero-feat-icon{width:40px;height:40px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:grid;place-items:center;margin:0 auto 8px;font-size:18px;box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* Footer */
.footer{border-top:1px solid var(--border);padding:16px;margin-top:20px;background:var(--surface)}
.footer-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}

/* Bottom nav */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--surface);border-top:1px solid var(--border);grid-template-columns:repeat(2,1fr);padding:6px 0}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:7px 4px;color:var(--muted);font-size:10px;font-weight:600;font-family:inherit}
.bnav-btn.on{color:var(--accent)}
.bnav-icon{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2}

.fade{animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:600px){
  .person-pair{flex-direction:column}
  .hh-snap-row{grid-template-columns:1fr 1fr}
  .scen-grid{grid-template-columns:1fr}
  .desktop-only{display:none!important}
  .bnav{display:grid}
  body{padding-bottom:64px}
  .imode-wrap{flex-direction:column}
}
</style>
</head>

<script>
const {useState,useEffect,useMemo,createElement:h}=React;
const FX=46.5;
const CURR={USD:{sym:"$",toB:v=>v,frB:v=>v},MUR:{sym:"₨",toB:v=>v/FX,frB:v=>v*FX}};

function useDark(){
  const[dark,setDark]=useState(()=>window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches);
  useEffect(()=>{document.documentElement.setAttribute("data-theme",dark?"dark":"light");},[dark]);
  return[dark,setDark];
}
function useCur(){
  const[cur,setCur]=useState("MUR");
  const C=CURR[cur];
  const disp=(v,sh)=>{
    if(typeof v!=="number"||isNaN(v))return"—";
    const val=C.frB(v),s=C.sym;
    if(val>=1e6)return s+(val/1e6).toFixed(sh?1:2)+"M";
    if(val>=1e3)return s+(val/1e3).toFixed(sh?0:1)+"K";
    return s+Math.round(val).toLocaleString();
  };
  return{cur,setCur,disp,toB:C.toB,frB:C.frB,sym:C.sym};
}
function debtCalc(principal,annualRate,termMonths){
  if(!principal||principal<=0)return{monthlyPmt:0,totalInterest:0};
  if(!annualRate||annualRate<=0){const mp=termMonths>0?principal/termMonths:principal;return{monthlyPmt:mp,totalInterest:0};}
  const mr=annualRate/100/12,n=Math.max(1,termMonths);
  const mp=principal*(mr*Math.pow(1+mr,n))/(Math.pow(1+mr,n)-1);
  return{monthlyPmt:mp,totalInterest:Math.max(0,mp*n-principal)};
}
function fmtAmt(v,sym){
  if(!v||v<=0)return"None";
  if(v>=1e6)return sym+(v/1e6).toFixed(2)+"M";
  if(v>=1e3)return sym+(v/1e3).toFixed(0)+"K";
  return sym+Math.round(v).toLocaleString();
}
function hlabel(s){
  if(s<35)return{l:"Poor",c:"var(--danger)"};
  if(s<55)return{l:"Needs work",c:"var(--warn)"};
  if(s<75)return{l:"On track",c:"var(--ok)"};
  return{l:"Strong",c:"var(--ok)"};
}

/* ── ENGINE ── */
function proj(inp,rate){
  const{age,gender,income,monthlySpend:ms,savings,savingsRate:sr,retireAge:ra,
    debtBalance:db=0,debtRate:dr=0,debtTerm:dt=0,
    retireMonthlyExpenses:rme=0,lifeGoals:lg=[],incomeMode:im="rule4"}=inp;
  const ai=income*12,le=gender==="male"?75:85,yir=Math.max(1,le-ra);
  const INF=0.025,IG=0.03,SWR=0.04,ytr=Math.max(1,ra-age),r=rate!==undefined?rate:0.05;
  const dbt=debtCalc(db,dr,dt);
  const debtMonths=Math.min(dt||0,ytr*12);
  const gw={},mortDrag={};
  (lg||[]).forEach(g=>{
    const amt=g.amount||0;if(!amt)return;
    if(g.id==="trip"&&(g.recurYears||0)>0){
      for(let a2=g.atAge;a2<ra;a2+=g.recurYears){const yr=a2-age;if(yr>0)gw[yr]=(gw[yr]||0)+amt;}
    }else if(g.atAge>age){
      const yr=g.atAge-age;
      const effAmt=(g.id==="house"&&(g.mortgagePct||0)>0)?amt*(1-g.mortgagePct/100):amt;
      gw[yr]=(gw[yr]||0)+effAmt;
      if(g.id==="house"&&(g.mortgagePct||0)>0&&(g.mortgageRate||0)>0&&(g.mortgageTerm||0)>0){
        const md=debtCalc(amt*(g.mortgagePct/100),g.mortgageRate,g.mortgageTerm*12);
        for(let t2=yr;t2<yr+g.mortgageTerm&&t2<ytr;t2++)mortDrag[t2]=(mortDrag[t2]||0)+md.monthlyPmt*12;
      }
    }
  });
  let port=Math.max(0,savings-db);
  const acc=[];
  for(let t=0;t<ytr;t++){
    const curIncome=ai*Math.pow(1+IG,t);
    const debtMos=Math.min(12,Math.max(0,debtMonths-t*12));
    port=port*(1+r)+Math.max(0,curIncome*(sr/100)-dbt.monthlyPmt*debtMos-(mortDrag[t]||0));
    if(gw[t])port=Math.max(0,port-gw[t]);
    acc.push({yr:age+t,val:Math.max(0,port),phase:"grow"});
  }
  const rp=Math.max(0,port),isp=ms*12*Math.pow(1+INF,ytr);
  let wd,tp=null,rms=null,rsr=null;
  if(im==="expenses"){wd=isp;tp=isp/SWR;}
  else if(im==="custom"&&rme>0){const d=rme*12*Math.pow(1+INF,ytr);wd=d;tp=d/SWR;}
  else{wd=Math.max(isp*0.7,rp*SWR);}
  if(tp!==null){
    const PV=Math.max(0,savings-db),mr2=r/12,n2=ytr*12,gr=Math.pow(1+mr2,n2),nd=tp-PV*gr;
    rms=nd>0?(nd*mr2)/(gr-1):0;rsr=Math.min(80,Math.max(0,(rms/income)*100));
  }
  const maxD=Math.max(40,yir+15);
  let ro=ra+maxD,dp=rp;const dds=[];
  for(let y=0;y<=maxD;y++){
    const w=wd*Math.pow(1+INF,y);dp=dp*(1+r)-w;
    if(dp<=0){ro=ra+y;break;}
    if(y<maxD)dds.push({yr:ra+y,val:Math.max(0,dp),phase:"draw"});
  }
  const lasts=ro>=le,sur=ro-le,cm=wd>0?rp/wd:0;
  const sc1=Math.min(30,(sr/20)*30),sc2=Math.min(25,Math.max(0,25-(ms/income)*25));
  const sc3=Math.min(20,(savings/(ai*3))*20);
  const rb=tp?Math.min(25,(rp/tp)*25):Math.min(25,(rp/(wd*yir))*25);
  const health=Math.round(sc1+sc2+sc3+(lasts?rb:rb*0.5));
  const sp=Math.min(97,Math.max(5,(lasts?60:25)+(sur>=10?18:sur>=5?10:sur>=0?4:0)+(sr>=20?10:sr>=15?6:sr>=10?3:0)+(cm>=25?9:cm>=18?5:0)));
  return{retP:rp,sp,ro,health,le,yir,r,wd,ytr,lasts,cm,sur,data:[...acc,...dds],tp,rms,rsr,inf:Math.pow(1+INF,ytr),debtMonthlyPmt:dbt.monthlyPmt};
}
function stressTest(inp){
  const t=proj(inp,0.04),l=proj(inp,0.05),b=proj(inp,0.06);
  return{tP:t.retP,lP:l.retP,bP:b.retP,tM:t.wd/12,lM:l.wd/12,bM:b.wd/12};
}
function hhProj(p1,p2,rate){
  rate=rate||0.05;
  const INF=0.025,SWR=0.04,r=rate;
  const r1=proj({...p1,incomeMode:"rule4",lifeGoals:p1.lifeGoals||[]},r);
  const r2=proj({...p2,incomeMode:"rule4",lifeGoals:[]},r);
  const hra=Math.max(p1.retireAge,p2.retireAge);
  const le1=p1.gender==="male"?75:85,le2=p2.gender==="male"?75:85,hle=Math.max(le1,le2);
  const pot1=r1.retP*Math.pow(1+r,Math.max(0,hra-p1.retireAge));
  const pot2=r2.retP*Math.pow(1+r,Math.max(0,hra-p2.retireAge));
  const cp=pot1+pot2,ci=p1.income+p2.income;
  const ytr=Math.max(1,hra-Math.min(p1.age,p2.age));
  const isp=p1.monthlySpend*12*Math.pow(1+INF,ytr);
  const im=p1.incomeMode||"rule4";
  let wd,tp=null;
  if(im==="expenses"){wd=isp;tp=isp/SWR;}
  else if(im==="custom"&&(p1.retireMonthlyExpenses||0)>0){const d=p1.retireMonthlyExpenses*12*Math.pow(1+INF,ytr);wd=d;tp=d/SWR;}
  else{wd=Math.max(isp*0.7,cp*SWR);}
  const yir=Math.max(1,hle-hra),maxD=Math.max(40,yir+15);
  let ro=hra+maxD,dp=cp;const dds=[];
  for(let y=0;y<=maxD;y++){
    const w=wd*Math.pow(1+INF,y);dp=dp*(1+r)-w;
    if(dp<=0){ro=hra+y;break;}
    if(y<maxD)dds.push({yr:hra+y,val:Math.max(0,dp),phase:"draw"});
  }
  const lasts=ro>=hle,sur=ro-hle,cm=wd>0?cp/wd:0;
  const gm={};
  [...r1.data,...r2.data].filter(d=>d.phase==="grow").forEach(d=>{gm[d.yr]=(gm[d.yr]||0)+d.val;});
  const grow=Object.keys(gm).map(Number).sort((a,b)=>a-b).map(yr=>({yr,val:gm[yr],phase:"grow"}));
  const avg=(p1.income*p1.savingsRate+p2.income*p2.savingsRate)/ci;
  const sc1=Math.min(30,(avg/20)*30),sc2=Math.min(25,Math.max(0,25-(p1.monthlySpend/ci)*25));
  const sc3=Math.min(20,((p1.savings+p2.savings)/((ci*12)*3))*20);
  const rb=tp?Math.min(25,(cp/tp)*25):Math.min(25,(cp/(wd*yir))*25);
  const health=Math.round(sc1+sc2+sc3+(lasts?rb:rb*0.5));
  const sp=Math.min(97,Math.max(5,(lasts?60:25)+(sur>=10?18:sur>=5?10:sur>=0?4:0)+(avg>=20?10:avg>=15?6:avg>=10?3:0)+(cm>=25?9:cm>=18?5:0)));
  const inf=Math.pow(1+INF,ytr);
  const p1s=cp>0?pot1/cp:0.5,p2s=cp>0?pot2/cp:0.5,tma=wd/12;
  let pp1=pot1,pp2=pot2;const sLE=Math.min(le1,le2),p1df=le1<=le2,hdd=[];
  for(let y=0;y<=maxD;y++){
    const yr=hra+y;
    if(yr<=sLE){pp1=pp1*(1+r)-wd*p1s*Math.pow(1+INF,y);pp2=pp2*(1+r)-wd*p2s*Math.pow(1+INF,y);}
    else{const cb=Math.max(0,pp1)+Math.max(0,pp2),nc=cb*(1+r)-wd*Math.pow(1+INF,y);if(p1df){pp1=0;pp2=nc;}else{pp2=0;pp1=nc;}}
    hdd.push({yr,p1v:Math.max(0,pp1),p2v:Math.max(0,pp2)});
    if(Math.max(0,pp1)+Math.max(0,pp2)<=0)break;
  }
  return{retP:cp,sp,ro,health,le:hle,yir,wd,ytr,lasts,cm,sur,data:[...grow,...dds],hdd,tp,p1P:r1.retP,p2P:r2.retP,le1,le2,hra,p1s,p2s,p1mt:tma*p1s/inf,p2mt:tma*p2s/inf,tma,inf,debtMonthlyPmt:r1.debtMonthlyPmt};
}
function hhStress(p1,p2){
  const t=hhProj(p1,p2,0.04),l=hhProj(p1,p2,0.05),b=hhProj(p1,p2,0.06);
  return{tP:t.retP,lP:l.retP,bP:b.retP,tM:t.wd/12,lM:l.wd/12,bM:b.wd/12};
}

function generateReport(info,result,base,partner,hh,disp,sym,frB,cur,prebuiltHtml){

/* ── SLIDER ── */
function Slider({label,value,min,max,step,fmt,onChange,color,sub,hint}){
  color=color||"var(--accent)";step=step||1;
  const[loc,setLoc]=useState(value);
  useEffect(()=>setLoc(value),[value]);
  const clamp=v=>Math.min(max,Math.max(min,Math.round(+v/step)*step));
  const span=max-min||1;
  const p=Math.min(100,Math.max(0,((loc-min)/span)*100));
  const set=v=>{const n=clamp(v);setLoc(n);onChange(n);};
  return h("div",{className:"sl-wrap"},
    h("div",{className:"sl-hdr"},
      h("span",{className:"sl-label"},label,hint&&h("span",{className:"sl-hint"},hint)),
      h("span",{className:"sl-val",style:{color}},fmt(loc))
    ),
    sub&&h("div",{className:"sl-sub"},sub),
    h("div",{className:"sl-row"},
      h("button",{className:"sl-pm",onClick:()=>set(loc-step),tabIndex:-1},"−"),
      h("div",{className:"sl-track-wrap"},
        h("div",{className:"sl-track"},h("div",{className:"sl-fill",style:{width:p+"%",background:color}})),
        h("div",{className:"sl-thumb",style:{left:p+"%",background:color}}),
        h("input",{type:"range",className:"sl-input",min,max,step,value:loc,onChange:e=>set(e.target.value)})
      ),
      h("button",{className:"sl-pm",onClick:()=>set(loc+step),tabIndex:-1},"+")
    )
  );
}

/* ── STEPPED SCALE HELPER ──
   Builds an array of values with variable increments.
   MUR savings / debt: 0, then 10K steps to 1M, then 100K steps to 25M.
   USD savings / debt: 0, then 1K steps to 100K, then 10K steps to 2M.
   Returns { steps[], valToIdx(v), idxToVal(i) }
*/
function buildSteps(cur,includeZero){
  const steps=[];
  if(cur==="MUR"){
    if(includeZero)steps.push(0);
    /* 10,000 increments: 100,000 → 1,000,000 (91 values) */
    for(let v=100000;v<=1000000;v+=10000)steps.push(v);
    /* 100,000 increments: 1,100,000 → 25,000,000 */
    for(let v=1100000;v<=25000000;v+=100000)steps.push(v);
  }else{
    /* USD */
    if(includeZero)steps.push(0);
    /* 1,000 increments: 10,000 → 100,000 */
    for(let v=10000;v<=100000;v+=1000)steps.push(v);
    /* 10,000 increments: 110,000 → 2,000,000 */
    for(let v=110000;v<=2000000;v+=10000)steps.push(v);
  }
  const valToIdx=v=>{
    if(!v||v<=0)return 0;
    /* find closest index */
    let best=0,bestDiff=Infinity;
    for(let i=0;i<steps.length;i++){const d=Math.abs(steps[i]-v);if(d<bestDiff){bestDiff=d;best=i;}}
    return best;
  };
  const idxToVal=i=>steps[Math.max(0,Math.min(steps.length-1,i))];
  return{steps,valToIdx,idxToVal,max:steps.length-1};
}

/* ── STEPPED SLIDER ── renders a slider over a non-linear step array */
function SteppedSlider({label,hint,valueBase,cur,toB,frB,sym,color,onChange,includeZero,fmtVal}){
  const sc=buildSteps(cur,includeZero);
  const dispVal=frB(valueBase);
  const[idx,setIdx]=useState(()=>sc.valToIdx(dispVal));
  /* keep in sync when external value changes (e.g. currency switch) */
  useEffect(()=>{setIdx(sc.valToIdx(frB(valueBase)));},[valueBase,cur]);
  const col=color||"var(--accent)";
  const p=sc.max>0?Math.min(100,(idx/sc.max)*100):0;
  const curDisp=sc.idxToVal(idx);
  const setByIdx=i=>{
    const n=Math.max(0,Math.min(sc.max,i));
    setIdx(n);
    onChange(toB(sc.idxToVal(n)));
  };
  return h("div",{className:"sl-wrap"},
    h("div",{className:"sl-hdr"},
      h("span",{className:"sl-label"},label,hint&&h("span",{className:"sl-hint"},hint)),
      h("span",{className:"sl-val",style:{color:col}},fmtVal?fmtVal(curDisp):(curDisp===0?"None":fmtAmt(curDisp,sym)))
    ),
    h("div",{className:"sl-row"},
      h("button",{className:"sl-pm",onClick:()=>setByIdx(idx-1),tabIndex:-1},"−"),
      h("div",{className:"sl-track-wrap"},
        h("div",{className:"sl-track"},h("div",{className:"sl-fill",style:{width:p+"%",background:col}})),
        h("div",{className:"sl-thumb",style:{left:p+"%",background:col}}),
        h("input",{type:"range",className:"sl-input",min:0,max:sc.max,step:1,value:idx,
          onChange:e=>setByIdx(+e.target.value)})
      ),
      h("button",{className:"sl-pm",onClick:()=>setByIdx(idx+1),tabIndex:-1},"+")
    )
  );
}

/* ── CHART ── */
function Chart({data,ra,le,hdd}){
  if(!data||!data.length)return null;
  const W=600,H=180,P={l:8,r:8,t:14,b:20},cw=W-P.l-P.r,ch=H-P.t-P.b;
  const av=[...data.map(d=>d.val)];
  if(hdd)hdd.forEach(d=>av.push(d.p1v||0,d.p2v||0));
  const maxV=Math.max(...av,1)*1.12;
  const ay=[...data.map(d=>d.yr)];
  if(hdd)hdd.forEach(d=>ay.push(d.yr));
  const minY=Math.min(...ay),maxY=Math.max(...ay),rng=Math.max(1,maxY-minY);
  const sx=yr=>P.l+((yr-minY)/rng)*cw,sy=v=>P.t+ch-(Math.max(0,v)/maxV)*ch;
  const grow=data.filter(d=>d.phase==="grow"),draw=hdd||data.filter(d=>d.phase==="draw");
  const tp=pts=>pts.map((d,i)=>(i?"L":"M")+sx(d.yr).toFixed(1)+","+sy(d.val).toFixed(1)).join(" ");
  const tp1=pts=>pts.map((d,i)=>(i?"L":"M")+sx(d.yr).toFixed(1)+","+sy(d.p1v||0).toFixed(1)).join(" ");
  const tp2=pts=>pts.map((d,i)=>(i?"L":"M")+sx(d.yr).toFixed(1)+","+sy(d.p2v||0).toFixed(1)).join(" ");
  const rx=sx(ra),lx=le>=minY&&le<=maxY?sx(le):null;
  return h("svg",{width:"100%",viewBox:"0 0 "+W+" "+H,style:{overflow:"visible",display:"block"}},
    h("defs",null,
      h("linearGradient",{id:"gg",x1:"0",y1:"0",x2:"0",y2:"1"},h("stop",{offset:"0%",stopColor:"#1877F2",stopOpacity:".2"}),h("stop",{offset:"100%",stopColor:"#1877F2",stopOpacity:".01"})),
      h("linearGradient",{id:"gd",x1:"0",y1:"0",x2:"0",y2:"1"},h("stop",{offset:"0%",stopColor:"#0081FB",stopOpacity:".15"}),h("stop",{offset:"100%",stopColor:"#0081FB",stopOpacity:".01"})),
      h("linearGradient",{id:"gp",x1:"0",y1:"0",x2:"0",y2:"1"},h("stop",{offset:"0%",stopColor:"#7C3AED",stopOpacity:".12"}),h("stop",{offset:"100%",stopColor:"#7C3AED",stopOpacity:".01"}))
    ),
    grow.length>1&&h("path",{d:tp(grow)+" L"+sx(grow[grow.length-1].yr)+","+(P.t+ch)+" L"+sx(grow[0].yr)+","+(P.t+ch)+" Z",fill:"url(#gg)"}),
    grow.length>1&&h("path",{d:tp(grow),fill:"none",stroke:"#1877F2",strokeWidth:"2.5",strokeLinejoin:"round"}),
    hdd?[
      draw.length>1&&h("path",{key:"f1",d:tp1(draw)+" L"+sx(draw[draw.length-1].yr)+","+(P.t+ch)+" L"+sx(draw[0].yr)+","+(P.t+ch)+" Z",fill:"url(#gd)"}),
      draw.length>1&&h("path",{key:"f2",d:tp2(draw)+" L"+sx(draw[draw.length-1].yr)+","+(P.t+ch)+" L"+sx(draw[0].yr)+","+(P.t+ch)+" Z",fill:"url(#gp)"}),
      draw.length>1&&h("path",{key:"l1",d:tp1(draw),fill:"none",stroke:"#0081FB",strokeWidth:"2",strokeDasharray:"6,3"}),
      draw.length>1&&h("path",{key:"l2",d:tp2(draw),fill:"none",stroke:"#7C3AED",strokeWidth:"2",strokeDasharray:"6,3"})
    ]:[
      draw.length>1&&h("path",{key:"fd",d:tp(draw)+" L"+sx(draw[draw.length-1].yr)+","+(P.t+ch)+" L"+sx(draw[0].yr)+","+(P.t+ch)+" Z",fill:"url(#gd)"}),
      draw.length>1&&h("path",{key:"ld",d:tp(draw),fill:"none",stroke:"#0081FB",strokeWidth:"2",strokeDasharray:"6,3"})
    ],

/* Caps in DISPLAY units — no FX conversion needed */
function getCaps(id,cur){
  if(cur==="MUR"){
    if(id==="house")return{max:25000000,step:500000};
    if(id==="edu")  return{max:25000000,step:100000};
    if(id==="trip") return{max:1000000, step:50000};
    if(id==="car")  return{max:5000000, step:100000};
    if(id==="wed")  return{max:5000000, step:100000};
    if(id==="other")return{max:5000000, step:100000};
    return              {max:5000000,   step:100000};
  }
  /* USD */
  if(id==="house")return{max:3000000,step:10000};
  if(id==="edu")  return{max:500000, step:5000};
  if(id==="trip") return{max:50000,  step:500};
  if(id==="car")  return{max:300000, step:5000};
  if(id==="wed")  return{max:100000, step:2000};
  if(id==="other")return{max:150000, step:2000};
  return              {max:150000,   step:2000};
}

/* ── MODAL ── */
function Modal({result,onClose,disp,base,partner,hh,frB,sym,cur}){
  const[name,setName]=useState(""),[ email,setEmail]=useState(""),[phone,setPhone]=useState("");
  const[saveCRM,setSaveCRM]=useState(false),[done,setDone]=useState(false),[loading,setLoading]=useState(false),[pdfError,setPdfError]=useState(false);
  const[errors,setErrors]=useState({});
  const ok=result.lasts,hl=hlabel(result.health);

  function validateEmail(v){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());}
  function validatePhone(v){if(!v.trim())return true;return /^[+]?[\d\s\-().]{7,20}$/.test(v.trim());}

  function validate(){
    const e={};
    if(!name.trim())e.name="Name is required.";
    if(!email.trim())e.email="Email is required.";
    else if(!validateEmail(email))e.email="Please enter a valid email address.";
    if(phone.trim()&&!validatePhone(phone))e.phone="Please enter a valid phone number.";
    setErrors(e);
    return Object.keys(e).length===0;
  }

  const valid=name.trim()&&validateEmail(email)&&validatePhone(phone);

  const submit=async function(){
    if(!validate())return;
    setLoading(true);
    const info={name,email,phone};
    /* Build report HTML once — open for client, store for CRM */
    const reportHTML=buildReportHTML(info,result,base,partner,hh,disp,sym,frB,cur);
    const reportOk=generateReport(info,result,base,partner,hh,disp,sym,frB,cur,reportHTML);
    if(!reportOk)setPdfError(true);
    if(saveCRM){
      try{
        const ts=Date.now();
        const leadPayload={
          /* Contact */
          name,email,phone,
          /* Plan summary */
          health:result.health,
          sp:result.sp,
          pot:disp(result.retP),
          potRaw:result.retP,
          monthlyIncome:disp(result.wd/12),
          monthlyIncomeRaw:result.wd/12,
          verdict:result.lasts?"On track":"Needs action",
          lasts:result.lasts,
          fundsToAge:result.lasts?result.le:result.ro,
          surplusYears:result.sur,
          coverageMultiple:result.cm,
          /* Personal */
          age:base.age,
          gender:base.gender,
          retireAge:base.retireAge,
          lifeExpectancy:result.le,
          savingsRate:base.savingsRate,
          income:disp(base.income),
          monthlySpend:disp(base.monthlySpend),
          savings:disp(base.savings),
          debtBalance:base.debtBalance>0?disp(base.debtBalance):null,
          incomeMode:base.incomeMode||"rule4",
          /* Scenario */
          scenarioSelected:window.__sf||"likely",
          scenarioRate:window.__sf==="best"?"6%":window.__sf==="tough"?"4%":"5%",
          /* Goals — full detail */
          goals:(base.lifeGoals||[]).map(g=>g.label||g.id),
          goalsDetail:(base.lifeGoals||[]).map(g=>({
            id:g.id,label:g.label,icon:g.icon,
            amount:disp(g.amount),atAge:g.atAge,
            recurYears:g.recurYears||0,
            mortgagePct:g.mortgagePct||0,
            mortgageRate:g.mortgageRate||0,
            mortgageTerm:g.mortgageTerm||0
          })),
          /* HH */
          hhMode:hh,
          partnerAge:hh?partner.age:null,
          partnerGender:hh?partner.gender:null,
          partnerRetireAge:hh?partner.retireAge:null,
          partnerSavingsRate:hh?partner.savingsRate:null,
          partnerIncome:hh?disp(partner.income):null,
          partnerSavings:hh?disp(partner.savings):null,
          p1Pot:hh&&result.p1P!=null?disp(result.p1P):null,
          p2Pot:hh&&result.p2P!=null?disp(result.p2P):null,
          /* Stress scenarios */
          potWorstCase:disp(Math.round(result.retP*0.85)),
          potBestCase:disp(Math.round(result.retP*1.16)),
          /* Currency & report reference */
          cur,
          reportKey:String(ts),   /* Firestore doc ID in the reports collection */
          ts:new Date().toISOString()
        };
        /* Write lead to Firestore — visible globally to CRM instantly */
        await db.collection("leads").doc(String(ts)).set(leadPayload);
        /* Write report HTML to a separate doc (keeps lead doc small) */
        if(reportHTML){
          await db.collection("reports").doc(String(ts)).set({
            leadId:String(ts),
            name,
            html:reportHTML,
            createdAt:new Date().toISOString()
          });
        }
      }catch(e){}
    }
    setLoading(false);setDone(true);
  };

  if(done)return h("div",{className:"modal-ov",onClick:onClose},
    h("div",{className:"modal-box",onClick:e=>e.stopPropagation(),style:{textAlign:"center"}},
      h("div",{style:{fontSize:44,marginBottom:14}},pdfError?"⚠️":"✅"),
      h("div",{style:{fontSize:18,fontWeight:700,marginBottom:8}},pdfError?"Something went wrong":"Your report is ready!"),
      h("p",{style:{fontSize:13,color:"var(--muted)",lineHeight:1.7,marginBottom:10}},pdfError?"Report could not be opened. Please allow pop-ups and try again.":"Your retirement report has opened in a new tab — use your browser's Print to save as PDF."),
      !pdfError&&saveCRM&&h("p",{style:{fontSize:12,color:"var(--ok)",marginBottom:16}},"✓ Your details have been saved. A consultant may reach out."),
      !pdfError&&!saveCRM&&h("p",{style:{fontSize:12,color:"var(--muted)",marginBottom:16}},"Your privacy is protected — no details stored."),
      h("button",{className:"cta",onClick:onClose},"Close")
    )
  );

  const fieldStyle=(hasErr)=>({...{},border:"1.5px solid "+(hasErr?"var(--danger)":"var(--border)")});
  const errMsg=(msg)=>h("div",{style:{fontSize:11,color:"var(--danger)",marginTop:3,fontWeight:500}},msg);

  return h("div",{className:"modal-ov",onClick:onClose},
    h("div",{className:"modal-box",onClick:e=>e.stopPropagation()},

      h("div",{style:{fontSize:18,fontWeight:700,marginBottom:4}},"Generate your report"),
      h("p",{style:{fontSize:13,color:"var(--muted)",marginBottom:16,lineHeight:1.6}},"Fill in your details to generate your personalised retirement report. It will open in a new tab — use Print to save as PDF."),
      h("div",{style:{background:ok?"var(--ok-lt)":"var(--danger-lt)",border:"1px solid "+(ok?"rgba(45,138,78,.2)":"rgba(192,57,43,.2)"),borderRadius:10,padding:"10px 14px",marginBottom:18,fontSize:12,color:"var(--muted)",lineHeight:1.6}},
        h("b",{style:{color:ok?"var(--ok)":"var(--danger)"}},ok?"✓ On track":"⚠ Action needed")," · Health: ",h("b",{style:{color:hl.c}},result.health+"/100 · "+hl.l)," · Monthly income: ",h("b",{style:{color:"var(--text)"}},disp(result.wd/12)+"/mo")
      ),
      h("div",{style:{display:"flex",flexDirection:"column",gap:12,marginBottom:16}},
        h("div",null,
          h("div",{className:"field-lbl"},"Full name *"),
          h("input",{type:"text",value:name,onChange:e=>{setName(e.target.value);if(errors.name)setErrors(p=>({...p,name:""}));},placeholder:"Your name",className:"modal-input",style:fieldStyle(errors.name)}),
          errors.name&&errMsg(errors.name)
        ),
        h("div",null,
          h("div",{className:"field-lbl"},"Email address *"),
          h("input",{type:"email",value:email,onChange:e=>{setEmail(e.target.value);if(errors.email)setErrors(p=>({...p,email:""}));},placeholder:"you@example.com",className:"modal-input",style:fieldStyle(errors.email)}),
          errors.email&&errMsg(errors.email),
          !errors.email&&email&&!validateEmail(email)&&errMsg("Please enter a valid email address.")
        ),
        h("div",null,
          h("div",{className:"field-lbl"},"Phone (optional)"),
          h("input",{type:"tel",value:phone,onChange:e=>{setPhone(e.target.value);if(errors.phone)setErrors(p=>({...p,phone:""}));},placeholder:"+230 5XXX XXXX",className:"modal-input",style:fieldStyle(errors.phone)}),
          errors.phone&&errMsg(errors.phone),
          !errors.phone&&phone&&!validatePhone(phone)&&errMsg("Please enter a valid phone number (7–20 digits).")
        )
      ),
      h("label",{style:{display:"flex",alignItems:"flex-start",gap:10,padding:"12px 14px",background:"var(--accent-lt)",border:"1px solid rgba(24,119,242,.2)",borderRadius:10,marginBottom:14,cursor:"pointer"}},
        h("input",{type:"checkbox",checked:saveCRM,onChange:e=>setSaveCRM(e.target.checked),style:{marginTop:2,accentColor:"var(--accent)",width:16,height:16,flexShrink:0,cursor:"pointer"}}),
        h("div",null,h("div",{style:{fontSize:13,fontWeight:700,color:"var(--accent)",marginBottom:2}},"Save my plan & get consultant support"),h("div",{style:{fontSize:12,color:"var(--muted)",lineHeight:1.55}},"Tick to store your details securely. An ARK consultant will reach out."))
      ),
      h("p",{style:{fontSize:11,color:"var(--hint)",marginBottom:14}},"* Name and email required."+(saveCRM?" Your details will be saved to our CRM.":" Your details will not be stored.")),
      h("button",{className:"cta",onClick:submit,disabled:loading,style:{opacity:loading?.6:1}},loading?"Building your report…":"View my report →")
    )
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
