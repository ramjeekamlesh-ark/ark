<body>
<div id="app"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useMemo,createElement:h}=React;
const FX=46.5;
const CURR={USD:{sym:"$",toB:v=>v,frB:v=>v},MUR:{sym:"₨",toB:v=>v/FX,frB:v=>v*FX}};
function useCur(){
  const[cur,setCur]=useState("USD");
  const C=CURR[cur];
  const disp=(v,sh=false)=>{
    if(typeof v!=="number"||isNaN(v))return"—";
    const val=C.frB(v),s=C.sym;
    if(val>=1e6)return`${s}${(val/1e6).toFixed(sh?1:2)}M`;
    if(val>=1e3)return`${s}${(val/1e3).toFixed(sh?0:1)}K`;
    return`${s}${Math.round(val).toLocaleString()}`;
  };
  return{cur,setCur,disp,toB:C.toB,frB:C.frB,sym:C.sym};
}

// ── DEBT: compute total outstanding balance after factoring interest & duration ──
// Returns the present value of remaining payments and a monthly payment amount
function debtCalc(principal,annualRate,termMonths){
  if(!principal||principal<=0)return{balance:0,monthlyPmt:0,totalInterest:0};
  if(!annualRate||annualRate<=0){
    // zero interest: simple division
    const mp=termMonths>0?principal/termMonths:principal;
    return{balance:principal,monthlyPmt:mp,totalInterest:0};
  }
  const mr=annualRate/100/12,n=termMonths||60;
  const mp=principal*(mr*Math.pow(1+mr,n))/(Math.pow(1+mr,n)-1);
  const total=mp*n,interest=total-principal;
  return{balance:principal,monthlyPmt:mp,totalInterest:Math.max(0,interest)};
}

// ── FINANCIAL ENGINE ──────────────────────────────────────────────────────────
function proj(inp,rate){
  const{age,gender,income,monthlySpend:ms,savings,savingsRate:sr,retireAge:ra,
    debtBalance:db=0,debtRate:dr=0,debtTerm:dt=60,
    retireMonthlyExpenses:rme=0,lifeGoals:lg=[],incomeMode:im="rule4"}=inp;
  const ai=income*12,le=gender==="male"?75:85,yir=Math.max(1,le-ra);
  const INF=0.025,IG=0.03,SWR=0.04,ytr=Math.max(1,ra-age),r=rate!==undefined?rate:0.05;

  // Debt: compute monthly payment and effective drag on savings
  const dbt=debtCalc(db,dr,dt);
  const debtMonths=Math.min(dt,ytr*12);
  // Total extra outflow due to debt interest over repayment period (PV basis)
  const debtInterestDrag=dbt.totalInterest>0?(dbt.totalInterest/ytr):0;

  // Build goal withdrawal map — trips can recur
  const gw={};
  (lg||[]).forEach(g=>{
    const amt=g.amount||0;
    if(amt<=0)return;
    if(g.id==="trip"&&g.recurYears>0){
      // recurring trip: withdraw every recurYears from atAge until retire
      for(let age2=g.atAge;age2<ra;age2+=g.recurYears){
        const yr=age2-age;
        if(yr>0)gw[yr]=(gw[yr]||0)+amt;
      }
    } else {
      if(g.atAge>age&&g.atAge<ra){
        const yr=g.atAge-age;
        gw[yr]=(gw[yr]||0)+amt;
      }
    }
  });

  // Net starting savings: deduct outstanding principal (debt reduces net worth)
  let port=Math.max(0,savings-db);
  const acc=[];
  for(let t=0;t<ytr;t++){
    const curIncome=ai*Math.pow(1+IG,t);
    const savingAmount=curIncome*(sr/100);
    // Deduct monthly debt payments from savings capacity during repayment period
    const monthsThisYear=Math.min(12,Math.max(0,debtMonths-t*12));
    const debtDragThisYear=dbt.monthlyPmt*monthsThisYear;
    const effectiveSaving=Math.max(0,savingAmount-debtDragThisYear);
    port=port*(1+r)+effectiveSaving;
    if(gw[t])port=Math.max(0,port-gw[t]);
    acc.push({yr:age+t,val:Math.max(0,port),phase:"grow"});
  }

  const rp=Math.max(0,port),isp=ms*12*Math.pow(1+INF,ytr);
  let wd,tp=null,rms=null,rsr=null;
  if(im==="expenses"){const d=ms*12*Math.pow(1+INF,ytr);wd=d;tp=d/SWR;}
  else if(im==="custom"&&rme>0){const d=rme*12*Math.pow(1+INF,ytr);wd=d;tp=d/SWR;}
  else{wd=Math.max(isp*0.7,rp*SWR);}
  if(tp!==null){
    const PV=Math.max(0,savings-db),mr=r/12,n=ytr*12,gr=Math.pow(1+mr,n),nd=tp-PV*gr;
    rms=nd>0?(nd*mr)/(gr-1):0;rsr=Math.min(80,Math.max(0,(rms/income)*100));
  }
  const maxD=Math.max(40,yir+15);
  let ro=ra+maxD,dp=rp;const dds=[];
  for(let y=0;y<=maxD;y++){
    const w=wd*Math.pow(1+INF,y);dp=dp*(1+r)-w;
    if(dp<=0){ro=ra+y;break;}
    if(y<maxD)dds.push({yr:ra+y,val:Math.max(0,dp),phase:"draw"});
  }
  const lasts=ro>=le,sur=ro-le,cm=wd>0?rp/wd:0;
  const sc1=Math.min(30,(sr/20)*30),sc2=Math.min(25,Math.max(0,25-(ms/income)*25));
  const sc3=Math.min(20,(savings/(ai*3))*20);
  const rb=tp?Math.min(25,(rp/tp)*25):Math.min(25,(rp/(wd*yir))*25);
  const health=Math.round(sc1+sc2+sc3+(lasts?rb:rb*0.5));
  const sp2=Math.min(97,Math.max(5,(lasts?60:25)+(sur>=10?18:sur>=5?10:sur>=0?4:0)+(sr>=20?10:sr>=15?6:sr>=10?3:0)+(cm>=25?9:cm>=18?5:0)));
  return{retP:rp,retI:rp*SWR,sp:sp2,ro,health,le,yir,r,wd,ytr,lasts,cm,sur,
    data:[...acc,...dds],tp,rms,rsr,cms:income*(sr/100),isp,inf:Math.pow(1+INF,ytr),
    debtMonthlyPmt:dbt.monthlyPmt,debtTotalInterest:dbt.totalInterest};
}

function stress(inp){
  const t=proj(inp,0.04),l=proj(inp,0.05),b=proj(inp,0.06);
  return{tough:t,likely:l,best:b,tP:t.retP,lP:l.retP,bP:b.retP,tM:t.wd/12,lM:l.wd/12,bM:b.wd/12};
}

function hhProj(p1,p2,rate=0.05){
  const INF=0.025,SWR=0.04,r=rate;
  const r1=proj({...p1,incomeMode:"rule4",lifeGoals:p1.lifeGoals||[]},r);
  const r2=proj({...p2,incomeMode:"rule4",lifeGoals:[]},r);
  const hra=Math.max(p1.retireAge,p2.retireAge);
  const le1=p1.gender==="male"?75:85,le2=p2.gender==="male"?75:85,hle=Math.max(le1,le2);
  const pot1=r1.retP*Math.pow(1+r,Math.max(0,hra-p1.retireAge));
  const pot2=r2.retP*Math.pow(1+r,Math.max(0,hra-p2.retireAge));
  const cp=pot1+pot2,ci=p1.income+p2.income;
  const ytr=Math.max(1,hra-Math.min(p1.age,p2.age));
  const isp=p1.monthlySpend*12*Math.pow(1+INF,ytr);
  const im=p1.incomeMode||"rule4";
  let wd,tp=null,rms=null;
  if(im==="expenses"){const d=p1.monthlySpend*12*Math.pow(1+INF,ytr);wd=d;tp=d/SWR;}
  else if(im==="custom"&&(p1.retireMonthlyExpenses||0)>0){const d=p1.retireMonthlyExpenses*12*Math.pow(1+INF,ytr);wd=d;tp=d/SWR;}
  else{wd=Math.max(isp*0.7,cp*SWR);}
  if(tp!==null&&cp<tp){const rr=r/12,nn=ytr*12,gr=Math.pow(1+rr,nn),nd=tp-cp;rms=nd>0?(nd*rr)/(gr-1):0;}
  const yir=Math.max(1,hle-hra),maxD=Math.max(40,yir+15);
  let ro=hra+maxD,dp=cp;const dds=[];
  for(let y=0;y<=maxD;y++){
    const w=wd*Math.pow(1+INF,y);dp=dp*(1+r)-w;
    if(dp<=0){ro=hra+y;break;}
    if(y<maxD)dds.push({yr:hra+y,val:Math.max(0,dp),phase:"draw"});
  }
  const lasts=ro>=hle,sur=ro-hle,cm=wd>0?cp/wd:0;
  const gm={};
  [...r1.data,...r2.data].filter(d=>d.phase==="grow").forEach(d=>{gm[d.yr]=(gm[d.yr]||0)+d.val;});
  const grow=Object.keys(gm).map(Number).sort((a,b)=>a-b).map(yr=>({yr,val:gm[yr],phase:"grow"}));
  const avg=(p1.income*p1.savingsRate+p2.income*p2.savingsRate)/ci;
  const sc1=Math.min(30,(avg/20)*30),sc2=Math.min(25,Math.max(0,25-(p1.monthlySpend/ci)*25));
  const sc3=Math.min(20,((p1.savings+p2.savings)/((ci*12)*3))*20);
  const rb=tp?Math.min(25,(cp/tp)*25):Math.min(25,(cp/(wd*yir))*25);
  const health=Math.round(sc1+sc2+sc3+(lasts?rb:rb*0.5));
  const sp2=Math.min(97,Math.max(5,(lasts?60:25)+(sur>=10?18:sur>=5?10:sur>=0?4:0)+(avg>=20?10:avg>=15?6:avg>=10?3:0)+(cm>=25?9:cm>=18?5:0)));
  const inf=Math.pow(1+INF,ytr);
  const p1s=cp>0?pot1/cp:0.5,p2s=cp>0?pot2/cp:0.5;
  const tma=wd/12;
  let pp1=pot1,pp2=pot2;const sLE=Math.min(le1,le2),p1df=le1<=le2,hdd=[];
  for(let y=0;y<=maxD;y++){
    const yr=hra+y;
    if(yr<=sLE){pp1=pp1*(1+r)-wd*p1s*Math.pow(1+INF,y);pp2=pp2*(1+r)-wd*p2s*Math.pow(1+INF,y);}
    else{const cb=Math.max(0,pp1)+Math.max(0,pp2),nc=cb*(1+r)-wd*Math.pow(1+INF,y);if(p1df){pp1=0;pp2=nc;}else{pp2=0;pp1=nc;}}
    hdd.push({yr,p1v:Math.max(0,pp1),p2v:Math.max(0,pp2)});
    if(Math.max(0,pp1)+Math.max(0,pp2)<=0)break;
  }
  return{retP:cp,retI:cp*SWR,sp:sp2,ro,health,le:hle,yir,wd,ytr,lasts,cm,sur,
    data:[...grow,...dds],hdd,tp,rms,p1P:r1.retP,p2P:r2.retP,le1,le2,hra,
    p1s,p2s,p1mt:tma*p1s/inf,p2mt:tma*p2s/inf,tmt:tma/inf,tma,inf,
    cms:ci*avg/100,isp};
}
function hhStress(p1,p2){
  const t=hhProj(p1,p2,0.04),l=hhProj(p1,p2,0.05),b=hhProj(p1,p2,0.06);
  return{tough:t,likely:l,best:b,tP:t.retP,lP:l.retP,bP:b.retP,tM:t.wd/12,lM:l.wd/12,bM:b.wd/12};
}
function earlyCalc(inp,n,rate=0.05){
  const target=Math.max(inp.age+2,inp.retireAge-n),ytr=Math.max(1,target-inp.age);
  const isp=inp.monthlySpend*12*Math.pow(1.025,ytr);
  const need=Math.max(inp.incomeMode==="expenses"||(inp.incomeMode==="custom"&&inp.retireMonthlyExpenses>0)?((inp.incomeMode==="custom"?inp.retireMonthlyExpenses:inp.monthlySpend)*12*Math.pow(1.025,ytr))/0.04:isp*0.7*25,isp*20);
  const PV=Math.max(0,inp.savings-(inp.debtBalance||0)),mr=rate/12,n2=ytr*12,gr=Math.pow(1+mr,n2);
  const mn=Math.max(0,need-PV*gr)>0?((need-PV*gr)*mr)/(gr-1):0;
  return{targetAge:target,rn:Math.min(80,Math.max(0,(mn/inp.income)*100)),mn,need};
}
function hlabel(s){
  if(s<35)return{l:"Poor",c:"#DC2626"};if(s<55)return{l:"Needs work",c:"#D97706"};

function fmtAmt(v,sym){

}

// ── CHART ─────────────────────────────────────────────────────────────────────
function Chart({data,ra,le,hdd}){
  if(!data||!data.length)return null;
  const W=600,H=180,P={l:8,r:8,t:14,b:20};
  const cw=W-P.l-P.r,ch=H-P.t-P.b;
  const av=[...data.map(d=>d.val)];
  if(hdd)hdd.forEach(d=>av.push(d.p1v||0,d.p2v||0));
  const maxV=Math.max(...av,1)*1.12;
  const ay=[...data.map(d=>d.yr)];
  if(hdd)hdd.forEach(d=>ay.push(d.yr));
  const minY=Math.min(...ay),maxY=Math.max(...ay),rng=Math.max(1,maxY-minY);
  const sx=yr=>P.l+((yr-minY)/rng)*cw;
  const sy=v=>P.t+ch-(Math.max(0,v)/maxV)*ch;
  const grow=data.filter(d=>d.phase==="grow");
  const draw=hdd||data.filter(d=>d.phase==="draw");
  const tp=pts=>pts.map((d,i)=>`${i?"L":"M"}${sx(d.yr).toFixed(1)},${sy(d.val).toFixed(1)}`).join(" ");
  const tp1=pts=>pts.map((d,i)=>`${i?"L":"M"}${sx(d.yr).toFixed(1)},${sy(d.p1v||0).toFixed(1)}`).join(" ");
  const tp2=pts=>pts.map((d,i)=>`${i?"L":"M"}${sx(d.yr).toFixed(1)},${sy(d.p2v||0).toFixed(1)}`).join(" ");
  const rx=sx(ra),lx=le>=minY&&le<=maxY?sx(le):null;
  return h("svg",{width:"100%",viewBox:`0 0 ${W} ${H}`,style:{overflow:"visible",display:"block"}},
    h("defs",null,
      h("linearGradient",{id:"gg",x1:"0",y1:"0",x2:"0",y2:"1"},h("stop",{offset:"0%",stopColor:"#1A56DB",stopOpacity:".14"}),h("stop",{offset:"100%",stopColor:"#1A56DB",stopOpacity:".01"})),
      h("linearGradient",{id:"gd",x1:"0",y1:"0",x2:"0",y2:"1"},h("stop",{offset:"0%",stopColor:"#0D9488",stopOpacity:".12"}),h("stop",{offset:"100%",stopColor:"#0D9488",stopOpacity:".01"})),
      h("linearGradient",{id:"gp",x1:"0",y1:"0",x2:"0",y2:"1"},h("stop",{offset:"0%",stopColor:"#7C3AED",stopOpacity:".1"}),h("stop",{offset:"100%",stopColor:"#7C3AED",stopOpacity:".01"}))
    ),
    grow.length>1&&h("path",{d:`${tp(grow)} L${sx(grow[grow.length-1].yr)},${P.t+ch} L${sx(grow[0].yr)},${P.t+ch} Z`,fill:"url(#gg)"}),
    grow.length>1&&h("path",{d:tp(grow),fill:"none",stroke:"#1A56DB",strokeWidth:"2",strokeLinejoin:"round"}),
    hdd?[
      draw.length>1&&h("path",{key:"f1",d:`${tp1(draw)} L${sx(draw[draw.length-1].yr)},${P.t+ch} L${sx(draw[0].yr)},${P.t+ch} Z`,fill:"url(#gd)"}),
      draw.length>1&&h("path",{key:"f2",d:`${tp2(draw)} L${sx(draw[draw.length-1].yr)},${P.t+ch} L${sx(draw[0].yr)},${P.t+ch} Z`,fill:"url(#gp)"}),
      draw.length>1&&h("path",{key:"l1",d:tp1(draw),fill:"none",stroke:"#0D9488",strokeWidth:"1.8",strokeDasharray:"6,3"}),
      draw.length>1&&h("path",{key:"l2",d:tp2(draw),fill:"none",stroke:"#7C3AED",strokeWidth:"1.8",strokeDasharray:"6,3"})
    ]:[
      draw.length>1&&h("path",{key:"fd",d:`${tp(draw)} L${sx(draw[draw.length-1].yr)},${P.t+ch} L${sx(draw[0].yr)},${P.t+ch} Z`,fill:"url(#gd)"}),
      draw.length>1&&h("path",{key:"ld",d:tp(draw),fill:"none",stroke:"#B45309",strokeWidth:"2",strokeDasharray:"6,3"})
    ],
    h("line",{x1:rx,y1:P.t,x2:rx,y2:P.t+ch,stroke:"#9CA3AF",strokeWidth:"1",strokeDasharray:"3,3"}),
    h("text",{x:rx+3,y:P.t+9,fill:"#9CA3AF",fontSize:"8",fontFamily:"sans-serif"},`retire ${ra}`),
    lx&&h("line",{x1:lx,y1:P.t,x2:lx,y2:P.t+ch,stroke:"#DC2626",strokeWidth:"1.5",strokeDasharray:"4,3",opacity:".7"}),
    lx&&h("text",{x:lx+3,y:P.t+9,fill:"#DC2626",fontSize:"8",fontFamily:"sans-serif"},`age ${le}`),
    [minY,Math.round((minY+maxY)/2),maxY].map(yr=>h("text",{key:yr,x:sx(yr),y:H-3,fill:"#9CA3AF",fontSize:"8",fontFamily:"sans-serif",textAnchor:"middle"},yr))
  );
}

      tab==="results"&&res&&h("div",{className:"fade"},
        h("h2",{style:{fontSize:22,fontWeight:600,letterSpacing:"-.4px",marginBottom:16}},hh?"Household results":"Your results"),

        h("div",{style:cardS},h(IncomeMode,{mode:base.incomeMode||"rule4",onChange:m=>sB("incomeMode",m),ms:base.monthlySpend,ca:base.retireMonthlyExpenses||0,onCA:v=>sB("retireMonthlyExpenses",v),result:res,disp,toB,frB,cur,sym,isHH:hh})),

        st&&h("div",{style:{marginBottom:14}},
          h("div",{style:secL},"Return scenarios"),
          h("div",{className:"scen-grid"},
            SD.map(sc=>h("button",{key:sc.k,className:"scen-btn",
              style:{borderColor:sf===sc.k?sc.c:"#E8EAF0",borderWidth:sf===sc.k?2:1,background:sf===sc.k?sc.c+"10":"#fff"},
              onClick:()=>setSF(sc.k)},
              h("div",{style:{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",color:sc.c,marginBottom:3}},sc.lbl),
              h("div",{style:{fontSize:17,fontWeight:600,color:sc.c,letterSpacing:"-.4px",lineHeight:1.2,marginBottom:2}},disp(sc.pot,true)),
              h("div",{style:{fontSize:10,color:"#6B7280",marginBottom:6}},sc.rate+" return"),
              h("div",{style:{borderTop:"1px solid #E8EAF0",paddingTop:6}},h("div",{style:{fontSize:13,fontWeight:600,color:"#6B7280"}},disp(sc.mo)),h("div",{style:{fontSize:10,color:"#6B7280"}},"/mo at retirement"))
            ))
          )
        ),

        h("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:res.lasts?"#F0FDF4":"#FEF2F2",border:`1px solid ${res.lasts?"rgba(22,163,74,.2)":"rgba(220,38,38,.2)"}`,borderRadius:8,marginBottom:10}},
          h("span",{style:{fontSize:13,fontWeight:600,color:res.lasts?"#16A34A":"#DC2626"}},res.lasts?`✓ Funds last to age ${res.le} — ${res.sur} yrs to spare`:`⚠ Runs out at age ${res.ro} — ${res.le-res.ro} yrs short`)
        ),

        hh&&res.p1P!=null&&h("div",{style:{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}},
          [["👤 You",res.p1P,base.retireAge,"#1A56DB"],["👤 Partner",res.p2P,partner.retireAge,"#7C3AED"]].map(([l,v,a,c])=>
            h("div",{key:l,style:{flex:1,padding:"8px 12px",background:"#F3F4F6",borderRadius:8,border:`1px solid ${c}22`}},
              h("div",{style:{fontSize:10,color:"#6B7280",marginBottom:1}},`${l} — retires age ${a}`),
              h("div",{style:{fontSize:15,fontWeight:600,color:c}},disp(v))
            )
          )
        ),

        h("div",{style:cardS},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
            h("span",{style:{fontSize:11,fontWeight:600,color:"#6B7280",textTransform:"uppercase",letterSpacing:".07em"}},"Your money over time"),
            h("span",{style:{fontSize:10,color:SD.find(s=>s.k===sf)?.c,fontWeight:600}},SD.find(s=>s.k===sf)?.lbl+" · "+SD.find(s=>s.k===sf)?.rate)
          ),
          h(Chart,{data:res.data,ra:hh?res.hra:base.retireAge,le:res.le,hdd:hh?res.hdd:null}),
          h(LifeBar,{ra:hh?res.hra:base.retireAge,le:res.le,ro:res.ro})
        ),

        hh&&res.p1mt!=null&&h("div",{style:{marginBottom:14}},
          h("div",{style:secL},"Monthly income at retirement"),
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
            [{l:"👤 You",c:"#1A56DB",mo:res.wd/12*res.p1s,today:res.p1mt,pct:Math.round(res.p1s*100)},
             {l:"👤 Partner",c:"#7C3AED",mo:res.wd/12*res.p2s,today:res.p2mt,pct:Math.round(res.p2s*100)}].map(p=>
              h("div",{key:p.l,style:{background:"#fff",border:`1px solid ${p.c}28`,borderRadius:12,padding:"14px 16px"}},
                h("div",{style:{fontSize:10,color:p.c,textTransform:"uppercase",letterSpacing:".07em",fontWeight:600,marginBottom:5}},`${p.l} · ${p.pct}%`),
                h("div",{style:{fontSize:20,fontWeight:600,color:p.c,letterSpacing:"-.5px",lineHeight:1,marginBottom:2}},disp(p.mo),h("span",{style:{fontSize:11,color:"#6B7280",fontWeight:400}},"/mo")),
                h("div",{style:{fontSize:11,color:"#6B7280",marginBottom:8}},`≈ ${disp(p.today)}/mo today`),
                h("div",{style:{height:3,background:"#E8EAF0",borderRadius:2}},h("div",{style:{height:"100%",width:`${p.pct}%`,background:p.c,borderRadius:2}}))
              )
            )
          )
        ),

        // Debt impact summary
        (base.debtBalance>0||(hh&&partner.debtBalance>0))&&h("div",{style:{background:"#FEF2F2",border:"1px solid rgba(220,38,38,.15)",borderRadius:10,padding:"12px 14px",marginBottom:14,fontSize:12,color:"#6B7280",lineHeight:1.8}},
          h("div",{style:{fontWeight:600,color:"#DC2626",marginBottom:4}},"Debt impact on your plan"),
          base.debtBalance>0&&h("div",null,"Your debt: ",h("b",{style:{color:"#DC2626"}},disp(base.debtBalance)),` @ ${base.debtRate||0}% / ${base.debtTerm||60} months → `,h("b",null,`${sym}${Math.round(frB(res.debtMonthlyPmt||0)).toLocaleString()}/mo repayment`)),
          hh&&partner.debtBalance>0&&h("div",null,"Partner's debt: ",h("b",{style:{color:"#DC2626"}},disp(partner.debtBalance)),` @ ${partner.debtRate||0}% / ${partner.debtTerm||60} months`),
          h("div",{style:{marginTop:4,fontSize:11,color:"#9CA3AF"}},"Repayments are deducted from savings each year until debt is cleared.")
        ),

        h("div",{className:"stat-grid"},
          [["Health score",`${res.health}/100`,hl.l,hl.c],["Success probability",`${res.sp}%`,"funds last to life exp.",res.sp>=75?"#16A34A":res.sp>=55?"#D97706":"#DC2626"],
           ["Coverage",`${res.cm.toFixed(1)}×`,"annual spending",res.cm>=22?"#16A34A":res.cm>=16?"#D97706":"#DC2626"],["Monthly income",disp(res.wd/12),"at retirement","#111827"]].map(([l,v,s,c])=>
            h("div",{key:l,className:"stat-box"},h("div",{className:"stat-lbl"},l),h("div",{className:"stat-val",style:{color:c}},v),h("div",{className:"stat-sub"},s))
          )
        ),

        h(WhatIfSection,{scens,res,disp,secL}),

        vd&&h("div",{className:"verdict",style:{background:vd.c+"0d",border:`1px solid ${vd.c}30`}},
          h("div",{style:{fontSize:14,fontWeight:600,color:vd.c,marginBottom:4}},`${vd.icon} ${vd.h}`),
          h("div",{style:{fontSize:13,color:"#6B7280",lineHeight:1.6,marginBottom:5}},vd.s),
          h("div",{style:{fontSize:12,fontStyle:"italic",color:"#6B7280"}},`→ ${vd.a}`)
        ),
        h("button",{style:ctaS,onClick:()=>setModal(true)},"Get a personalised plan →")
      )
    ),

    h("footer",{className:"footer"},
      h("div",{className:"wrap footer-inner"},
        h("div",{style:{display:"flex",alignItems:"center",gap:8}},
          h("div",{className:"logo-mark",style:{width:24,height:24,borderRadius:7,fontSize:12}},"A"),
          h("span",{style:{fontSize:13,fontWeight:600}},"ARK Financial Planners"),
          h("span",{style:{fontSize:11,color:"#6B7280",marginLeft:4}},`1 USD = ${FX} MUR`)
        ),
        h("div",{style:{fontSize:11,color:"#9CA3AF",maxWidth:380,lineHeight:1.55}},"For educational purposes only. Not financial advice. Consult a qualified financial consultant before making decisions.")
      )
    )
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
</script>
</body>
</html>
